    python scripts/run_migration_portability.py --artifact-dir dist/migration-portability --report-json docs/compliance/migration_portability_report.json --report-md docs/compliance/migration_portability_report.md --pytest-report dist/test-reports/{env_name}.json --strict-exit
    python scripts/record_validated_run.py migration-portability --report docs/compliance/migration_portability_report.json

[testenv:py311-final-certification]
description = Final certification gate aggregation from validated-run artifacts
extras =
    test
    sqlite
    postgres
    servers
setenv =
    {[testenv]setenv}
    INSTALL_CONSTRAINTS = -c {toxinidir}/constraints/base.txt -c {toxinidir}/constraints/test.txt -c {toxinidir}/constraints/runner-uvicorn.txt -c {toxinidir}/constraints/runner-hypercorn.txt -c {toxinidir}/constraints/runner-tigrcorn.txt
    POSTGRES_URL = {env:POSTGRES_URL:postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci}
    TIGRBL_AUTH_MATRIX_PROFILE = final-certification
    TIGRBL_AUTH_INSTALL_PROFILE = final-certification
    TIGRBL_AUTH_RUNTIME_REPORT_MODE = validated-runs
commands =
    python scripts/collect_validated_artifact_downloads.py --download-root {env:TIGRBL_AUTH_VALIDATED_ARTIFACT_DOWNLOAD_ROOT:{toxinidir}/.artifacts/validated-downloads} --if-present
    python -I -m pip check
    python scripts/verify_clean_room_install_substrate.py --profile {env:TIGRBL_AUTH_INSTALL_PROFILE} --strict-manifest --strict-imports --artifact-dir dist/install-substrate
    python scripts/generate_cli_docs.py
    python scripts/generate_state_reports.py
    python scripts/record_validated_run.py tier3-evidence
    python scripts/run_release_gates.py
    python scripts/verify_truth_chain.py --mode all
