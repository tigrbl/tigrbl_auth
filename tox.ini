[tox]
requires = tox>=4.23.2
envlist =
    py310-base
    py311-base
    py312-base
    py313-base
    py314-base
    py310-sqlite-uvicorn
    py311-sqlite-uvicorn
    py312-sqlite-uvicorn
    py313-sqlite-uvicorn
    py314-sqlite-uvicorn
    py310-postgres-hypercorn
    py311-postgres-hypercorn
    py312-postgres-hypercorn
    py313-postgres-hypercorn
    py314-postgres-hypercorn
    py311-tigrcorn
    py312-tigrcorn
    py313-tigrcorn
    py314-tigrcorn
    py310-devtest
    py311-devtest
    py312-devtest
    py313-devtest
    py314-devtest
    py311-gates
    py310-test-core
    py311-test-core
    py312-test-core
    py313-test-core
    py314-test-core
    py310-test-integration
    py311-test-integration
    py312-test-integration
    py313-test-integration
    py314-test-integration
    py310-test-conformance
    py311-test-conformance
    py312-test-conformance
    py313-test-conformance
    py314-test-conformance
    py310-test-security-negative
    py311-test-security-negative
    py312-test-security-negative
    py313-test-security-negative
    py314-test-security-negative
    py310-test-interop
    py311-test-interop
    py312-test-interop
    py313-test-interop
    py314-test-interop
    py311-test-extension
    py311-migration-portability
    py311-final-certification
skip_missing_interpreters = true

[testenv]
description = Clean-room certification smoke install
package = wheel
wheel_build_env = .pkg
changedir = {toxinidir}
passenv =
    AUTHN_ISSUER
    JWT_SECRET
    LOG_LEVEL
    POSTGRES_URL
    PG_*
    TIGRBL_AUTH_*
    PYTEST_ADDOPTS
setenv =
    INSTALL_CONSTRAINTS = -c {toxinidir}/constraints/base.txt
    AUTHN_ISSUER = https://authn.example.com
    JWT_SECRET = tox-clean-room-secret
    LOG_LEVEL = INFO
    POSTGRES_URL =
    PG_HOST =
    PG_PORT =
    PG_DB =
    PG_USER =
    PG_PASS =
    TIGRBL_AUTH_PROFILE = baseline
    TIGRBL_AUTH_MATRIX_PROFILE = base
    TIGRBL_AUTH_INSTALL_PROFILE = base
    TIGRBL_AUTH_RUNNER =
    TIGRBL_AUTH_EXPECT_RUNNER_INSTALLED = 0
install_command = python -I scripts/tox_pip_install.py {env:INSTALL_CONSTRAINTS} {opts} {packages}
commands =
    python -I -m pip check
    python scripts/verify_clean_room_install_substrate.py --profile {env:TIGRBL_AUTH_INSTALL_PROFILE} --strict-manifest --strict-imports --artifact-dir dist/install-substrate
    python scripts/clean_room_profile_smoke.py --probe-surfaces --require-surface-probes
    python scripts/generate_state_reports.py
    python scripts/record_validated_run.py runtime-profile

[testenv:py{310,311,312,313,314}-base]
description = Base clean-room install smoke

[testenv:py{310,311,312,313,314}-sqlite-uvicorn]
description = SQLite + Uvicorn clean-room install smoke
extras =
    sqlite
    uvicorn
setenv =
    {[testenv]setenv}
    INSTALL_CONSTRAINTS = -c {toxinidir}/constraints/base.txt -c {toxinidir}/constraints/runner-uvicorn.txt
    TIGRBL_AUTH_MATRIX_PROFILE = sqlite-uvicorn
    TIGRBL_AUTH_INSTALL_PROFILE = sqlite-uvicorn
    TIGRBL_AUTH_RUNNER = uvicorn
    TIGRBL_AUTH_EXPECT_RUNNER_INSTALLED = 1
commands =
    python -I -m pip check
    python scripts/verify_clean_room_install_substrate.py --profile {env:TIGRBL_AUTH_INSTALL_PROFILE} --strict-manifest --strict-imports --artifact-dir dist/install-substrate
    python scripts/clean_room_profile_smoke.py --runner uvicorn --require-runner-installed --probe-surfaces --require-surface-probes
    tigrbl-auth serve --check --server uvicorn --format json --output dist/runtime-smoke/sqlite-uvicorn-serve-check.json
    python scripts/generate_state_reports.py
    python scripts/record_validated_run.py runtime-profile --runner uvicorn

