services:
  tigrbl-auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev-tigrbl
    image: tigrbl-auth-local:latest
    container_name: tigrbl-auth-local
    ports:
      - "8001:8000"
    environment:
      TIGRBL_AUTH_INSTALL_PROFILE: tigrcorn
      AUTHN_ISSUER: ${AUTHN_ISSUER:-http://localhost:8001}
      TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER: ${TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER:-http://localhost:8001/resource}
      TIGRBL_AUTH_REQUIRE_TLS: "false"
      TIGRBL_AUTH_SESSION_COOKIE_FORCE_SECURE: "false"
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_USERNAME: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_EMAIL: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@example.test}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_PASSWORD:-AdminPass123!}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_FORCE_PASSWORD_CHANGE: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_FORCE_PASSWORD_CHANGE:-true}
      TIGRBL_AUTH_ADMIN_PASSWORD_RESET_DEBUG_DISCLOSURE: "true"
      TIGRBL_AUTH_ADMIN_API_KEY: ${TIGRBL_AUTH_ADMIN_API_KEY:-}
      PG_HOST: ""
      PG_PORT: "5432"
      PG_DB: ""
      PG_USER: ""
      PG_PASS: ""
      REDIS_HOST: ""
      REDIS_PASSWORD: ""
    restart: unless-stopped

  admin-uix:
    build:
      context: ../pkgs/105-ui/admin-uix
      dockerfile: Dockerfile
    image: tigrbl-auth-admin-uix-local:latest
    container_name: tigrbl-auth-admin-uix-local
    ports:
      - "8081:80"
    environment:
      TIGRBL_AUTH_BACKEND_UPSTREAM: http://tigrbl-auth:8000
    depends_on:
      - tigrbl-auth
    restart: unless-stopped

  public-uix:
    build:
      context: ../pkgs/105-ui/public-uix
      dockerfile: Dockerfile
    image: tigrbl-auth-public-uix-local:latest
    container_name: tigrbl-auth-public-uix-local
    ports:
      - "8082:80"
    environment:
      TIGRBL_AUTH_BACKEND_UPSTREAM: http://tigrbl-auth:8000
    depends_on:
      - tigrbl-auth
    restart: unless-stopped
