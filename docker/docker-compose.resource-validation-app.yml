name: tigrbl_auth_resource_validation_api_dev

services:
  resource-validation-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev-resource-validation-app
    image: tigrbl-auth-resource-validation-app-dev:latest
    container_name: tigrbl-auth-resource-validation-app-dev
    ports:
      - "8014:8000"
    environment:
      TIGRBL_AUTH_PROFILE: ${TIGRBL_AUTH_PROFILE:-production}
      AUTHN_ISSUER: ${AUTHN_ISSUER:-http://localhost:8014}
      TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER: ${TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER:-http://localhost:8014/resource}
      TIGRBL_AUTH_REQUIRE_TLS: "false"
      TIGRBL_AUTH_SESSION_COOKIE_FORCE_SECURE: "false"
      TIGRBL_AUTH_ENABLE_RFC9207: "false"
      PG_HOST: ""
      PG_PORT: "5432"
      PG_DB: ""
      PG_USER: ""
      PG_PASS: ""
      REDIS_HOST: ""
      REDIS_PASSWORD: ""
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/.well-known/jwks.json', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
