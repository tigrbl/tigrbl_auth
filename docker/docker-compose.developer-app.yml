name: tigrbl_auth_developer_api_dev

services:
  developer-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev-developer-app
    image: tigrbl-auth-developer-app-dev:latest
    container_name: tigrbl-auth-developer-app-dev
    ports:
      - "8017:8000"
    environment:
      TIGRBL_AUTH_PROFILE: ${TIGRBL_AUTH_PROFILE:-production}
      AUTHN_ISSUER: ${AUTHN_ISSUER:-http://localhost:8017}
      TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER: ${TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER:-http://localhost:8017/resource}
      TIGRBL_AUTH_REQUIRE_TLS: "false"
      TIGRBL_AUTH_ADMIN_API_KEY: ${TIGRBL_AUTH_ADMIN_API_KEY:-dev-developer-key}
      TIGRBL_AUTH_ADMIN_API_KEY_DIR: /tmp/tigrbl-auth-developer
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_USERNAME: admin
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_EMAIL: admin@example.test
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_PASSWORD: AdminPass123!
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_TENANT_SLUG: public
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_FORCE_PASSWORD_CHANGE: "false"
      PG_HOST: ""
      PG_PORT: "5432"
      PG_DB: ""
      PG_USER: ""
      PG_PASS: ""
      REDIS_HOST: ""
      REDIS_PASSWORD: ""
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openrpc.json', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
