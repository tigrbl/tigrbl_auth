schema_version: 1
package: tigrbl_auth
target_family: rfc
scope: extension
targets:
- id: jose.pop-cnf
  label: RFC 7800
  title: Proof-of-Possession Key Semantics for JSON Web Tokens (JWTs)
  quarantine_reason: Optional hardening extension not yet promoted into the certified
    core boundary.
  modules:
  - tigrbl_auth/standards/jose/rfc7800.py
- id: set.core
  label: RFC 8417
  title: Security Event Token (SET)
  quarantine_reason: Outside the default OAuth 2.0 / OIDC auth-server certification
    boundary.
  modules:
  - pkgs/10-concrete/tigrbl-set-concrete/src/tigrbl_set_concrete/__init__.py
  - pkgs/50-protocols/tigrbl-security-event-protocol-set/src/tigrbl_security_event_protocol_set/__init__.py
- id: webpush.encryption
  label: RFC 8291
  title: Message Encryption for Web Push
  quarantine_reason: Web Push is not part of the certified auth-core boundary.
  modules:
  - tigrbl_auth/extensions/rfc8291.py
- id: webauthn.algorithms
  label: RFC 8812
  title: Web Authentication (WebAuthn) Cryptographic Algorithms
  quarantine_reason: WebAuthn is extension work and not part of the default certified
    boundary.
  modules:
  - tigrbl_auth/extensions/rfc8812.py
- id: webauthn.rp-level2
  label: WebAuthn Level 2 relying-party implementation
  title: W3C Web Authentication Level 2 relying-party ceremonies
  quarantine_reason: Implementation is tested internally but no external FIDO conformance or certification claim is made.
  modules:
  - pkgs/50-protocols/tigrbl-auth-protocol-webauthn/src/tigrbl_auth_protocol_webauthn
  - pkgs/80-apis/tigrbl-auth-api-webauthn/src/tigrbl_auth_api_webauthn
- id: fido2.server-profile
  label: FIDO2 server implementation profile
  title: FIDO2 server requirements and capability mapping
  quarantine_reason: Profile mapping is implemented but external certification evidence is not yet attached.
  modules:
  - pkgs/50-protocols/tigrbl-auth-profile-fido2-server/src/tigrbl_auth_profile_fido2_server
- id: dns.privacy
  label: RFC 8932
  title: Recommendations for DNS Privacy Service Operators
  quarantine_reason: RFC 8932 is not an OAuth/OIDC auth-core target and remains quarantined
    from certification claims.
  modules:
  - tigrbl_auth/extensions/rfc8932.py
