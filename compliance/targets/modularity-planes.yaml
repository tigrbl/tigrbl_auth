schema_version: 2
package: tigrbl_auth
planes:
  routers:
    responsibility: closed, mountable HTTP carriers over owned operations and tables
    modules:
    - pkgs/80-routers
    boundary: certified_core
  backend_apps:
    responsibility: deployable application composition of routers, tables, operations, and hooks
    modules:
    - pkgs/90-backend-apps
    boundary: certified_core
  runtime:
    responsibility: carrier-neutral process and deployment composition
    modules:
    - pkgs/60-runtime
    boundary: certified_core
  facade:
    responsibility: downward-only compatibility and stable public entrypoints
    modules:
    - pkgs/70-facade
    boundary: legacy_transition
  uix_core:
    responsibility: reusable frontend transport, authentication, and presentation primitives
    modules:
    - pkgs/100-uix-core
    boundary: certified_core
  ui_apps:
    responsibility: deployable user-interface applications
    modules:
    - pkgs/105-ui
    boundary: certified_core
  tests:
    responsibility: verification and conformance evidence
    modules:
    - pkgs/110-tests
    boundary: governance_plane
  examples:
    responsibility: executable usage demonstrations
    modules:
    - pkgs/120-examples
    boundary: governance_plane
