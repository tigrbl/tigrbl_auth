    - RFC 8707
    - RFC 9101
    - RFC 9126
    - RFC 9396
    - RFC 9449
    - RFC 9700
    - OIDC Front-Channel Logout
    - OIDC Back-Channel Logout
  runtime-completion-required:
    count: 4
    targets:
    - ASGI 3 application package
    - 'Runner profile: Uvicorn'
    - 'Runner profile: Hypercorn'
    - 'Runner profile: Tigrcorn'
  operator-completion-required:
    count: 5
    targets:
    - CLI operator surface
    - Bootstrap and migration lifecycle
    - Key lifecycle and JWKS publication
    - Import/export portability
    - Release bundle and signature verification
boundary_freeze:
  decision_id: BND-012
  adr: docs/adr/ADR-0029-certification-closeout-boundary-freeze.md
  effective_date: '2026-03-26'
  status: frozen-for-certification-closeout
  source_of_truth: compliance/targets/certification_scope.yaml
  enforced_by_checks:
  - claims_linter
  - boundary-scope-freeze
  release_gates:
  - gate-05-governance
  - gate-15-boundary-enforcement
  - gate-90-release
  retained_target_count: 48
  retained_rfc_target_count: 30
  retained_non_rfc_target_count: 18
  retained_bucket_counts:
    baseline-certifiable-now: 15
    production-completion-required: 13
    hardening-completion-required: 11
    runtime-completion-required: 4
    operator-completion-required: 5
  deferred_target_count: 25
  retained_target_identity_hash: b5caac77a8e8bc398c8d4679049f525d94ad701cd345eaa51498567972ce9f60
  retained_rfc_target_identity_hash: 0ad8e089ffb79da0729f5553d27762810d5e2819b43b6de2c6646f96e25ee60f
  retained_non_rfc_target_identity_hash: ed5c67dd36ad0698c670540dd5ad267b21ce46fe5e1ab97269539bca3d40b3be
  deferred_target_identity_hash: b7426807796854ea03f91a3dc1c98df9734de3f80b486e3e21e04792b3e17590
  no_target_count_drift_during_closeout: true
  closeout_scope_expansion_requires_separate_program: true
  fully_featured_claim_boundary_fixed: true
  prohibited_expansions:
  - RFC 7800
  - RFC 8417
  - RFC 8291
  - RFC 8812
  - RFC 8932
  - OAuth 2.1 alignment profile
  - SAML IdP/SP
  - LDAP/AD federation
  - SCIM
  - policy-platform/federation breadth outside the declared boundary
  notes:
  - Do not widen the retained 48-target certification boundary during closeout.
  - Do not silently reclassify deferred, alignment-only, or out-of-scope items as
    part of the fully featured claim.
  - Any broader business claim requires a separate scope-expansion program with updated
    manifests, mappings, tests, evidence, and peer obligations.
