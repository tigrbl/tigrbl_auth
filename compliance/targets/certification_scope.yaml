bucket_interpretation:
  baseline-certifiable-now: Baseline certification candidate set. This is a scope
    bucket, not a Tier 3 or Tier 4 promotion.
  production-completion-required: In-scope production RFC/OIDC targets that still
    require route, persistence, runtime, or evidence completion.
  hardening-completion-required: In-scope hardening RFC/OIDC targets that still require
    runtime enforcement, public surface completion, or evidence completion.
  runtime-completion-required: In-scope ASGI application and runner-profile targets
    required before the package can truthfully claim a fully featured runtime boundary.
  operator-completion-required: In-scope CLI/operator/release targets required before
    the package can truthfully claim a fully featured package boundary.
  out-of-scope/deferred: Quarantined extension, alignment-only, or explicitly deferred
    capabilities that are excluded from the default certification claim boundary.
scope_buckets:
  baseline-certifiable-now:
    count: 15
    targets:
    - RFC 6749
    - RFC 6750
    - RFC 7636
    - RFC 8414
    - RFC 8615
    - RFC 7515
    - RFC 7516
    - RFC 7517
    - RFC 7518
    - RFC 7519
    - RFC 6265
    - OIDC Core 1.0
