schema_version: 2
canonical_path: compliance/mappings/test_classification.yaml
legacy_compatibility_path: compliance/mappings/test-classification.yaml
allowed_categories:
- unit
- integration
- conformance
- interop
- e2e
- security
- negative
- security-negative
- migration-portability
- peer
- perf
category_descriptions:
  unit: Single-module, low-dependency correctness checks.
  integration: Cross-module or persistence-backed flow checks with durable state and mounted surfaces.
  conformance: Protocol and contract conformance checks by deployment profile.
  interop: Independent peer-profile and compatibility checks.
  e2e: Release-path and documentation-driven end-to-end flows.
  security: Release trust, signing, and security-control checks.
  negative: Abuse, rejection, and deny-path assertions.
  security-negative: Certification-grade security abuse and deny-path replay assertions.
  migration-portability: Deterministic migration upgrade, downgrade, and backend portability assertions.
  peer: Independent peer-validation and external counterpart evidence assertions.
  perf: Artifact and release-footprint budget checks.
auxiliary_directory_aliases:
  tests/examples: e2e
