name: monorepo-package-release-trusted

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package name to tag, or all.
        required: false
        default: all
      bump_type:
        description: Semver bump to apply before build, publish, and release.
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - finalize
      version:
        description: Optional exact version to set before release. Overrides bump_type.
        required: false
        default: ""
      force:
        description: Replace existing package tags.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: monorepo-package-release-trusted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-package-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      sha: ${{ steps.revision.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump selected package versions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          root = pathlib.Path(".").resolve()
          selected = "${{ inputs.package }}"
          exact_version = "${{ inputs.version }}"
          bump_type = "${{ inputs.bump_type }}"
          packages = []
          for pyproject in sorted((root / "pkgs").glob("*/pyproject.toml")):
              data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
              name = data["project"]["name"]
              if selected == "all" or selected == name:
                  packages.append((name, pyproject))
          if not packages:
              raise SystemExit(f"unknown package {selected!r}")
          for name, pyproject in packages:
              args = [sys.executable, "scripts/bump_pyproject_version.py"]
              if exact_version:
                  args.extend(["--set", exact_version])
              else:
                  args.extend(["--bump", bump_type])
              args.append(str(pyproject))
              print(f"::notice::Bumping {name} via {' '.join(args)}")
              subprocess.run(args, check=True)
          PY
      - name: Commit and push version bumps
        shell: bash
        run: |
          set -euo pipefail
          git add pkgs/*/pyproject.toml
          if git diff --cached --quiet; then
            echo "::notice::No version changes to commit."
          else
            git commit -m "Bump trusted release package versions"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
      - name: Build bumped package matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          python scripts/monorepo_release.py test-matrix --package "${{ inputs.package }}" --python-version 3.12
      - name: Capture bumped revision
        id: revision
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-package-tags:
    needs: bump-package-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump-package-versions.outputs.sha }}
          fetch-depth: 0
      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create package release tags
        shell: bash
        run: |
          set -euo pipefail
          args=(--package "${{ inputs.package }}")
          if [[ "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          python scripts/monorepo_release.py create-tags "${args[@]}"

  resolve-dispatch-matrix:
    needs:
      - bump-package-versions
      - create-package-tags
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ needs.bump-package-versions.outputs.matrix }}
      count: ${{ needs.bump-package-versions.outputs.count }}
      sha: ${{ needs.bump-package-versions.outputs.sha }}
    steps:
      - name: Use bumped matrix
        run: echo "Using bumped package matrix."

  build-dispatch-package:
    if: ${{ needs.resolve-dispatch-matrix.outputs.count != '0' }}
    needs: resolve-dispatch-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.resolve-dispatch-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-dispatch-matrix.outputs.sha }}
      - name: Build package distribution
        uses: cobycloud/actions/actions/python-package-build@aca75c25fa57e8c58ea9a333d0a4b5f25d9f8b0f
        with:
          python-version: "3.12"
          project-path: ${{ matrix.package.path }}
          out-dir: dist/${{ matrix.package.name }}
          upload-artifact: "true"
          artifact-name: python-dist-${{ matrix.package.name }}

  publish-dispatch-package:
    if: ${{ needs.resolve-dispatch-matrix.outputs.count != '0' }}
    needs:
      - resolve-dispatch-matrix
      - build-dispatch-package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.resolve-dispatch-matrix.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist-${{ matrix.package.name }}
          path: dist/${{ matrix.package.name }}
      - name: Publish package to PyPI with Trusted Publishing
        uses: cobycloud/actions/actions/pypi-trusted-publish@aca75c25fa57e8c58ea9a333d0a4b5f25d9f8b0f
        with:
          packages-dir: dist/${{ matrix.package.name }}
          skip-existing: "true"

  github-release-dispatch:
    if: ${{ needs.resolve-dispatch-matrix.outputs.count != '0' }}
    needs:
      - resolve-dispatch-matrix
      - publish-dispatch-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.resolve-dispatch-matrix.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist-${{ matrix.package.name }}
          path: dist/${{ matrix.package.name }}
      - name: Create package GitHub release
        uses: cobycloud/actions/actions/github-release@aca75c25fa57e8c58ea9a333d0a4b5f25d9f8b0f
        with:
          tag-name: ${{ matrix.package.tag }}
          name: ${{ matrix.package.tag }}
          body: |
            Package: `${{ matrix.package.name }}`
            Version: `${{ matrix.package.version }}`
            Distribution path: `${{ matrix.package.path }}`
          files: |
            dist/${{ matrix.package.name }}/*.whl
            dist/${{ matrix.package.name }}/*.tar.gz
          draft: "false"
          prerelease: ${{ contains(matrix.package.version, '.dev') && 'true' || 'false' }}
          make-latest: "false"
