name: reusable release bundle

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      contracts-artifact-name:
        required: false
        type: string
        default: generated-contracts
      evidence-artifact-name:
        required: false
        type: string
        default: compliance-evidence
      release-bundle-artifact-name:
        required: false
        type: string
        default: release-bundles
      dist-artifact-name:
        required: false
        type: string
        default: python-dist
      sbom-artifact-name:
        required: false
        type: string
        default: sbom

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Download contracts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.contracts-artifact-name }}
          path: .
      - name: Download evidence
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.evidence-artifact-name }}
          path: .
      - name: Install build toolchain
        shell: bash
        run: python -m pip install --upgrade pip uv cyclonedx-bom
      - name: Build Python distributions
        shell: bash
        run: uv build
      - name: Generate SBOM
        shell: bash
        run: |
          mkdir -p dist/sbom
          uv export --format requirements.txt --no-hashes --all-extras -o dist/sbom/tigrbl_auth.requirements.txt
          cyclonedx-py requirements -i dist/sbom/tigrbl_auth.requirements.txt -o dist/sbom/tigrbl_auth.cdx.json
      - name: Build and verify release bundles
        shell: bash
        run: |
          uv run python scripts/build_release_bundle.py
          uv run python scripts/sign_release_bundle.py
          uv run python scripts/verify_release_signing.py
      - name: Upload Python wheels
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.dist-artifact-name }}
          if-no-files-found: error
          path: dist/*.whl
      - name: Upload Python sdist
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.dist-artifact-name }}-sdist
          if-no-files-found: error
          path: dist/*.tar.gz
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.sbom-artifact-name }}
          if-no-files-found: error
          path: dist/sbom/*.json
      - name: Upload release bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.release-bundle-artifact-name }}
          if-no-files-found: error
          path: dist/release-bundles

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.contracts-artifact-name }}
          path: contracts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}
          path: dist-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}-sdist
          path: sdist-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.sbom-artifact-name }}
          path: sbom-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.release-bundle-artifact-name }}
          path: release-bundle-artifacts
      - name: Attest wheels
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-wheel
          subject-path: dist-artifacts/*.whl
      - name: Attest sdists
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-sdist
          subject-path: sdist-artifacts/*.tar.gz
      - name: Attest SBOMs
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-sbom
          subject-path: sbom-artifacts/*.json
      - name: Attest release bundle manifests
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-release-bundle
          subject-path: |
            release-bundle-artifacts/**/*.json
            release-bundle-artifacts/**/*.yaml

  verify:
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      attestations: read
      artifact-metadata: read
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.contracts-artifact-name }}
          path: contracts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}
          path: dist-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}-sdist
          path: sdist-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.sbom-artifact-name }}
          path: sbom-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.release-bundle-artifact-name }}
          path: release-bundle-artifacts
      - name: Verify contract attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            find contracts/specs/openapi contracts/specs/openrpc contracts/specs/discovery -type f -name '*.json'
            find contracts/compliance/claims contracts/compliance/evidence -type f -name '*.yaml'
          } | sort | while IFS= read -r subject; do
            gh attestation verify "$subject" --repo "$GITHUB_REPOSITORY"
          done
      - name: Verify wheel attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify dist-artifacts/*.whl --repo "$GITHUB_REPOSITORY"
      - name: Verify sdist attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify sdist-artifacts/*.tar.gz --repo "$GITHUB_REPOSITORY"
      - name: Verify SBOM attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify sbom-artifacts/*.json --repo "$GITHUB_REPOSITORY"
      - name: Verify release bundle attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r subject; do
            gh attestation verify "$subject" --repo "$GITHUB_REPOSITORY"
          done < <(find release-bundle-artifacts -type f \( -name '*.json' -o -name '*.yaml' \) | sort)
