name: recertify

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

concurrency:
  group: recertify-${{ github.ref || 'scheduled' }}
  cancel-in-progress: false

jobs:
  certification-matrix:
    uses: ./.github/workflows/_certification-matrix.yml
    permissions:
      contents: read

  evidence:
    needs: certification-matrix
    uses: ./.github/workflows/_evidence.yml
    permissions:
      contents: read
    with:
      python-version: '3.11'
      artifact-name: compliance-evidence

  recertification:
    needs: evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install recertification toolchain
        shell: bash
        run: python -m pip install --upgrade pip uv PyYAML
      - name: Run recertification check
        shell: bash
        run: uv run python scripts/run_recertification.py
      - name: Upload recertification artifacts
        uses: actions/upload-artifact@v7
        with:
          name: recertification-report
          if-no-files-found: error
          path: |
            docs/compliance/recertification_report.json
            docs/compliance/recertification_report.md
