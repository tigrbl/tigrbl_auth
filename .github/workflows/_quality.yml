name: reusable quality

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      run-dependency-review:
        required: false
        type: boolean
        default: false
      run-codeql:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ inputs.run-dependency-review && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  governance-and-devtest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install toolchain
        shell: bash
        run: python -m pip install --upgrade pip tox uv
      - name: Verify canonical registries
        shell: bash
        run: uv run python scripts/generate_claim_registries.py --verify
      - name: Verify current-state truth chain
        shell: bash
        run: uv run python scripts/verify_truth_chain.py --mode current-state
      - name: Run devtest lane
        shell: bash
        run: tox -e py311-devtest

  codeql:
    if: ${{ inputs.run-codeql }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:python
