name: pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    with:
      python-version: '3.11'
      run-dependency-review: true
      run-codeql: true

  contracts:
    uses: ./.github/workflows/_contracts.yml
    permissions:
      attestations: write
      contents: read
      id-token: write
    with:
      python-version: '3.11'
      artifact-name: generated-contracts
      attest: false
