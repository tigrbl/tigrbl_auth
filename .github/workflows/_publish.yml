name: reusable publish

on:
  workflow_call:
    inputs:
      dist-artifact-name:
        required: false
        type: string
        default: python-dist

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      attestations: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.dist-artifact-name }}-sdist
          path: dist
      - name: Verify GitHub artifact attestations before publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify dist/*.whl --repo "$GITHUB_REPOSITORY"
          gh attestation verify dist/*.tar.gz --repo "$GITHUB_REPOSITORY"
      - name: Publish to PyPI with Trusted Publishing
        uses: cobycloud/actions/actions/pypi-publish@aca75c25fa57e8c58ea9a333d0a4b5f25d9f8b0f
        with:
          packages-dir: dist
