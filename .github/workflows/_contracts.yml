name: reusable contracts

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      artifact-name:
        required: false
        type: string
        default: generated-contracts
      attest:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install contract toolchain
        shell: bash
        run: python -m pip install --upgrade pip uv PyYAML cryptography pydantic pydantic-settings python-dotenv
      - name: Generate contracts and manifests
        shell: bash
        run: uv run python scripts/generate_effective_release_manifests.py
      - name: Validate OpenAPI contract
        shell: bash
        run: uv run python scripts/validate_openapi_contract.py
      - name: Validate OpenRPC contract
        shell: bash
        run: uv run python scripts/validate_openrpc_contract.py
      - name: Diff executable contracts
        shell: bash
        run: uv run python scripts/diff_contracts.py
      - name: Upload generated contracts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          if-no-files-found: error
          path: |
            specs/openapi
            specs/openrpc
            specs/discovery
            compliance/claims/effective-target-claims.*
            compliance/evidence/effective-release-evidence.*

  attest-contracts:
    if: ${{ inputs.attest }}
    needs: build-contracts
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: contracts
      - name: Attest generated contracts and manifests
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ github.event.repository.name }}-contracts
          subject-path: |
            contracts/specs/openapi/**/*.json
            contracts/specs/openrpc/**/*.json
            contracts/specs/discovery/**/*.json
            contracts/compliance/claims/*.yaml
            contracts/compliance/evidence/*.yaml

  verify-contract-attestations:
    if: ${{ inputs.attest }}
    needs: attest-contracts
    runs-on: ubuntu-latest
    permissions:
      attestations: read
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: contracts
      - name: Verify contract attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r subject; do
            gh attestation verify "$subject" --repo "$GITHUB_REPOSITORY"
          done < <(find contracts/specs -type f \( -name '*.json' -o -name '*.yaml' \) | sort)
