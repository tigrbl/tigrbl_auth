name: reusable evidence

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      artifact-name:
        required: false
        type: string
        default: compliance-evidence

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Download validated artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: validated-*
          path: .artifacts/validated-downloads
      - name: Install toolchain
        shell: bash
        run: python -m pip install --upgrade pip tox uv
      - name: Generate evidence and state reports
        shell: bash
        env:
          TIGRBL_AUTH_VALIDATED_ARTIFACT_DOWNLOAD_ROOT: .artifacts/validated-downloads
        run: |
          uv run python scripts/generate_effective_release_manifests.py
          uv run python scripts/generate_certification_evidence_index.py
          uv run python scripts/generate_state_reports.py
          uv run python scripts/run_release_gates.py
          uv run python scripts/verify_truth_chain.py --mode all
      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          if-no-files-found: error
          path: |
            docs/compliance
            compliance/evidence
            compliance/claims/repository-state.yaml
            CURRENT_STATE.md
            CERTIFICATION_STATUS.md
