name: tigrbl_auth clean-room certification matrix

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  base:
    name: base / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-base
          - python-version: '3.11'
            toxenv: py311-base
          - python-version: '3.12'
            toxenv: py312-base
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run clean-room base smoke
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload runtime profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            docs/compliance/current_state_report.json
            docs/compliance/current_state_report.md
            docs/compliance/certification_state_report.json
            docs/compliance/certification_state_report.md
            dist/install-substrate
            dist/runtime-smoke
            dist/runtime-profiles
            dist/validated-runs

  sqlite-uvicorn:
    name: sqlite+uvicorn / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-sqlite-uvicorn
          - python-version: '3.11'
            toxenv: py311-sqlite-uvicorn
          - python-version: '3.12'
            toxenv: py312-sqlite-uvicorn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run SQLite + Uvicorn clean-room smoke
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload runtime profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            docs/compliance/current_state_report.json
            docs/compliance/current_state_report.md
            docs/compliance/certification_state_report.json
            docs/compliance/certification_state_report.md
            dist/install-substrate
            dist/runtime-smoke
            dist/runtime-profiles
            dist/validated-runs

  postgres-hypercorn:
    name: postgres+hypercorn / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tigrbl_auth_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tigrbl_auth_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-postgres-hypercorn
          - python-version: '3.11'
            toxenv: py311-postgres-hypercorn
          - python-version: '3.12'
            toxenv: py312-postgres-hypercorn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run PostgreSQL + Hypercorn clean-room smoke
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload runtime profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            docs/compliance/current_state_report.json
            docs/compliance/current_state_report.md
            docs/compliance/certification_state_report.json
            docs/compliance/certification_state_report.md
            dist/install-substrate
            dist/runtime-smoke
            dist/runtime-profiles
            dist/validated-runs

  tigrcorn:
    name: tigrcorn / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.11'
            toxenv: py311-tigrcorn
          - python-version: '3.12'
            toxenv: py312-tigrcorn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run Tigrcorn clean-room smoke
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload runtime profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            docs/compliance/current_state_report.json
            docs/compliance/current_state_report.md
            docs/compliance/certification_state_report.json
            docs/compliance/certification_state_report.md
            dist/install-substrate
            dist/runtime-smoke
            dist/runtime-profiles
            dist/validated-runs

  devtest:
    name: devtest / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-devtest
          - python-version: '3.11'
            toxenv: py311-devtest
          - python-version: '3.12'
            toxenv: py312-devtest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run dev/test clean-room smoke
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload runtime profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            docs/compliance/current_state_report.json
            docs/compliance/current_state_report.md
            docs/compliance/certification_state_report.json
            docs/compliance/certification_state_report.md
            dist/install-substrate
            dist/runtime-smoke
            dist/runtime-profiles
            dist/validated-runs
