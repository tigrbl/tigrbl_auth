commands:
- name: serve
  help: Launch the selected runner-backed ASGI runtime.
  description: Resolve deployment, materialize a runner-qualified runtime plan, validate
    the selected profile, and optionally launch runtime.
  handler: serve
  aliases: []
  include_global: true
  global_flags:
  - config
  - env_file
  - profile
  - tenant
  - issuer
  - surface_set
  - slice
  - extension
  - plugin_mode
  - runtime_style
  - strict
  - no_strict
  - format
  - output
  - verbose
  - trace
  flags:
  - repo_root
  - report_dir
  - environment
  - server
  - host
  - port
  - workers
  - uds
  - log_level
  - access_log
  - proxy_headers
  - lifespan
  - graceful_timeout
  - pid_file
  - health
  - metrics
  - public
  - admin
  - rpc
  - diagnostics
  - require_tls
  - enable_mtls
  - cookies
  - jwks_refresh_seconds
  - dry_run
  - check
  - db_safe_start
  - uvicorn_loop
  - uvicorn_http
  - uvicorn_ws
  - hypercorn_worker_class
  - hypercorn_http2
  - tigrcorn_contract
  - tigrcorn_mode
  verbs: []
  family: runtime
  examples:
  - tigrbl-auth serve --server uvicorn --check
  - tigrbl-auth serve --server hypercorn --host 0.0.0.0 --port 8443
  - tigrbl-auth serve --server tigrcorn --dry-run --format yaml
  output:
    name: runtime-launch
    description: Runtime plan, runner diagnostics, and launch/evidence metadata.
    fields:
    - command
    - server
    - launch_mode
    - runtime_plan
    - selected_runner_profile
    - runner_profile_report_paths
    media_types:
    - json
    - yaml
    - text
  exit_codes:
  - code: 0
    meaning: Operation completed successfully.
  - code: 1
    meaning: Operation failed or verification did not pass.
  - code: 2
    meaning: CLI argument or contract validation failed before execution.
- name: verify
  help: Run verification scopes against the repository boundary.
  description: Execute one or more verification scopes and emit structured results.
  handler: verify
  aliases: []
  include_global: true
  global_flags:
  - config
  - env_file
  - profile
  - tenant
  - issuer
  - surface_set
  - slice
  - extension
  - plugin_mode
  - runtime_style
  - strict
  - no_strict
  - format
  - output
  - verbose
  - trace
  flags:
  - repo_root
  - report_dir
  - scope
  verbs: []
  family: governance
  examples: []
  output:
    name: verification-report
    description: Verification result payload with summary, failures, and warnings.
    fields:
    - command
    - passed
    - summary
