name: tigrbl_auth release gates

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clean-room-matrix:
    name: ${{ matrix.toxenv }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tigrbl_auth_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tigrbl_auth_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-base
          - python-version: '3.11'
            toxenv: py311-base
          - python-version: '3.12'
            toxenv: py312-base
          - python-version: '3.10'
            toxenv: py310-sqlite-uvicorn
          - python-version: '3.11'
            toxenv: py311-sqlite-uvicorn
          - python-version: '3.12'
            toxenv: py312-sqlite-uvicorn
          - python-version: '3.10'
            toxenv: py310-postgres-hypercorn
          - python-version: '3.11'
            toxenv: py311-postgres-hypercorn
          - python-version: '3.12'
            toxenv: py312-postgres-hypercorn
          - python-version: '3.11'
            toxenv: py311-tigrcorn
          - python-version: '3.12'
            toxenv: py312-tigrcorn
          - python-version: '3.10'
            toxenv: py310-devtest
          - python-version: '3.11'
            toxenv: py311-devtest
          - python-version: '3.12'
            toxenv: py312-devtest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run clean-room matrix env
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload validated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            dist/validated-runs
            docs/compliance/install_substrate_report.json
            docs/compliance/install_substrate_report.md
            docs/compliance/runtime_profile_report.json
            docs/compliance/runtime_profile_report.md
            dist/install-substrate
            dist/runtime-smoke

  certification-lanes:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tigrbl_auth_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tigrbl_auth_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310-test-core
          - python-version: '3.11'
            toxenv: py311-test-core
          - python-version: '3.12'
            toxenv: py312-test-core
          - python-version: '3.10'
            toxenv: py310-test-integration
          - python-version: '3.11'
            toxenv: py311-test-integration
          - python-version: '3.12'
            toxenv: py312-test-integration
          - python-version: '3.10'
            toxenv: py310-test-conformance
          - python-version: '3.11'
            toxenv: py311-test-conformance
          - python-version: '3.12'
            toxenv: py312-test-conformance
          - python-version: '3.10'
            toxenv: py310-test-security-negative
          - python-version: '3.11'
            toxenv: py311-test-security-negative
          - python-version: '3.12'
            toxenv: py312-test-security-negative
          - python-version: '3.10'
            toxenv: py310-test-interop
          - python-version: '3.11'
            toxenv: py311-test-interop
          - python-version: '3.12'
            toxenv: py312-test-interop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run certification lane
        run: tox -e ${{ matrix.toxenv }}
      - name: Upload validated lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-${{ matrix.toxenv }}
          if-no-files-found: error
          path: |
            dist/validated-runs
            docs/compliance
            dist/migration-portability
            dist/test-reports
            dist/install-substrate
            dist/runtime-smoke

  migration-portability:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tigrbl_auth_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tigrbl_auth_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run migration portability validation
        run: tox -e py311-migration-portability
      - name: Upload migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-py311-migration-portability
          if-no-files-found: error
          path: |
            dist/validated-runs
            docs/compliance
            dist/migration-portability
            dist/test-reports

  final-certification:
    needs:
      - clean-room-matrix
      - certification-lanes
      - migration-portability
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tigrbl_auth_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tigrbl_auth_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/tigrbl_auth_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download validated artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: validated-*
          path: .artifacts/validated-downloads
      - name: Install toolchain
        run: python -m pip install --upgrade pip tox uv
      - name: Run final certification gates
        env:
          TIGRBL_AUTH_VALIDATED_ARTIFACT_DOWNLOAD_ROOT: .artifacts/validated-downloads
        run: tox -e py311-final-certification
      - name: Verify truth chain
        run: python scripts/verify_truth_chain.py --mode all
      - name: Upload compliance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifacts-py311-final-certification
          if-no-files-found: error
          path: |
            docs/compliance
            specs/cli
            specs/openapi
            specs/openrpc
            specs/discovery
            dist/validated-runs
            dist/install-substrate
            dist/runtime-smoke
            dist/test-reports
            dist/migration-portability
            dist/release-bundles
            constraints/dependency-lock.json
            tox.ini
