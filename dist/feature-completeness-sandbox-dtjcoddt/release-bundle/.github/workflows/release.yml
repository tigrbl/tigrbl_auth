name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    if: ${{ !contains(github.ref_name, '-rc') }}
    uses: ./.github/workflows/_quality.yml
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      python-version: '3.11'
      run-codeql: true

  contracts:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: quality
    uses: ./.github/workflows/_contracts.yml
    permissions:
      attestations: write
      contents: read
      id-token: write
    with:
      python-version: '3.11'
      artifact-name: generated-contracts
      attest: true

  certification-matrix:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: contracts
    uses: ./.github/workflows/_certification-matrix.yml
    permissions:
      contents: read

  evidence:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: certification-matrix
    uses: ./.github/workflows/_evidence.yml
    permissions:
      contents: read
    with:
      python-version: '3.11'
      artifact-name: compliance-evidence

  release-bundle:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs:
      - contracts
      - evidence
    uses: ./.github/workflows/_release-bundle.yml
    permissions:
      attestations: write
      contents: read
      id-token: write
    with:
      python-version: '3.11'
      contracts-artifact-name: generated-contracts
      evidence-artifact-name: compliance-evidence
      release-bundle-artifact-name: release-bundles
      dist-artifact-name: python-dist
      sbom-artifact-name: sbom

  publish:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: release-bundle
    uses: ./.github/workflows/_publish.yml
    permissions:
      attestations: read
      contents: read
      id-token: write
    with:
      dist-artifact-name: python-dist
