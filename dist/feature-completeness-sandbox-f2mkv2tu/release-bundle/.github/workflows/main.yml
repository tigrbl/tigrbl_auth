name: main

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      python-version: '3.11'
      run-dependency-review: false
      run-codeql: true

  contracts:
    needs: quality
    uses: ./.github/workflows/_contracts.yml
    permissions:
      attestations: write
      contents: read
      id-token: write
    with:
      python-version: '3.11'
      artifact-name: generated-contracts
      attest: true

  certification-matrix:
    needs: contracts
    uses: ./.github/workflows/_certification-matrix.yml
    permissions:
      contents: read

  evidence:
    needs: certification-matrix
    uses: ./.github/workflows/_evidence.yml
    permissions:
      contents: read
    with:
      python-version: '3.11'
      artifact-name: compliance-evidence
