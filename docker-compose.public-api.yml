name: tigrbl_auth_public_api_dev

services:
  public-api:
    build:
      context: .
      dockerfile: Dockerfile.dev-public-api
    image: tigrbl-auth-public-api-dev:latest
    container_name: tigrbl-auth-public-api-dev
    ports:
      - "8013:8000"
    environment:
      TIGRBL_AUTH_PROFILE: ${TIGRBL_AUTH_PROFILE:-production}
      AUTHN_ISSUER: ${AUTHN_ISSUER:-http://localhost:8013}
      TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER: ${TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER:-http://localhost:8013/resource}
      TIGRBL_AUTH_REQUIRE_TLS: "false"
      TIGRBL_AUTH_SESSION_COOKIE_FORCE_SECURE: "false"
      TIGRBL_AUTH_ENABLE_RFC9207: "false"
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_USERNAME: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_EMAIL: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@example.test}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_PASSWORD:-AdminPass123!}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_TENANT_SLUG: ${TIGRBL_AUTH_BOOTSTRAP_ADMIN_TENANT_SLUG:-public}
      TIGRBL_AUTH_BOOTSTRAP_ADMIN_FORCE_PASSWORD_CHANGE: "false"
      PG_HOST: ""
      PG_PORT: "5432"
      PG_DB: ""
      PG_USER: ""
      PG_PASS: ""
      REDIS_HOST: ""
      REDIS_PASSWORD: ""
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/.well-known/jwks.json', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
