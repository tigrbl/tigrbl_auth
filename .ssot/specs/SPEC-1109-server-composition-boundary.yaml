body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-server` and shared Tigrbl Auth server composition.
  
  ## First-Class Objects
  
  The package MUST define the app composition abstractions needed for public, admin, diagnostics, and product-specific API assembly, including `ProductSurfaceRegistry`, `ProductApiAssembly`, `IdentityApp`, `AppFactory`, `RouteManifest`, `SurfaceManifest`, `PublicRestSurface`, `AdminRpcSurface`, `DiagnosticsSurface`, `ProtocolPublisher`, `OpenApiPublisher`, `OpenRpcPublisher`, `DiscoveryPublisher`, and `ServerSettings`.
  
  ## Requirements
  
  Server composition owns route/surface mounting, gateway and plugin construction, protocol publisher binding, OpenAPI/OpenRPC projection, and default server settings.
  
  Product API packages MAY be thin wrappers over the shared app factory, but the selected product surface MUST filter public capabilities, admin resources, admin router groups, and OpenRPC methods before runtime exposure.
  
  Server MUST NOT own process runner behavior, CLI/operator workflows, or testkit fixtures.
  
  ## Verification
  
  Verification MUST prove the server can build default and product-specific apps and expose route, surface, publisher, and product-surface manifests without importing operator or testkit.
