body: |-
  ## Overview
  
  Policy Administration UIX defines administrator workflows for RBAC, ABAC, and policy simulation.
  
  ## Required Behavior
  
  - RBAC UIX MUST expose roles, permissions, assignments, and authorization denial states.
  - ABAC UIX MUST expose policies, attributes, subject/resource/action/environment context, and authorization denial states.
  - Policy simulation MUST accept subject, action, resource, tenant, and relevant attributes, then return allow or deny with an explanation.
  - Policy administration MUST be available only to authorized administrators.
  - Policy changes and simulations MUST be auditable.
  
  ## Verification
  
  Verification MUST cover RBAC allow/deny, ABAC allow/deny, missing policy data, authorization denial, simulation explanation output, and audit visibility.
