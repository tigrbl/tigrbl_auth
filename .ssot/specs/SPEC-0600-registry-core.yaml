body: |-
  ## Repository Discriminator
  
  `repo.kind` is required and MUST be one of:
  
  - `ssot-core`
  - `ssot-origin`
  - `extension-pack`
  - `repo-local`
  
  ## Top Level Sections
  
  - `schema_version`
  - `repo`
  - `tooling`
  - `paths`
  - `program`
  - `guard_policies`
  - `document_id_reservations`
  - `features`
  - `profiles`
  - `tests`
  - `claims`
  - `evidence`
  - `issues`
  - `risks`
  - `boundaries`
  - `releases`
  - `adrs`
  - `specs`
  
  ## Adr Spec Row Contract
  
  ADR and SPEC rows MUST include:
  
  - identity/location: `id`, `number`, `slug`, `title`, `path`
  - provenance/materialization: `origin`, `managed`, `immutable`, `package_version`, `content_sha256`
  - lifecycle/supersession: `status`, `supersedes`, `superseded_by`, `status_notes`
  
  Allowed `origin` values:
  
  - `ssot-core`
  - `ssot-origin`
  - `extension-pack`
  - `repo-local`
  
  Provenance SHALL distinguish authority from distribution. In particular:
  
  - `origin` identifies who governs the document truth surface
  - packaging or installability does not by itself imply `ssot-origin`
  - packaged extension catalogs SHALL remain `origin: extension-pack`
  
  SPEC `kind` is a non-provenance label and MUST be one of:
  
  - `normative`
  - `operational`
  - `governance`
  - `local-policy`
spec_kind: "normative"
