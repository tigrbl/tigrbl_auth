body: |-
  ## Scope
  
  This specification governs service-admin authorization and audit behavior for service-admin API operations.
  
  ## Requirements
  
  Service-admin API MUST bind each operation to an actor, tenant namespace, service/resource/workload ownership context, trust-domain context where applicable, and effective service-admin authority. Mutations and sensitive reads MUST evaluate authorization before disclosure or state change.
  
  Service-admin operations MUST emit audit events that identify actor, tenant, service/resource/workload target, credential or token target where applicable, operation, authorization decision, request time, result, and failure reason where applicable.
  
  ## Verification
  
  Verification MUST prove service-admin operations enforce ownership and trust-domain boundaries, deny cross-surface operations, produce audit records for allowed and denied sensitive operations, and prevent cross-tenant audit visibility.
