body: |-
  ## Scope
  
  This specification governs discovery and metadata helper routes exposed to developer workflows.
  
  ## Requirements
  
  Developer API MAY expose read-only issuer, tenant, OAuth authorization-server, and JWKS metadata needed to configure apps and clients. These helpers MUST NOT expose login, authorization, token issuance, tenant lifecycle, platform authority, service identity, diagnostics, or private key material.
  
  Metadata helper responses MUST be consistent with the effective product surface and must not imply that disabled runtime flows are available.
  
  ## Verification
  
  Verification MUST prove developer metadata helpers are present where configured, exclude forbidden public and admin surfaces, and do not leak private or cross-tenant material.
