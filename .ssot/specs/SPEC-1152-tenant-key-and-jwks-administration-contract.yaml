body: |-
  ## Scope
  
  This specification governs tenant-owned signing key and JWKS administration through the tenant-admin API.
  
  ## Requirements
  
  Tenant admins MAY seed, create, update, rotate, retire, delete, list, and publish tenant keys only for their authorized tenant namespace. Tenant JWKS publication MUST expose only active and policy-visible tenant keys and MUST prevent cross-tenant key leakage.
  
  Key mutation workflows MUST record audit events and preserve enough lifecycle metadata for rotation visibility and safe retirement.
  
  ## Verification
  
  Verification MUST prove tenant key CRUD, JWKS publication, rotation visibility, cross-tenant leakage prevention, and tenant audit recording.
