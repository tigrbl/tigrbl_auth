body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-storage`.
  
  ## First-Class Objects
  
  The package MUST define or own storage mappings for:
  
  - `UserTable`
  - `ClientTable`
  - `AppTable`
  - `ServiceTable`
  - `DeviceTable`
  - `MachineTable`
  - `WorkloadTable`
  - `CredentialTable`
  - `ApiKeyTable`
  - `ServiceKeyTable`
  - `SessionTable`
  - `TenantTable`
  - `AuthorizationCodeTable`
  - `DeviceCodeTable`
  - `ConsentTable`
  - `AuditEventTable`
  - `Repository`
  - `UnitOfWork`
  - `Migration`
  - `DatabaseBootstrap`
  - `SqliteProfile`
  - `PostgresProfile`
  
  ## Requirements
  
  Storage owns Tigrbl/SQLAlchemy table mappings, migrations, repository
  implementations, unit-of-work implementations, database bootstrap, SQLite and
  Postgres support, and migration evidence hooks. SQLAlchemy is the default
  implementation substrate, but the package boundary is storage.
  
  Protocol packages MUST NOT import storage.
  
  Server may use storage as the default adapter. Alternate storage adapters MUST
  remain possible.
  
  ## Verification
  
  Verification MUST prove storage imports do not require server/runtime/operator,
  and protocol packages do not import storage.
