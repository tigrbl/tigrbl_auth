body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-storage`.
  
  ## First-Class Objects
  
  The package MUST define or own storage mappings and table-owned operation surfaces for:
  
  - `Realm`
  - `Tenant`
  - `User`
  - `Client`
  - `ClientRegistration`
  - `Service`
  - `ApiKey`
  - `ServiceKey`
  - `AuthSession`
  - `AuthCode`
  - `DeviceCode`
  - `RevokedToken`
  - `TokenRecord`
  - `DelegationGrantRecord`
  - `DelegationGrantScope`
  - `DelegationGrantProof`
  - `DelegationGrantEdge`
  - `DelegationGrantTokenLink`
  - `PushedAuthorizationRequest`
  - `Consent`
  - `AuditEvent`
  - `LogoutState`
  - `KeyRotationEvent`
  - `Repository`
  - `UnitOfWork`
  - `Migration`
  - `DatabaseBootstrap`
  - `SqliteProfile`
  - `PostgresProfile`
  
  ## Requirements
  
  Storage owns Tigrbl/SQLAlchemy table mappings, table-owned domain operations, migrations, repository implementations, unit-of-work implementations, database bootstrap, SQLite and Postgres support, and migration evidence hooks. SQLAlchemy is the default implementation substrate, but the package boundary is storage.
  
  Protocol packages MUST NOT canonically own durable storage-table mutations or lifecycle state transitions. Protocol packages may validate protocol semantics and call table-owned operations.
  
  Server may use storage as the default adapter. Server and REST routers may parse requests, enforce transport dependencies, and shape responses, but durable table behavior MUST be delegated to storage table operations. Alternate storage adapters MUST remain possible.
  
  ## Verification
  
  Verification MUST prove storage imports do not require product frontdoor packages, storage table operations are importable from the owning table modules, protocol/server/router modules do not canonically own storage-table mutations, and protocol packages do not directly own table lifecycle behavior.
