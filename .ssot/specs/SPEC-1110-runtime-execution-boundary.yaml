body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-runtime`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `RuntimeProfile`
  - `RuntimeConfig`
  - `RuntimeManifest`
  - `RunnerProfile`
  - `UvicornRuntime`
  - `HypercornRuntime`
  - `TigrcornRuntime`
  - `LifecycleHook`
  - `HealthCheck`
  - `DiagnosticsEndpoint`
  - `RuntimeAdapter`
  - `ServeCommandPlan`
  - `RuntimeState`
  
  ## Requirements
  
  Runtime runs the app built by server. It owns process lifecycle, runner
  profiles, health and diagnostics wiring, runtime manifests, lifecycle hooks,
  and serve plans.
  
  Runtime MUST NOT own OAuth/OIDC protocol semantics, DB mappings, CLI evidence
  logic, or testkit fixtures.
  
  ## Verification
  
  Verification MUST prove runtime can resolve runner profiles and serve plans
  without importing operator or testkit.
