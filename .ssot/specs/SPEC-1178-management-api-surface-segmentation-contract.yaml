tags: []
summary: "Scope: The Management API product is composed of deployable slices for platform, tenant/organization, developer app/client, and service/workload administration. Requirements: slices may remain separately packaged and product-filtered, but resource ownership and documentation must describe them as Management API segments unless an accepted ADR says otherwise. Platform slice owns tenant lifecycle and platform authority. Tenant slice owns delegated tenant/organization administration. Developer slice owns app and OAuth/OIDC client management. Service/workload slice owns non-human identities, API keys, service keys, and workload credential administration. Cross-cutting governance includes authorization, audit, policy, key lifecycle, and canonical storage composition. Out of scope: public OAuth/OIDC protocol endpoints, RP consumer packages, and protected resource validation runtime."
