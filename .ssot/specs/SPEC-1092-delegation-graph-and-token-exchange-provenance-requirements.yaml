body: |-
  ## Overview
  
  This specification defines durable delegation lineage requirements for token
  exchange and related authorization flows in `tigrbl_auth`.
  
  ## Decision Source
  
  Decision source: `adr:1068`.
  
  ## Graph Model
  
  The governed delegation model MUST be able to represent:
  
  - subjects;
  - actors;
  - clients;
  - resources;
  - trust domains;
  - issued-token lineage;
  - attenuation or narrowing edges; and
  - proof-binding continuity.
  
  ## Runtime Requirements
  
  Token exchange and other delegation-bearing flows MUST persist enough
  governed server-side provenance to reconstruct lineage independently of the
  final token payload.
  
  Provenance MUST preserve parentage, attenuation, actor-subject context,
  trust-domain context, and proof-binding continuity.
  
  ## Verification
  
  Verification MUST prove that downstream audit or verifier tooling can recover
  parentage, attenuation, trust-domain context, and proof continuity from
  governed artifacts.
