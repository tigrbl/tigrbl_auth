body: |-
  ## Overview

  RFC 8785 JSON Canonicalization Scheme (JCS) defines deterministic JSON bytes for cryptographic and reproducibility-sensitive operations. This repository tracks JCS as a governed feature family rather than treating sorted-key JSON serialization as sufficient.

  ## Scope

  The JCS capability applies when a repository surface explicitly requires canonical JSON bytes for signing, hashing, digest comparison, release evidence, or interoperable canonical JSON exchange.

  Compatibility serializers that only need stable local output are out of scope unless they are promoted to claim RFC 8785 behavior.

  ## Requirements

  - JCS input MUST be constrained to I-JSON-compatible data.
  - Parsed JSON text used as JCS input MUST reject duplicate object member names.
  - JSON strings MUST preserve Unicode code points as provided by the application; Unicode normalization MUST NOT be applied as part of JCS canonicalization.
  - Inputs containing invalid Unicode data, including lone surrogate values, MUST fail canonicalization.
  - JSON numbers MUST be representable by IEEE 754 double-precision semantics for JCS use; higher-precision values that must round-trip MUST be modeled as strings before canonicalization.
  - Output MUST emit no whitespace between JSON tokens.
  - Primitive serialization MUST follow the RFC 8785 dependency on ECMAScript JSON serialization semantics.
  - Object properties MUST be sorted deterministically by property name as required by JCS.
  - Canonical output MUST be UTF-8 bytes.
  - APIs claiming JCS support MUST expose failure paths for unsupported input rather than silently falling back to non-JCS JSON.

  ## Verification

  Planned verification MUST include:
  - RFC 8785 example vectors and number serialization samples;
  - duplicate-property rejection for parsed JSON text;
  - invalid Unicode rejection;
  - no-whitespace canonical output checks;
  - object-member ordering checks;
  - UTF-8 byte-output checks;
  - regression coverage showing existing non-JCS serializers are not incorrectly labeled as JCS.

