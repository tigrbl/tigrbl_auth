body: |-
  ## Overview
  
  This specification defines first-class verifier-grade resource contracts for protected-resource behavior in `tigrbl_auth`.
  
  ## Contract Model
  
  A resource verifier contract MUST define verifier identity/version, accepted issuer set, accepted audience or resource indicators, accepted token classes, sender-constraint requirements, replay/freshness expectations, required claims/proof material, and introspection-caller policy.
  
  ## Runtime Requirements
  
  Protected-resource behavior MUST fail closed when issuer, audience, sender-constraint, or required-claim expectations are not satisfied.
  
  Resource validation metadata exposed by Tigrbl Auth SHOULD be available through the resource-validation API surface. That surface MUST expose only validation metadata and validation endpoints such as JWKS, tenant JWKS, discovery, protected-resource metadata, and introspection where enabled. It MUST NOT expose human login, client registration, admin resources, diagnostics, or JSON-RPC.
  
  ## Projection Rules
  
  RFC 9728 protected-resource metadata MUST be derived from the resource verifier contract. Runtime verifier behavior MUST use the same contract source and MUST NOT advertise broader acceptance or weaker proof requirements than runtime enforcement implements.
  
  ## Verification
  
  Verification MUST prove metadata and runtime behavior agree on accepted issuers, audience expectations, proof requirements, introspection-caller policy, failure semantics, and resource-validation API surface exclusions.
