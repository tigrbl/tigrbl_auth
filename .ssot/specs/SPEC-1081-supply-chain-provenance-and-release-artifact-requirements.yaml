body: |-
  ## Requirements
  
  The repository MUST define release and provenance requirements for:
  - NIST SP 800-218 SSDF
  - SLSA
  - in-toto
  - Sigstore
  - SPDX
  - CycloneDX
  
  The requirements MUST distinguish:
  - required artifacts
  - generated projections
  - release-gate obligations
  - disclosure obligations
  
  Supply-chain and provenance outputs MUST be governable as release-facing repository artifacts and MUST NOT depend on informal or undocumented report conventions.
