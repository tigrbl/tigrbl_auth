body: |-
  ## Scope
  
  This specification governs the 	igrbl-auth-api-developer product API surface.
  
  ## Requirements
  
  The developer API MUST expose only developer self-service app and OAuth/OIDC client administration capabilities through the developer-api product surface. It MAY expose dynamic client registration, client registration management, developer-scoped client RPC methods, discovery metadata helpers, and JWKS helper routes.
  
  The developer API MUST NOT expose tenant lifecycle operations, platform authority assignment, tenant-admin identity administration, service identity administration, human login, authorization, diagnostics, or unrelated admin resources.
  
  ## Verification
  
  Verification MUST prove the package builds an ASGI app, exposes only configured public capabilities, admin resources, and OpenRPC prefixes, and fails closed for tenant lifecycle, service-admin, platform-admin, login, authorization, diagnostics, and disabled RPC methods.
