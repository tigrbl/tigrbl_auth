summary: "Defines the public UIX profile OIDC context projection. The UIX must label each displayed value by source, distinguish ID token claims from access-token metadata and UserInfo claims, preserve the deployed issuer value, display UserInfo email/name/email_verified when returned, and redact tokens or secrets. The projection is not an authentication source of truth; backend token validation and UserInfo production remain provider-owned."
