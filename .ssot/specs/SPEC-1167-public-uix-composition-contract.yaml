summary: "The public UIX app must consume only the public API base URL and render end-user authentication, consent, registration, password recovery, callback, MFA, profile, and hosted-login support views. It must not call admin, tenant lifecycle, developer, service-admin, diagnostics, system, or RPC endpoints. Tenant branding and white-label presentation must be layered on top of the public API contract without granting control-plane authority to browser clients."
