body: |-
  ## Scope
  
  This specification governs developer authorization and audit behavior for developer-api operations.
  
  ## Requirements
  
  Developer API MUST bind each operation to an actor, tenant namespace, app/client ownership context, and effective developer authority. Mutations and sensitive reads MUST evaluate authorization before disclosure or state change.
  
  Developer operations MUST emit audit events that identify actor, tenant, app/client target, operation, authorization decision, request time, result, and failure reason where applicable.
  
  ## Verification
  
  Verification MUST prove developer operations enforce tenant/app ownership, deny cross-surface operations, produce audit records for allowed and denied sensitive operations, and prevent cross-tenant audit visibility.
