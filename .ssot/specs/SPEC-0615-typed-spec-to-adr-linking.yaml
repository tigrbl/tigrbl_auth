body: |-
  SPEC rows and authored SPEC payloads SHALL support adr_ids: list[str]. adr_ids SHALL reference ids present in top-level adrs. Empty lists are valid and are the default for newly created and migrated SPEC rows. Validation SHALL reject malformed or missing ADR ids in spec.adr_ids. Graph and export views MAY expose derived feature-to-ADR visibility, but registry storage remains authoritative on SPEC rows only.
