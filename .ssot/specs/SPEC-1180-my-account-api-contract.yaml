body: |-
  The My Account API contract defines tigrbl-auth-api-my-account as an authenticated end-user self-service surface. It exposes /account/profile, /account/sessions, /account/authorized-apps, /account/consents, and /account/password/change. The surface must be scoped to the current authenticated subject and must not expose /admin, /rpc, tenant-wide user management, platform administration, developer client administration, service administration, or raw table CRUD. The matching UIX package is @tigrbl-auth/my-account-uix. Public API remains the OAuth/OIDC issuer and hosted-login surface; My Account consumes existing identity principals, credentials, policy, OIDC, and canonical storage resources.
