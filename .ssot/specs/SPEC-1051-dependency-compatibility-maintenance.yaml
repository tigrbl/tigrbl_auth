body: |-
  ## Overview
  
  Dependency maintenance is a governed capability covering runtime dependency compatibility and test-lane compatibility.
  
  ## Requirements
  
  - Runtime dependency changes that can affect auth, signing, contracts, schemas, or persistence map to explicit governance features and claims.
  - Test and tooling dependency changes that can affect certification or release validation map to explicit governance features and claims.
  - Compatibility work is backed by repository tests that verify dependency declarations and SSOT traceability.
  - Dependency updates must not be treated as no-op housekeeping when they can change governed behavior.
  
  ## Verification
  
  - `tests/unit/test_published_dependency_model.py`
  - `tests/unit/test_ssot_work_item_traceability.py`
  - `tests/unit/test_ssot_dependency_maintenance_traceability.py`
