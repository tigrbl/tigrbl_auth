summary: "SSOT is the authoritative active document and current compliance docs are derived projections."
supersedes: []
superseded_by: []
status_notes: []
references: []
body: |-
  ## Overview

  SSOT is the authoritative active document for repository truth and document-authority policy.

  ## Requirements

  - Canonical authored authority content lives under `.ssot/`.
  - `.ssot/registry.json` plus repo-local ADR/spec files under `.ssot/adr/` and `.ssot/specs/` are the authoritative active document set for repository governance and release truth.
  - `docs/compliance/*`, `CURRENT_STATE.md`, and `CERTIFICATION_STATUS.md` are derived projections and must not redefine authority independently.
  - `docs/compliance/AUTHORITATIVE_CURRENT_DOCS.*` is a compatibility projection that enumerates current release-facing docs; it is not itself an authoritative source.
  - `compliance/targets/document-authority.yaml` is a derived compatibility projection emitted from SSOT policy.
  - Generated projections must agree with SSOT and may be regenerated at any time.

  ## Verification

  - `tests/unit/test_phase13_truthfulness_alignment.py`
  - `tests/unit/test_phase19_ssot_document_authority.py`
spec_kind: "governance"
