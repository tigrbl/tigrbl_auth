body: |-
  ## Scope
  
  This specification governs service, machine, and workload identity administration through the service-admin API.
  
  ## Requirements
  
  Authorized service admins MAY create, inspect, update, disable, enable, and retire service, machine, and workload identities only within authorized tenant, resource, or trust-domain boundaries. Non-human identities MUST be modeled through principals, credentials, and policy rather than human user accounts.
  
  Identity administration MUST preserve ownership context, credential posture, auditability, and separation from tenant-admin human identity workflows.
  
  ## Verification
  
  Verification MUST prove service identity operations are ownership-scoped, policy-authorized, auditable, and denied across tenant, platform, developer, and tenant-admin boundaries.
