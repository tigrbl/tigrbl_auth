body: |-
  ## Overview

  This specification defines runtime/API tenant public discovery and JWKS
  behavior.

  Decision source: `adr:1066`.

  ## Scope

  This specification applies to the runtime public routes, generated public
  contracts, discovery snapshots, operator JWKS publication, tenant token issuer
  validation, and cross-tenant leakage guards.

  UIX tenant JWKS presentation is explicitly out of scope.

  ## Tenant Issuer

  For an enabled tenant with slug `{tenant_slug}`, the tenant issuer MUST be:

  `{root_issuer}/tenants/{tenant_slug}`.

  Tenant-scoped discovery MUST emit that value in `issuer`.

  ## Public Routes

  The runtime MUST expose:
  - `GET /tenants/{tenant_slug}/.well-known/openid-configuration`
  - `GET /tenants/{tenant_slug}/.well-known/jwks.json`

  Both routes MUST return `404` when the tenant is missing or disabled.

  ## Trust-Domain Resolution

  Discovery publication, JWKS publication, token issuance, and token validation
  MUST resolve through the same tenant trust-domain authority source.

  The trust-domain source MUST own:
  - issuer identity
  - signing-key scope
  - allowed algorithm posture
  - verification scope

  ## Discovery Metadata

  Tenant discovery MUST emit a tenant-specific `jwks_uri`:

  `{root_issuer}/tenants/{tenant_slug}/.well-known/jwks.json`.

  It MUST NOT emit the root `/.well-known/jwks.json` for tenant issuer
  validation.

  ## JWKS Publication

  Tenant JWKS MUST include only public key material owned by the requested
  tenant.

  Active and next keys MUST be visible. Retired keys MUST be excluded unless the
  existing key lifecycle explicitly marks them publishable.

  Operator `keys publish-jwks --tenant X` and runtime
  `GET /tenants/X/.well-known/jwks.json` MUST use the same selection logic.

  ## Artifact Truthfulness

  Preserved authoritative discovery artifacts MUST be runtime-derived from the
  same deployment-resolution path as live runtime responses. Fixture-only
  preserved artifacts MUST be labeled non-authoritative.

  ## Validation Contract

  Tenant token validation MUST require `iss` to match the tenant-scoped issuer
  and resolve to that tenant's JWKS.

  Cross-tenant tests MUST prove tenant A routes never expose tenant B keys or
  tenant B metadata.
