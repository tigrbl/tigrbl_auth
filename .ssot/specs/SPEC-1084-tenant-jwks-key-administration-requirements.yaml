  Scope: This SPEC governs authenticated tenant JWKS key administration in the runtime/admin plane. Requirements: 1. Admin RPC exposes tenant-scoped methods to list, seed, create, update, and delete JWKS key records. 2. Seed is idempotent per tenant and creates a publishable active signing key when no publishable key exists, or when forced creates a deterministic replacement record id supplied by the caller. 3. Create and update accept only public JWK publication fields and lifecycle metadata: kid, alg, kty, use, crv/curve, x/n/e, status, publish, label, valid_from, valid_to. 4. Delete removes the tenant-scoped key record from durable storage-backed key state. 5. Public tenant JWKS includes only publishable active and next keys and excludes retired keys unless explicitly configured by existing publication rules. 6. Runtime/UIX surfaces must not disclose private JWK fields such as d, p, q, dp, dq, qi, k, client_secret, password_hash, or token. 7. Tests must prove runtime mutation, tenant isolation, public JWKS parity, UIX service behavior, and the governed execution bodies for the linked features.
