body: |-
  ## Scope
  
  This specification governs developer self-service application registration and ownership.
  
  ## Requirements
  
  Authorized tenant developers MAY create, inspect, update, disable, enable, and retire tenant-scoped application records. App ownership MUST be scoped to a tenant and MUST not imply platform authority.
  
  App records SHOULD provide the ownership boundary for OAuth/OIDC clients, redirect URI policy, logout URI policy, display metadata, and app-level audit context.
  
  ## Verification
  
  Verification MUST prove developer app operations are tenant-scoped, ownership-bound, auditable, and denied across tenant or platform authority boundaries.
