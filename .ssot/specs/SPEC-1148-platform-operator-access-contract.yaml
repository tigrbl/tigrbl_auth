body: |-
  ## Requirements
  
  Platform operator access MUST be distinct from platform owner and platform administrator access.
  
  Operators MAY inspect operational state, run approved recovery workflows, and perform explicitly delegated operational actions.
  
  Operators MUST NOT receive default tenant ownership, tenant-local administrative authority, developer app ownership, or service identity ownership unless a separate authority grant exists.
  
  Break-glass operations MUST require explicit reason capture, audit event emission, and environment guardrails.
