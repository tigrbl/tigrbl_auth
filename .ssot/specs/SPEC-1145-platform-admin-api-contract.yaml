body: |-
  ## Requirements
  
  The platform-admin API MUST expose only platform control-plane capabilities for cross-tenant administration.
  
  It MUST include tenant lifecycle operations, platform authority assignment, platform administrator and support/break-glass controls, and platform audit read/export workflows.
  
  It MUST exclude public end-user authentication pages, tenant self-service-only workflows, developer-only OIDC/OAuth app management, service-only machine identity workflows, and resource-validation-only surfaces.
  
  The API MUST use the `platform-admin-api` product surface and MUST fail closed when a route, resource, or JSON-RPC method is not assigned to that surface.
