body: |-
  ## Requirements

  Platform authority assignment MUST define how platform owners, platform administrators, tenant owners, and tenant administrators receive and lose authority.

  Tenant ownership issuance MUST be explicit during or after tenant creation and MUST be auditable.

  Authority grants MUST be scoped by tenant where applicable and MUST distinguish platform-wide authority from tenant-local authority.

  Support and break-glass access MUST be modeled as explicit audited control-plane permissions or workflows, not as a separate operator role or authority class.

  Revocation, transfer, and downgrade operations MUST preserve at least one valid tenant owner unless a platform break-glass policy explicitly authorizes otherwise.
