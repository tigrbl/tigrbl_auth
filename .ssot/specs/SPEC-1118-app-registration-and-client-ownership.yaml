body: |-
  ## Scope
  
  This specification governs tenant app registration and app-owned client ownership.
  
  ## Requirements
  
  Tenant admins or authorized app owners MAY create and manage apps. An app MAY own multiple OAuth/OIDC clients. Each app-owned client MUST define redirect URI policy, allowed grant types, allowed scopes, consent policy, public/confidential posture, and credential posture.
  
  Developer self-service for app and client registration SHOULD be exposed through the developer API and developer UIX. Dynamic client registration MAY create direct clients for compatibility, but app-owned clients are the target tenant self-service model.
  
  Apps MAY own services and resource servers when those actors are part of the same product/application boundary.
  
  ## Verification
  
  Verification MUST prove app creation, app-owned client creation, redirect URI policy enforcement, consent policy attachment, app owner authority checks, developer API exposure, and compatibility for direct client registration.
