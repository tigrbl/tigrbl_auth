body: |-
  The public API package must assemble only the public-api product surface. The surface exposes browser-facing OAuth/OIDC and hosted-login routes including login, authorize, token, logout, registration, consent, account recovery, discovery, JWKS, and public protocol helpers. It must not expose admin resources, tenant lifecycle administration, diagnostics, RPC, or operator-only control-plane paths. The intended primary UIX consumer is @tigrbl-auth/public-uix, with tenant-branded and white-label clients using the same public contract.
