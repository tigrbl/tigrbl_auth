body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-oidc`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `IdToken`
  - `UserInfo`
  - `OidcClaims`
  - `Acr`
  - `Amr`
  - `AuthenticationContext`
  - `OidcProviderMetadata`
  - `OidcSession`
  - `SessionState`
  - `LogoutRequest`
  - `RpInitiatedLogout`
  - `FrontChannelLogout`
  - `BackChannelLogout`
  - `FederatedLoginResult`
  
  ## Standards Coverage
  
  The package owns behavior for OIDC Core, OIDC Discovery, OIDC UserInfo, OIDC
  Session Management, OIDC RP-Initiated Logout, OIDC Front-Channel Logout, and
  OIDC Back-Channel Logout.
  
  ## Requirements
  
  OIDC MAY depend on OAuth and JOSE. OIDC MUST NOT own generic OAuth grant
  behavior, SQLAlchemy/Tigrbl mappings, process runtime adapters, repository
  tooling workflows, or test-only fixtures.
  
  ## Verification
  
  Verification MUST map each retained OIDC target to a package-owned object,
  flow, metadata contract, or explicit dependency.
