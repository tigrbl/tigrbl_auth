body: |-
  ## Scope
  
  This specification governs tenant-admin sessions, operation authorization, and tenant-scoped audit evidence.
  
  ## Requirements
  
  Tenant admin session start MUST bind the actor, tenant namespace, effective role, and authorization context. Tenant admin operations MUST evaluate tenant-scoped authorization before mutation or disclosure.
  
  Tenant admin operations MUST emit audit events that identify actor, tenant, operation, target resource, authorization decision, request time, result, and failure reason where applicable.
  
  ## Verification
  
  Verification MUST prove sessions are tenant-bound, unauthorized operations fail closed, audit records are produced for allowed and denied sensitive operations, and tenant admins cannot inspect audit data for another tenant.
