summary: "Scope: Residency and sovereignty policy targets RFC 6973 privacy considerations at https://www.rfc-editor.org/rfc/rfc6973.html. Requirements: runtime policy records must identify tenant id, optional realm, residency zone, allowed processing regions, restricted transfer regions, and sovereign controls. Evaluation must produce structured decisions for allowed and denied access. Assertion helpers must fail closed for tenant mismatch, realm mismatch, missing allowed regions, restricted transfer regions, or processing outside the declared residency boundary. Verification requires T0 import coverage, T1 manifest and allowed-decision coverage, and T2 negative fail-closed coverage."
