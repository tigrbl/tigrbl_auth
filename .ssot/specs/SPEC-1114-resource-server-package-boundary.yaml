body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-resource-server`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `ResourceServer`
  - `ResourceMetadata`
  - `ResourceIdentifier`
  - `Audience`
  - `ScopeRequirement`
  - `PermissionRequirement`
  - `TokenValidator`
  - `AccessTokenClaims`
  - `JwksCache`
  - `IntrospectionClient`
  - `ProofBindingValidator`
  - `DpopValidator`
  - `MtlsBindingValidator`
  - `ResourceAuthorizationRequest`
  - `ResourceAuthorizationResult`
  - `VerifierTrustPolicy`
  
  ## Requirements
  
  Resource-server owns downstream protected API validation behavior.
  
  It MUST validate access tokens, issuer/audience constraints, tenant
  trust-domain expectations, resource indicators, scopes, permissions, DPoP
  proof binding, and mTLS certificate binding where enabled.
  
  It MAY use JWKS and introspection. It MUST NOT own OAuth token issuance, OIDC
  ID token emission, server app composition, runtime execution, or admin
  mutation workflows.
  
  ## Dependency Rules
  
  Resource-server MAY import `core`, `contracts`, `principals`,
  `credentials`, `jose`, `policy`, `oauth`, and selected `oidc` metadata
  contracts.
  
  Provider-side server/runtime packages MUST NOT import resource-server.
  
  ## Verification
  
  Verification MUST include token validation, JWKS cache behavior,
  introspection fallback, audience/resource checks, scope/permission checks,
  tenant trust-domain rejection, DPoP proof checks, mTLS binding checks, and
  provider-side import isolation.
