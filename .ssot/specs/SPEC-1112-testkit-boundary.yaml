body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-testkit`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `FakeClock`
  - `FakeKeyStore`
  - `FakeRepository`
  - `FakePrincipalFactory`
  - `FakeCredentialFactory`
  - `FakeIdp`
  - `FakeOAuthClient`
  - `FakeResourceServer`
  - `ProtocolTestVector`
  - `ConformanceHarness`
  - `PeerProfileHarness`
  - `TestTenantFactory`
  - `TestAppFactory`
  - `TokenFixture`
  - `JoseFixture`
  
  ## Requirements
  
  Testkit owns fixtures, fake dependencies, conformance harnesses, protocol test
  vectors, and test client helpers.
  
  Production packages MUST NOT import testkit.
  
  ## Verification
  
  Verification MUST include a production import scan that fails if any
  production package imports `tigrbl_identity.testkit`.
