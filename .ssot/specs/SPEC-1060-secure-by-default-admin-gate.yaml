body: |-
  ## Overview
  
  The secure-by-default admin gate defines the baseline tigrbl_auth deployment posture and the administrator identity-and-session contract used when generated admin surfaces are enabled.
  
  Decision source: `adr:1041`.
  Feature owner: `feat:secure-default-baseline-admin-gate`.
  
  ## Default Baseline Posture
  
  - Baseline/default deployments MUST resolve to `surface_plugin_mode="public-only"`.
  - Baseline/default deployments MUST set `surface_public_enabled=true`.
  - Baseline/default deployments MUST set `surface_admin_enabled=false`, `surface_rpc_enabled=false`, and `surface_diagnostics_enabled=false`.
  - Public OAuth/OIDC routes such as discovery, JWKS, authorize, token, register, revoke, logout, and userinfo remain available according to their protocol-specific enablement and checks.
  
  ## Admin Surface Opt In
  
  - `admin-only`, `mixed`, `--admin`, `--rpc`, `--diagnostics`, and `--surface-set admin-rpc` MAY enable generated control-plane surfaces.
  - Explicit admin/RPC/diagnostics enablement MUST NOT weaken public OAuth/OIDC protocol-specific checks.
  
  ## Bootstrap Administrator Identity
  
  - Deployments enabling admin, RPC, or diagnostics surfaces MUST ensure that at least one bootstrap superuser administrator identity exists.
  - Local/default installs MAY materialize a bootstrap superuser automatically.
  - Bootstrap credentials MUST be temporary and MUST feed into a forced password-change flow before routine administrator access continues.
  - The bootstrap path MUST support subsequent administrator credential lifecycle behavior, including login, forgot-password or reset-password recovery, and password change.
  
  ## Enforcement Semantics
  
  - Browser-facing admin UIX routes MUST require an authenticated administrator session before rendering protected control-plane content.
  - Generated table CRUD MUST require an authenticated administrator identity and session when the admin surface is enabled.
  - Generated JSON-RPC methods MUST require an authenticated administrator identity and session when RPC is enabled.
  - Diagnostics under `/system/*` MUST require an authenticated administrator identity and session when diagnostics are enabled.
  - Missing credentials or missing session MUST return `401` or redirect to the administrator login entrypoint according to route type.
  - Invalid credentials or insufficient administrator authorization MUST return `403`.
  - Invalid generated RPC params MUST return structured invalid-params responses and MUST NOT leak SQL/SQLite internals.
  
  ## Contract Requirements
  
  - Runtime OpenAPI documents MUST expose accurate administrator security metadata for protected generated REST operations.
  - Protected generated REST operations MUST include security requirements that match the live administrator authentication model.
  - Runtime OpenRPC documents MUST expose equivalent administrator security metadata when protected generated JSON-RPC methods are exposed.
  - Protected generated JSON-RPC methods MUST include security metadata.
  - Public OAuth/OIDC routes MUST NOT be incorrectly marked as admin-gated or session-gated.
  
  ## Verification
  
  Verification MUST cover default public-only exposure, bootstrap superuser materialization, admin login, forced password change, password recovery, missing or invalid session behavior, OpenAPI security metadata, OpenRPC security metadata, public route exclusions, duplicate route regression, and structured invalid-params behavior for generated RPC methods.
