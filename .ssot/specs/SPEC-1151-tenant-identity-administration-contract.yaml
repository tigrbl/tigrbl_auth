body: |-
  ## Scope
  
  This specification governs tenant-scoped identity and tenant administrator management.
  
  ## Requirements
  
  Tenant admins MAY list, inspect, invite, create, update, lock, unlock, and credential tenant principals only within their authorized tenant namespace. Tenant admin delegation MUST be scoped to the tenant and MUST NOT imply platform authority.
  
  Credential issuance and reset workflows MUST validate tenant ownership, enforce policy, avoid secret disclosure, and record tenant audit events.
  
  ## Verification
  
  Verification MUST prove allowed tenant identity mutations work, cross-tenant identity mutations fail closed, platform authority is not granted, and audit records are emitted.
