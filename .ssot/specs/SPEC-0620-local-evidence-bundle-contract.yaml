body: |-
  ## Status
  
  Draft contract.
  
  ## Contract
  
  A local evidence bundle records release metadata, boundary ids, claims, tests, evidence rows, source snapshot id and root hash, artifact manifest references, verification metadata, and a bundle hash.
  
  ## Authority
  
  The bundle is derived from registry truth. It must not introduce claims, tests, or evidence that are absent from the registry.
  
  ## Validation
  
  Validation checks canonical JSON, linked registry ids, evidence paths, linked test status, claim tier compatibility, and bundle hash consistency.
