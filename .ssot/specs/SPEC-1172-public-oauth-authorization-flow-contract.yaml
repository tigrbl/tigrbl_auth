body: |-
  The public API authorization flow contract defines browser-facing authorization behavior for /authorize and related callback handoff. The contract covers PKCE, state, nonce, redirect URI validation, consent handoff, tenant-aware issuer context, and safe OAuth/OIDC error responses. The flow must remain public-rest only and must not expose admin, RPC, diagnostics, tenant lifecycle, developer, or service-admin control-plane capabilities.
