body: |-
  Defines protected API access-token validation, issuer/audience/scope checks, JWKS cache, introspection fallback, DPoP validation, mTLS binding validation, and protected-resource metadata responsibilities.
  
  Resource servers consume the resource-validation API for validation metadata and introspection where configured. Resource servers MUST NOT require admin, developer, tenant-admin, service-admin, or public human login surfaces to validate protected requests.
