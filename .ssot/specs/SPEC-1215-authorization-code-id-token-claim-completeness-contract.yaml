summary: "Defines the provider-side OIDC authorization-code plus PKCE ID token claim contract. Tokens minted after an authorize request must bind to the deployed issuer and client audience, preserve subject identity, issue iat and exp, carry supplied nonce when present, include session/authentication correlation claims when the active profile enables them, and avoid substituting package labels for issuer URLs. Tests must distinguish required OIDC Core claims from profile-dependent optional claims."
