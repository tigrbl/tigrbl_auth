body: |-
  ## Scope
  
  This SPEC governs deployable product API surfaces for Tigrbl Auth.
  
  ## Requirements
  
  The deployment resolver MUST define named product surfaces for `public-api`, `platform-admin-api`, `tenant-admin-api`, `developer-api`, `service-admin-api`, and `resource-validation-api`.
  
  Each product surface MUST declare its underlying primitive surface sets, allowed public capabilities, allowed admin resources, allowed admin REST router groups, and allowed OpenRPC methods or method prefixes.
  
  Public and resource-validation APIs MUST NOT expose `/rpc`, diagnostics, or admin table resources. Platform admin APIs MUST own tenant lifecycle and platform authority operations. Tenant admin APIs MUST exclude platform tenant lifecycle operations. Developer APIs MUST expose client registration and client metadata operations without tenant lifecycle authority. Service admin APIs MUST expose service, key, API-key, token-inspection, and validation metadata operations without human login surfaces.
  
  Runtime mounting, generated contracts, and JSON-RPC dispatch MUST derive from the same effective product-surface configuration and fail closed for disabled methods.
  
  Product API frontdoors MUST compose table-backed resources from canonical `tigrbl_identity_storage` table objects as defined by `spc:1176`. Product frontdoors own route composition, tags, prefixes, capability filtering, and product-surface exposure policy; they MUST NOT define or fork identity table classes.
  
  ## Verification
  
  Verification MUST prove each API package builds an ASGI app, expected paths/methods are present, forbidden paths/methods are absent, cross-surface requests fail closed, and table-backed product resources are canonical storage table objects.
