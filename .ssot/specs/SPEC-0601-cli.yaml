body: |-
  Primary distribution: `ssot-cli`
  
  Compatibility aliases retained during migration:
  - `ssot`
  - `ssot-registry`
  
  Public commands:
  - `ssot-registry init`
  - `ssot-registry validate`
  - `ssot-registry upgrade`
  - `ssot-registry adr create|get|list|update|delete|sync`
  - `ssot-registry adr reserve create|list`
  - `ssot-registry spec create|get|list|update|delete|sync`
  - `ssot-registry spec reserve create|list`
  - `ssot-registry feature plan`
  - `ssot-registry feature lifecycle set`
  - `ssot-registry issue plan`
  - `ssot-registry claim evaluate`
  - `ssot-registry evidence verify`
  - `ssot-registry boundary freeze`
  - `ssot-registry release certify`
  - `ssot-registry release promote`
  - `ssot-registry release publish`
  - `ssot-registry release revoke`
  - `ssot-registry graph export`
  
  ADR and SPEC authoring commands SHALL support two body source flags:
  - `--body`
  - `--body-file`
  
  CLI source-selection rules:
  - `adr create` and `spec create` SHALL require exactly one of `--body` or `--body-file`
  - `adr update` and `spec update` SHALL allow zero or one of `--body` or `--body-file`
  - create and update commands SHALL reject requests that provide both `--body` and `--body-file`
  
  CLI body flags SHALL map directly onto the corresponding runtime document mutation inputs.
