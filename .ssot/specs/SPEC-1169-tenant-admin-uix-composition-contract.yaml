body: |-
  The tenant-admin UIX app must consume only the tenant-admin API base URL. It owns tenant-scoped administration for tenant users, tenant admins, tenant-local identity settings, tenant JWKS/key publication, tenant-local policy/configuration, audit views, and tenant-scoped session or consent administration. It must not expose platform tenant lifecycle controls, developer app catalog ownership outside tenant authority, service identity administration, public login pages, diagnostics, system, or RPC paths outside the paired tenant-admin API contract.
