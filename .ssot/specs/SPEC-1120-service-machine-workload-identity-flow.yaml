body: |-
  ## Scope
  
  This specification governs service, machine, workload, and device identity flows.
  
  ## Requirements
  
  Non-human identities MUST NOT be modeled as users. Tenant admins or authorized operators MAY create non-human principals according to policy.
  
  Service, machine, workload, API-key, and service-key administration SHOULD be exposed through the service-admin API and service-admin UIX. Credentials MUST be issued, bound, rotated, revoked, and audited according to credential lifecycle rules.
  
  JWT assertion, mTLS, token exchange, and DPoP usage MUST align with their governing protocol requirements where used. Resource servers MUST validate issued tokens and proof binding before accepting non-human requests.
  
  ## Verification
  
  Verification MUST prove service credential lifecycle, service-admin API exposure, JWT assertion flow, mTLS binding flow, DPoP binding flow, workload trust-domain denial, cross-tenant denial, token issuance, and downstream verifier enforcement.
