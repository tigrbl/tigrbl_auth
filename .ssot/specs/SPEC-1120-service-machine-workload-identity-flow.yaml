body: |-
  ## Scope
  
  This specification governs service, machine, workload, and device identity
  flows.
  
  ## First-Class Objects
  
  The model MUST define:
  
  - `ServicePrincipal`
  - `MachinePrincipal`
  - `WorkloadPrincipal`
  - `DevicePrincipal`
  - `ServiceKeyCredential`
  - `JwtAssertionCredential`
  - `MtlsCertificateCredential`
  - `DpopKeyCredential`
  - `WorkloadAttestation`
  - `TrustDomain`
  - `ProofBinding`
  - `NonHumanAuthorizationRequest`
  
  ## Requirements
  
  Non-human identities MUST NOT be modeled as users.
  
  Tenant admins or authorized operators MAY create non-human principals
  according to policy.
  
  Credentials MUST be issued, bound, rotated, revoked, and audited according to
  credential lifecycle rules.
  
  JWT assertion use MUST align with RFC 7523 where used.
  
  mTLS client authentication and certificate-bound tokens MUST align with RFC
  8705 where used.
  
  Token exchange MUST align with RFC 8693 where used.
  
  DPoP proof binding MUST align with RFC 9449 where used.
  
  Resource servers MUST validate issued tokens and proof binding before
  accepting non-human requests.
  
  ## Verification
  
  Verification MUST prove service credential lifecycle, JWT assertion flow,
  mTLS binding flow, DPoP binding flow, workload trust-domain denial,
  cross-tenant denial, token issuance, and downstream verifier enforcement.
