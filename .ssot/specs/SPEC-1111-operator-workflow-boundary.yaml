body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-operator`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `OperatorCommand`
  - `BootstrapCommand`
  - `MigrateCommand`
  - `ImportCommand`
  - `ExportCommand`
  - `KeyRotationCommand`
  - `ClientCommand`
  - `ServiceCommand`
  - `TenantCommand`
  - `ProfileInspectCommand`
  - `ClaimsLintCommand`
  - `ReleaseGateCommand`
  - `EvidenceBundleCommand`
  - `CertificationReportCommand`
  - `OperatorReport`
  
  ## Requirements
  
  Operator owns CLI and operator workflows. Operator MUST remain outside the
  request path and MUST NOT be required for serving OAuth/OIDC/admin requests.
  
  Server and runtime MUST NOT import operator.
  
  Operator MUST NOT import testkit for production commands. If conformance
  commands need harnesses, those commands MUST be explicitly non-production or
  moved to a separate conformance package.
  
  ## Verification
  
  Verification MUST prove request-path packages do not import operator and
  operator commands can run against server/runtime manifests where applicable.
