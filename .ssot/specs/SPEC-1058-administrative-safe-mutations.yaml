body: |-
  ## Overview
  
  Administrative Safe Mutations define UIX workflows for protected administrator actions that change deployed state.
  
  ## Required Behavior
  
  - The UIX MUST require confirmation before revoking sessions, revoking tokens, revoking consents, locking or unlocking identities, enabling or disabling tenants, enabling or disabling clients, rotating keys, publishing JWKS, or updating client registration.
  - Each mutation MUST show success, failure, authorization denial, validation failure, and audit-pending or audit-complete states.
  - Each mutation MUST call an implementation-backed OpenRPC operation or be blocked with a missing-operation error.
  - Each mutation MUST produce or expose an audit result that the administrator can inspect.
  - Destructive or security-sensitive actions MUST be visibly scoped to the active tenant/resource.
  
  ## Verification
  
  Verification MUST cover confirmation, execution, success, failure, authorization denial, audit visibility, and resource scoping.
