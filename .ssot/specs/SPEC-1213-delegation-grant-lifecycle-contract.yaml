summary: "DelegationGrant lifecycle MUST be a persisted authorization lifecycle contract. Storage MUST represent grant identity, tenant and realm, delegator subject, delegate subject, delegate type, status, parent grant, source authority reference, policy version, provenance reference, effective and expiration times, revocation metadata, normalized scopes, attenuation proofs, durable graph edges, token linkage, and lifecycle audit events. Lifecycle services MUST support create, activate, replace, revoke, expire, list, inspect, and evaluate operations. Revocation, expiry, replacement, and chain collapse MUST invalidate dependent refresh, verifier, cache, and token-link state within the authorization freshness contract. OAuth/OIDC token exchange MAY consume active grants and emit protocol artifacts but MUST NOT become the canonical grant store."
