summary: "Scope: Strict certification policy targets RFC 7518 at https://www.rfc-editor.org/rfc/rfc7518.html and RFC 8725 at https://www.rfc-editor.org/rfc/rfc8725.html. Requirements: policy reports allowed algorithms, refused algorithms, ECDSA classical-cryptography warnings, and PQC readiness state; RSA-family RS*/PS* signing algorithms are refused in strict certification policy; legacy JWA discovery may remain compatible and is not the certification gate. Verification: T0 export tests, T1 readiness/report tests, and T2 fail-closed refusal tests are required before implemented status."
