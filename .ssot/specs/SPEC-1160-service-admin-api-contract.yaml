body: |-
  ## Scope
  
  This specification governs the 	igrbl-auth-api-service-admin product API surface.
  
  ## Requirements
  
  The service-admin API MUST expose only service, machine, workload, API-key, service-key, token inspection, audit, and validation metadata administration through the service-admin-api product surface. It MAY expose token introspection, protected-resource metadata, issuer and tenant discovery metadata, JWKS helpers, service/admin resources, and token/key/audit RPC method families.
  
  The service-admin API MUST NOT expose tenant lifecycle operations, platform authority assignment, tenant-admin human identity management, developer app catalog management, public human login, consent, authorization pages, or diagnostics unless explicitly configured by a separate diagnostics deployment.
  
  ## Verification
  
  Verification MUST prove the package builds an ASGI app, exposes only configured public capabilities, admin resources, and OpenRPC prefixes, and fails closed for tenant lifecycle, developer, tenant-admin, platform-admin, login, consent, authorization, diagnostics, and disabled RPC methods.
