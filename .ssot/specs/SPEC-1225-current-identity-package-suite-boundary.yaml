body: |-
  ## Scope
  
  This specification governs the canonical package-layer index, dependency direction, workspace-source consistency, active-path hygiene, and exported-surface ownership for `tigrbl_auth`.
  
  ## Canonical layers
  
  Implementations MUST use the exact layer ids and meanings recorded by `pkgs/layers.toml`: `00-primitives`, `01-storage`, `02-contracts`, `05-bases`, `10-concrete`, `20-providers`, `30-storage-runtime`, `40-capabilities`, `50-protocols`, `60-runtime`, `70-facade`, `80-routers`, `90-backend-apps`, `100-uix-core`, `105-ui`, `110-examples`, `120-tests`, and `deprecated`.
  
  Each Python distribution MUST resolve to exactly one layer from its path. Each JavaScript workspace MUST resolve to its declared JavaScript layer. Root editable sources and the lockfile MUST use the same canonical package paths.
  
  ## Dependency requirements
  
  Production package dependencies and source imports MUST follow the allowed target-layer rules in `pkgs/layers.toml`. Package-specific exceptions MUST be explicit, test-visible, justified, and removable; a new unlisted upward edge MUST fail closed.
  
  Backend apps MAY depend on routers. Routers MUST NOT depend on backend apps. Product UI packages MAY depend on UIX core. UIX core MUST NOT depend on product UI packages. Examples and tests are terminal: production packages MUST NOT depend on either, and examples MUST NOT depend on tests.
  
  Layer 30 MUST express durable table behavior with `make`, `define`, `derive`, hooks, and factory aliases over layer-01 owners rather than introducing a parallel repository abstraction. Layer 40 packages MUST expose reportable capability operations. Layer 50 packages MUST own protocol/specification version history, versioned feature selection, backwards-compatibility rules, and migration paths where available.
  
  Layer 60 and layer 70 MUST NOT own or import layer-80 router implementations. HTTP route composition belongs to layer 90. Layer 80 owns carrier mapping only and MUST delegate semantic operations to lower layers.
  
  ## Active path hygiene
  
  Active source, tests, docs, workflows, manifests, reports, and workspace configuration MUST NOT reference retired layer names or moved package paths. Historical migration artifacts may retain old paths only when explicitly classified as history.
  
  ## Verification
  
  Verification MUST include the canonical layer-index test, universal Python manifest/import validation, router/backend-app direction checks, UIX-core/product-UI direction checks, terminal example/test checks, editable workspace-source consistency checks, and active path-hygiene checks. T2 claims require fail-closed negative cases for forbidden and undeclared dependency edges.
