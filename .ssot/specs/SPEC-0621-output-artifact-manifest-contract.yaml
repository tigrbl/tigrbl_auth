body: |-
  ## Status
  
  Draft contract.
  
  ## Contract
  
  An output artifact manifest records release id, artifact rows, paths or URIs, artifact kind, media type, size, SHA-256 digest, produced-at metadata, and optional relation to source snapshot and evidence bundle ids.
  
  ## Build Neutrality
  
  The manifest does not prescribe how artifacts are built. It records local outputs and their hashes after they exist.
  
  ## Validation
  
  Validation checks required fields, local path existence when paths are local, size and digest consistency, duplicate artifact ids, and release linkage.
