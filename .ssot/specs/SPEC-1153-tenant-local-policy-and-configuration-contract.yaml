body: |-
  ## Scope
  
  This specification governs tenant-local policy and configuration workflows exposed by the tenant-admin API.
  
  ## Requirements
  
  Tenant admins MAY manage policy and configuration values that affect only their authorized tenant namespace. Tenant-local policy MUST NOT override platform guardrails, issuer-wide safety requirements, release governance, or cross-tenant authority rules.
  
  Policy/configuration mutations MUST be validated, tenant-scoped, auditable, and fail closed when the effective policy source is ambiguous or platform-owned.
  
  ## Verification
  
  Verification MUST prove tenant-local updates affect only the owning tenant, cannot relax platform-owned controls, and produce authorization and audit evidence.
