summary: "Scope: The M2M/workload identity product surface covers machine-to-machine access, client credentials, service principals, machine principals, workload principals, API keys, service keys, credential rotation and revocation, workload trust posture, and protected-resource validation handoff. Requirements: lifecycle administration belongs to service-admin or the Management API service/workload slice; token issuance uses the public token endpoint and OAuth client credentials or assertion grants where enabled; resource consumption is verified through resource-validation and resource-server contracts; docs and tests must not collapse M2M into generic service CRUD. Out of scope: human login, tenant lifecycle, and end-user account self-service."
