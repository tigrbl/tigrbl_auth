body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-core`.
  
  ## First-Class Objects
  
  `core` MUST define implementation-neutral primitives for:
  
  - `TenantId`
  - `PrincipalId`
  - `CredentialId`
  - `ClientId`
  - `Issuer`
  - `Subject`
  - `Audience`
  - `Scope`
  - `Permission`
  - `GrantType`
  - `ResponseType`
  - `TokenType`
  - `Nonce`
  - `Clock`
  - `TimeWindow`
  - `ErrorCode`
  - `Result`
  - `CapabilityName`
  - `FeatureFlagName`
  - `RuntimeProfileName`
  
  ## Requirements
  
  Core primitives MUST be pure Python and MUST NOT depend on protocol, storage,
  server, runtime, operator, or testkit packages.
  
  Core objects MAY provide validation, normalization, comparison, and
  serialization helpers when those helpers are implementation-neutral.
  
  Core MUST NOT own Pydantic wire schemas, SQLAlchemy/Tigrbl tables, routers,
  ASGI app construction, JOSE signing, OAuth/OIDC flows, or persistence.
  
  ## Verification
  
  Verification MUST prove `core` imports without optional runtime dependencies
  and does not import higher identity packages.
