summary: "The developer UIX app must consume only the developer API base URL. It owns OIDC/OAuth app and client registration workflows including redirect URIs, auth method configuration, client metadata, client secrets, client JWKS, dynamic registration visibility, and app lifecycle actions delegated to tenant developers. It must not expose platform tenant lifecycle, tenant identity/JWKS administration outside delegated app authority, service identity administration, public login pages, diagnostics, system, or RPC paths outside the paired developer API contract."
