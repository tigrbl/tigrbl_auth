body: |-
  ## Scope
  
  This specification governs token inspection and validation metadata helpers exposed to service-admin workflows.
  
  ## Requirements
  
  Service-admin API MAY expose token introspection, token inspection RPC methods, protected-resource metadata, issuer discovery metadata, tenant discovery metadata, and JWKS helpers needed to validate machine and service identity behavior. These helpers MUST NOT expose token issuance, human login, consent, authorization pages, developer app catalog management, tenant lifecycle, diagnostics, private key material, or unrelated admin resources.
  
  Metadata helper responses MUST be consistent with the effective product surface and must not imply that disabled runtime flows are available.
  
  ## Verification
  
  Verification MUST prove service validation metadata helpers and token inspection methods are present where configured, forbidden surfaces are absent, and private or cross-tenant material is not leaked.
