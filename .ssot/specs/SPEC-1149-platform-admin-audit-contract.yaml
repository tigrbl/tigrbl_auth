body: |-
  ## Requirements
  
  Platform-admin mutations MUST emit durable audit events for tenant lifecycle changes, authority grants, authority revocations, authority transfers, operator break-glass actions, and failed privileged attempts.
  
  Audit events MUST include actor, tenant scope when applicable, target identifier, operation, outcome, timestamp, and reason where required.
  
  Audit read/export surfaces MUST be available to platform-authorized principals and MUST NOT leak tenant-local private data beyond the authorized platform audit scope.
