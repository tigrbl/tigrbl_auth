body: |-
  ## Scope
  
  This specification governs tenant self-service administration.
  
  ## Requirements
  
  Tenant admins MAY manage tenant-scoped resources allowed by policy and MUST NOT gain deployment-wide authority by default.
  
  Routine tenant self-service SHOULD be exposed through the tenant-admin API and tenant-admin UIX. Platform tenant creation, deletion, suspension, and cross-tenant authority assignment remain platform-admin responsibilities.
  
  Tenant self-service operations MUST be safe mutations with authorization, tenant isolation, validation, idempotency where required, and audit records.
  
  ## Verification
  
  Verification MUST prove tenant admin can perform allowed operations, cannot cross tenant boundaries, cannot perform deployment-superuser operations, cannot perform platform tenant lifecycle operations, and produces audit events.
