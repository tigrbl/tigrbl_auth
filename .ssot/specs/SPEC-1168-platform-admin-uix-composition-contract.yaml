body: |-
  The platform-admin UIX app must consume only the platform-admin API base URL. It owns platform operator workflows for tenant creation, tenant lifecycle, platform authority assignment, platform users/operators, platform audit discovery, and platform-scoped governance views. It must not expose tenant-local identity administration, developer app management, service identity administration, public login, diagnostics, system, or RPC paths outside the paired platform-admin API contract.
