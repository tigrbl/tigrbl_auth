body: |-
  ## Requirements

  The repository MUST define authoritative applicability and scope classifications for governed surfaces and targets.

  The authoritative model MUST support at least: implemented, planned, not-applicable, out-of-scope, and adjacent-but-non-authoritative.

  The classification model MUST distinguish primitive implementation surfaces such as `public-rest`, `admin-rpc`, and `diagnostics` from deployable product surfaces such as `public-api`, `platform-admin-api`, `tenant-admin-api`, `developer-api`, `service-admin-api`, and `resource-validation-api`.

  Informative reports and projections MUST derive status vocabulary from the authoritative classification model and MUST NOT use ambiguous empty-state placeholders as normative truth.

  The model MUST be usable across API packages, UIX packages, runtime, operator, and release-facing surfaces.
