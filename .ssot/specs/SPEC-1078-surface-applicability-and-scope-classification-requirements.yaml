body: |-
  ## Requirements
  
  The repository MUST define authoritative applicability and scope classifications for governed surfaces and targets.
  
  The authoritative model MUST support at least:
  - implemented
  - planned
  - not-applicable
  - out-of-scope
  - adjacent-but-non-authoritative
  
  Informative reports and projections MUST derive their status vocabulary from the authoritative classification model and MUST NOT use ambiguous empty-state placeholders as if they were normative truth.
  
  The classification model MUST be usable across admin API, public API, admin UIX, public UIX, runtime, operator, and release-facing surfaces.
