body: |-
  The resource-validation API package must assemble only the resource-validation-api product surface. The surface exposes JWKS, tenant JWKS, OIDC discovery, tenant OIDC discovery, OAuth protected-resource metadata, and token introspection for resource servers and gateways. It must not expose login, authorize, consent, registration, admin resources, diagnostics, or RPC methods. Resource-server packages and middleware consume this front door for issuer metadata, key material, protected-resource metadata, and introspection without gaining control-plane authority.
