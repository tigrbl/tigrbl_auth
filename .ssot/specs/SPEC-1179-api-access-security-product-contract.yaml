summary: "Scope: API Access Security covers protected-resource metadata, JWKS consumption, token validation, introspection fallback, audience and resource checks, scope and permission enforcement, proof binding, DPoP, mTLS binding, and resource-server integration. Requirements: resource-validation-app remains a read-only issuer-derived validation surface; tigrbl-identity-resource-server remains a consumer package for protected APIs; product docs must describe this as protected API security rather than only metadata publication. M2M/workload identity flows must hand off issued tokens to this product lane for verifier proof. Out of scope: issuing tokens, human login UX, tenant lifecycle administration, and RP callback/session handling."
