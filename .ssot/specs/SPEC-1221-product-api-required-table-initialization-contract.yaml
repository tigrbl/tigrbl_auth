title: "Product API required table initialization contract"
status: "accepted"
origin: "repo-local"
decision_date: null
tags: []
summary: "Scope: Product API table initialization is a local runtime boundary; no OAuth RFC standardizes ORM table selection, and adjacent HTTP API behavior remains governed by RFC 9110 at https://www.rfc-editor.org/rfc/rfc9110.html. Requirements: each product deployment manifest must expose required_table_resources derived from its product-surface contract; surface construction must select only those resources; startup must initialize the mounted product-specific surface router; assertion helpers must fail closed when selected resources include extras or miss required resources. Verification requires T0 manifest export coverage, T1 contract matching coverage for every product API, and T2 negative mismatch coverage."
