body: |-
  ## Requirements
  
  The public UIX boundary MUST define the public end-user browser-facing authentication surface for `tigrbl_auth`.
  
  Required in-scope capabilities:
  - login
  - logout
  - registration
  - session continuation
  - optional consent and recovery flows only when explicitly enabled
  
  Required exclusions:
  - admin control-plane behavior
  - operator diagnostics
  - backend-only protocol internals
  - secret-bearing administrative state
  
  The public UIX boundary MUST remain distinct from admin UIX and from backend API-only concerns.
