body: |-
  ## Scope
  
  This specification governs developer self-service OAuth/OIDC client management.
  
  ## Requirements
  
  Authorized developers MAY register, inspect, update, rotate, disable, enable, and delete OAuth/OIDC clients only within their authorized tenant and app ownership boundary. Client management MUST cover redirect URIs, post-logout redirect URIs, grant types, response types, scopes, token endpoint auth methods, client secrets, client JWKS, and metadata where supported.
  
  Runtime behavior MUST align with dynamic client registration and client registration management contracts where those endpoints are enabled.
  
  ## Verification
  
  Verification MUST prove client registration and management operations enforce tenant/app ownership, validate metadata, protect secrets, support configured auth methods, and fail closed for unauthorized client mutation.
