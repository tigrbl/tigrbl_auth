body: |-
  ## Requirements
  
  The admin API boundary MUST define the authenticated and authorized control-plane API surface for `tigrbl_auth`.
  
  Required in-scope capabilities:
  - implementation-backed admin contract publication
  - administrative resource management operations
  - policy administration API operations
  - authenticated admin-only control-plane actions
  
  Required exclusions:
  - public OAuth/OIDC routes
  - public browser-facing UX concerns
  - CLI-only behaviors that are not part of the API contract
  
  The admin API boundary MUST remain separate from the public API boundary and MUST fail closed when admin enablement or authorization requirements are not satisfied.
