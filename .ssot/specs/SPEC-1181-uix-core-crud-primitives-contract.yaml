body: |-
  This contract defines @tigrbl-auth/uix-core as the shared owner for reusable workflow CRUD primitives used by product UIX packages. Required primitives include ResourceToolbar, ResourceTable, create and edit resource dialogs, DetailDrawer, DangerZone, InlineMutationResult, ApiErrorNotice, typed field controls, and a mutation state hook. The primitives must be API-agnostic, accessible, reusable across platform-admin, tenant-admin, developer, service-admin, my-account, and demo-hub UIX packages, and must not encode product-specific routes, credentials, tenant selection, or authorization decisions. Product UIX packages own API clients and workflow composition while importing shared primitives from uix-core.
