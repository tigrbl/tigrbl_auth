body: |-
  ## Requirements
  
  The admin UIX boundary MUST define the administrator browser-facing surface for `tigrbl_auth`.
  
  Required in-scope capabilities:
  - authenticated admin entry and session gate
  - console shell and governed navigation
  - readiness and configuration views
  - administrative resource views
  - policy administration views
  - safe mutation workflows
  
  Required exclusions:
  - public end-user authentication UX
  - raw secret disclosure
  - backend-only implementation internals
  - unrelated CLI-only behaviors that are not rendered through the admin UIX
  
  The admin UIX boundary MUST remain separate from public UIX and MUST consume governed backend contracts rather than inventing an untracked surface.
