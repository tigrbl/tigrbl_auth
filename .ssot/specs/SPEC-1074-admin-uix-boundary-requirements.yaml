body: |-
  ## Requirements

  The admin UIX boundary defines administrator browser-facing surfaces for `tigrbl_auth`.

  The historical `apps/admin-uix` package is a compatibility and extraction source while product UIXs are separated. New administrator workflows SHOULD land in the product UIX that owns the workflow:

  - `apps/platform-admin-uix` for tenant lifecycle and platform authority assignment.
  - `apps/tenant-admin-uix` for tenant identities, tenant admins, tenant JWKS, and tenant-local policy.
  - `apps/developer-uix` for OIDC/OAuth app and client registration workflows.
  - `apps/service-admin-uix` for machine, service, workload, API-key, and service-key workflows.

  Required exclusions remain: public end-user authentication UX, raw secret disclosure, backend-only implementation internals, and unrelated CLI-only behaviors.

  Each split UIX MUST consume a governed product API contract rather than inventing an untracked surface.
