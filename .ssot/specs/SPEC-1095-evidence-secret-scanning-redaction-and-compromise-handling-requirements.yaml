body: |-
  ## Overview
  
  This specification defines fail-closed requirements for secret scanning,
  redaction policy, compromised-artifact invalidation, and evidence reuse
  boundaries.
  
  ## Decision Source
  
  Decision source: `adr:1093`.
  
  ## Scope
  
  This specification applies to preserved compliance reports, runtime reports,
  evidence bundles, manifests, peer hand-off artifacts, and generated release
  evidence consumed for certification or publication decisions.
  
  ## Prohibited Preserved Material
  
  Preserved evidence MUST NOT contain:
  
  - plaintext bootstrap credentials;
  - bearer tokens or refresh tokens;
  - JWTs or DPoP proofs when preservation would allow replay or secret
    recovery;
  - private keys or secret key material; and
  - raw API keys, service secrets, or password material.
  
  Stable redacted markers MAY appear when they explicitly indicate that the
  original secret-bearing material is not preserved.
  
  ## Secret Scanning
  
  Evidence preservation MUST include secret scanning before artifacts are
  treated as certifiable evidence.
  
  Secret scanning failures MUST fail closed for certification, promotion,
  publication, and peer-hand-off gates.
  
  ## Redaction Policy
  
  Redaction policy MUST define:
  
  - what classes of values are secret-bearing;
  - allowed redacted marker semantics;
  - whether artifact regeneration is required after redaction; and
  - how redacted artifacts remain linked to the clean execution that produced
    them.
  
  ## Compromised Artifact Handling
  
  Evidence known to have preserved secret-bearing runtime material MUST be
  marked compromised or non-authoritative for certification use.
  
  Compromised artifacts MUST NOT satisfy required release gates until replaced
  by clean rebuilt artifacts from validated execution.
  
  ## Verification
  
  Verification MUST prove:
  
  - secret-bearing patterns are absent from preserved certifiable evidence;
  - redacted markers are allowed and do not preserve replayable material;
  - compromised artifacts are excluded from active proof chains; and
  - release gates fail closed when required evidence is secret-bearing or
    marked compromised.
