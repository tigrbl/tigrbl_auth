body: |-
  ## Requirements
  
  Tenant lifecycle MUST support create, read, update, suspend, restore, and guarded delete operations.
  
  Create MUST establish tenant identity, canonical slug, display metadata, lifecycle state, initial owner assignment hook, and audit event emission.
  
  Update MUST enforce slug uniqueness, lifecycle-state constraints, and immutable identity boundaries.
  
  Suspend and restore MUST be explicit state transitions and MUST NOT physically delete tenant data.
  
  Delete MUST be guarded by policy, must reject default/system tenants, and must emit durable audit evidence.
