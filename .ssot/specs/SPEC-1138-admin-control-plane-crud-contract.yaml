body: |-
  Defines administrative CRUD surfaces for tenants, principals, credentials, clients, apps, services, resource servers, JWKS, and policy.
  
  Administrative CRUD MUST be assigned to the narrowest product API that owns the workflow. Platform tenant lifecycle belongs to platform-admin API. Tenant identities, tenant admins, tenant JWKS, tenant-local clients, tenant-local policy, consent, sessions, and audit belong to tenant-admin API unless platform authority is required. OIDC/OAuth app and client registration belongs to developer API. Service identities, service keys, API keys, workload credentials, and token validation testing belong to service-admin API.
  
  Broad admin CRUD remains a compatibility umbrella only when explicitly deployed.
