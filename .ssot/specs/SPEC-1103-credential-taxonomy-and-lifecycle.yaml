body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-credentials`.
  
  ## First-Class Objects
  
  The package MUST define:
  
  - `Credential`
  - `CredentialBinding`
  - `CredentialVerificationResult`
  - `CredentialStatus`
  - `PasswordCredential`
  - `ApiKeyCredential`
  - `ServiceKeyCredential`
  - `ClientSecretCredential`
  - `JwtAssertionCredential`
  - `MtlsCertificateCredential`
  - `DpopKeyCredential`
  - `WebAuthnCredential`
  - `PasskeyCredential`
  - `RecoveryCodeCredential`
  - `SessionCookieCredential`
  - `RefreshTokenCredential`
  - `DeviceCodeCredential`
  - `CredentialRotation`
  - `CredentialRevocation`
  - `CredentialPosture`
  
  ## Requirements
  
  Credentials prove control of a principal, authorize a flow artifact, or bind
  authentication state. Credentials are not principals.
  
  Credential lifecycle MUST include issue, bind, verify, rotate, revoke, expire,
  last-used, redaction, and compromise/invalidation semantics where applicable.
  
  Credential verification MUST produce structured facts that policy can consume.
  Policy MUST NOT perform password, key, assertion, certificate, or passkey
  verification itself.
  
  `credentials` MAY use stable principal references. It SHOULD NOT require
  concrete principal implementations except where lifecycle validation requires
  them.
  
  ## Verification
  
  Verification MUST prove credential verification result objects are independent
  of OAuth/OIDC protocol flow execution and JOSE token serialization.
