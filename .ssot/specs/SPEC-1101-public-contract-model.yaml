body: |-
  ## Scope
  
  This specification governs `tigrbl-identity-contracts`.
  
  ## First-Class Objects
  
  `contracts` MUST define public contract models for:
  
  - `AuthorizeRequest`
  - `AuthorizeResponse`
  - `TokenRequest`
  - `TokenResponse`
  - `IntrospectionRequest`
  - `IntrospectionResponse`
  - `RevocationRequest`
  - `DeviceAuthorizationRequest`
  - `DeviceAuthorizationResponse`
  - `OpenIDConfiguration`
  - `OAuthAuthorizationServerMetadata`
  - `ProtectedResourceMetadata`
  - `JwksDocument`
  - `AdminRequest`
  - `AdminResponse`
  - `ErrorResponse`
  - `CapabilityManifest`
  - `OpenApiContractInput`
  - `OpenRpcContractInput`
  
  ## Requirements
  
  Contract models MUST be suitable for external consumers and generated contract
  projections.
  
  Contracts MAY depend on `core` primitives.
  
  Contracts MUST NOT contain business logic, persistence logic, token signing,
  credential verification, ASGI app construction, or repository tooling workflows.
  
  ## Verification
  
  Verification MUST prove that public schemas can be imported and serialized
  without importing storage, server, runtime, or repository tooling packages.
