body: |-
  ## Requirements
  
  The repository MUST define support and applicability semantics for:
  - RFC 9112 HTTP/1.1
  - RFC 9113 HTTP/2
  - RFC 9114 HTTP/3
  - RFC 9000 QUIC
  
  For each transport concern, the repository MUST distinguish:
  - backend/runtime support
  - runtime enablement
  - contract visibility
  - browser or UIX dependency
  - certification claimability
  
  Transport posture requirements MUST be expressible across runtime, admin API, public API, admin UIX, and public UIX without conflating support with mandatory use.
