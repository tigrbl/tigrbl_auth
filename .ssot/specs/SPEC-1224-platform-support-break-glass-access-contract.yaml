body: |-
  ## Requirements
  
  Platform support and break-glass access MUST be distinct from platform owner and platform administrator authority.
  
  Support users MAY inspect approved operational views and run explicitly delegated recovery workflows.
  
  Support users MUST NOT receive default tenant ownership, tenant-local administrative authority, developer app ownership, or service identity ownership unless a separate authority grant exists.
  
  Break-glass workflows MUST require explicit reason capture, audit event emission, environment guardrails, and bounded authority.
  
  These workflows MUST NOT create or imply a separate operator role, operator action family, or operator state model.
