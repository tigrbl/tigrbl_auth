body: |-
  ## Scope
  
  This specification governs API-key, service-key, workload assertion, and related non-human credential administration through the service-admin API.
  
  ## Requirements
  
  Authorized service admins MAY issue, bind, rotate, revoke, disable, enable, inspect metadata for, and retire non-human credentials only within authorized ownership boundaries. Credential workflows MUST avoid secret disclosure after issuance, protect private material, preserve credential posture, and emit audit events.
  
  Credential operations MUST remain distinct from developer client-secret management and tenant-admin human credential workflows.
  
  ## Verification
  
  Verification MUST prove credential lifecycle operations are ownership-scoped, policy-authorized, secret-safe, auditable, and denied across developer, tenant-admin, platform-admin, and public surfaces.
