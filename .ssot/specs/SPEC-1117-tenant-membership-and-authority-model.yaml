body: |-
  ## Scope
  
  This specification governs tenant membership and authority semantics.
  
  ## First-Class Objects
  
  The model MUST define:
  
  - `Account`
  - `UserPrincipal`
  - `TenantMembership`
  - `TenantRole`
  - `DeploymentSuperuserAuthority`
  - `TenantAdminAuthority`
  - `TenantOwnerAuthority`
  - `AppOwnerAuthority`
  - `DeveloperAuthority`
  - `MemberAuthority`
  - `Invitation`
  - `MembershipAuditEvent`
  
  ## Requirements
  
  A user/account MAY belong to multiple tenants through memberships.
  
  Tenant roles and authorities MUST be membership-scoped unless explicitly
  deployment-scoped.
  
  Deployment superuser authority MUST NOT imply ordinary tenant membership
  unless explicitly granted or policy allows break-glass behavior.
  
  Tenant owner/admin/developer/member authority MUST be evaluated by policy.
  
  Membership changes MUST produce audit events.
  
  ## Verification
  
  Verification MUST prove membership creation, invitation acceptance, role
  assignment, role removal, cross-tenant denial, deployment-superuser
  separation, and audit event creation.
