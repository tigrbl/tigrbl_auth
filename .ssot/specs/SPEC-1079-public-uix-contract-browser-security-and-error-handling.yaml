body: |-
  ## Requirements
  
  Public UIX MUST consume governed public HTTP/OpenAPI surfaces only and MUST NOT consume admin OpenRPC/control-plane surfaces.
  
  Public UIX security requirements MUST cover:
  - cookie handling
  - CSRF protections
  - redirect and origin constraints
  - browser-facing token handling
  - safe session continuity behavior
  
  Public UIX error handling MUST define:
  - problem-details rendering rules
  - safe user-visible error disclosure
  - non-disclosure of backend-only or secret-bearing internals
  
  Public UIX contract consumption and security behavior MUST remain consistent across supported deployment profiles.
