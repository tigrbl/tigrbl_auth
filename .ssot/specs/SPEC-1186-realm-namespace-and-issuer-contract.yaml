summary: "Realms MUST be first-class identity namespace records owned by canonical identity storage. Realm-scoped issuer metadata MUST use /realms/{realm_slug} as the issuer path. Tenants MUST belong to a realm, with existing tenants treated as default-realm compatibility records when no realm_id is present. Product APIs MUST resolve realm context before tenant-scoped behavior."
