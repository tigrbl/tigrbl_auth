body: |-
  ## Decision
  
  Service, machine, workload, and device identities SHALL be modeled as
  principal types, not as users.
  
  Their proof material SHALL be modeled as credentials.
  
  Their authorization SHALL be modeled through policy.
  
  The normalized non-human flow is:
  
  1. Tenant admin creates a service, machine, workload, or device principal.
  2. Admin issues or binds one or more credentials, such as service key, JWT
     assertion key, mTLS certificate, DPoP key, or device credential.
  3. The non-human principal authenticates to a token endpoint or
     admin-approved API.
  4. Authorization enforces tenant, audience, resource, scope, delegation, and
     proof-binding constraints.
  5. Resource server validates the token and proof binding before accepting the
     request.
  
  ## Context
  
  Existing ADR and SPEC records already govern non-human and device identity
  boundaries. The package-boundary proposal refines the implementation split
  across `principals`, `credentials`, `policy`, `oauth`, `jose`, `admin`, and
  `resource-server`.
  
  Treating service keys or workload credentials as users would break audit,
  lifecycle, tenant isolation, and standards mapping.
  
  ## Consequences
  
  `principals` owns `ServicePrincipal`, `MachinePrincipal`,
  `WorkloadPrincipal`, and `DevicePrincipal`.
  
  `credentials` owns service keys, JWT assertion credentials, mTLS certificate
  bindings, DPoP key bindings, device credentials, and credential posture.
  
  `oauth` owns RFC 7523, RFC 8705, RFC 8693, RFC 9449, and related OAuth
  protocol semantics.
  
  `policy` owns tenant, trust-domain, delegation, resource, scope, and
  proof-binding authorization decisions.
  
  `admin` owns lifecycle operations.
  
  `resource-server` owns downstream verifier enforcement.
