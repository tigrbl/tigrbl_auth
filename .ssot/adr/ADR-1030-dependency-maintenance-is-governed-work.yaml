body: |-
  - Status: accepted
  - Date: 2026-04-18
  - Decision: dependency upgrades that can change runtime behavior, contracts, evidence, or certification lanes are modeled as explicit governance work rather than implicit housekeeping.
  - Consequences:
    - dependency pull requests can be mapped to named features, claims, and tests;
    - runtime and test-toolchain compatibility expectations remain auditable;
    - untracked dependency drift is treated as missing governance coverage.
