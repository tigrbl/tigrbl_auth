body: |-
  ## Decision
  
  Developer API is the delegated developer control plane for tenant-scoped app registration, OAuth/OIDC client registration, client metadata, redirect/logout URI management, client authentication configuration, client secrets, and client JWKS administration.
  
  ## Consequences
  
  Developer API MUST NOT expose platform tenant lifecycle, cross-tenant authority assignment, tenant-admin identity management, service identity administration, or human login/authorization flows. Developer API deployments MUST enforce tenant and app ownership before app/client read or mutation and fail closed for cross-surface operations.
