body: |-
  Decision: Realm is the issuer, namespace, signing, discovery, and token authority boundary above Tenant. Tenant remains the customer, organization, delegated administration, and data boundary inside a Realm. Platform administration owns Realm lifecycle and Tenant assignment. Existing tenant-scoped and unprefixed routes remain default-realm compatibility surfaces for this implementation slice.
