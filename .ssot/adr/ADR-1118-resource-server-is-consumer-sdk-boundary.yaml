body: |-
  Decision: tigrbl-identity-resource-server validates access tokens and protected-resource authorization metadata for APIs; it does not issue tokens or host login.
  
  Rationale: protected APIs need lightweight verifier tooling that is separate from the identity provider and RP login clients.
  
  Consequences: resource-server SDK work focuses on token validation, JWKS cache, introspection fallback, audience/scope checks, and proof-binding validation.
