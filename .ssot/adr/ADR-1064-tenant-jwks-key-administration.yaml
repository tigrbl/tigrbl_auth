body: |-
  Decision: Tenant JWKS keys are first-class tenant-scoped key records administered through the authenticated control plane. Runtime public discovery remains read-only, while admin RPC methods own seed, create, update, delete, and list mutation flows. Rationale: tenant JWKS publication cannot be operable if keys can only be observed after out-of-band operator state writes. The same durable operator-state service must back CLI/operator workflows, admin RPC, UIX actions, and public JWKS projection so publication parity is testable. Consequences: key mutations must preserve tenant isolation, never expose private key material, use safe public JWK fields only, and refresh the UI from the public tenant JWKS route after mutation.
