summary: "Decision: product UIX CRUD must be workflow-oriented and surface-scoped, not raw table administration. Shared reusable CRUD, mutation, error, drawer, toolbar, and form primitives live in @tigrbl-auth/uix-core. Product UIX packages compose those primitives only through their frontdoor API contracts and must preserve the product boundaries established by the surface-separated API architecture. Public UIX remains the hosted-login reference; admin, developer, service, tenant, my-account, and demo UIX surfaces may consume uix-core primitives for executable CRUD journeys."
