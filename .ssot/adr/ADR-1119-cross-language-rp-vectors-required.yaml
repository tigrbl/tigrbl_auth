body: |-
  Decision: shared RP behavior must be proven by common vectors executed against both Python and TypeScript implementations.
  
  Rationale: shared semantics are only meaningful if the implementations produce equivalent decisions for the same protocol inputs.
  
  Consequences: the testkit owns vector fixtures, Python tests consume them, and npm tests consume the same canonical vector data.
