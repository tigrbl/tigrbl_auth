body: |-
  ## Decision
  
  The target identity model SHALL separate human account identity from
  tenant-scoped membership.
  
  The target model is:
  
  ```text
  Account / User
    -> TenantMembership
        -> Tenant
        -> roles / entitlements inside that tenant
  ```
  
  The current tenant-bound `User` shape MAY remain during migration, but new
  package boundaries SHALL model tenant authority through `TenantMembership`.
  
  ## Context
  
  The current repo's `User` model is tenant-bound.
  
  For a platform where one human can belong to multiple tenants, tenant-bound
  users duplicate the human identity record and blur account lifecycle,
  authentication factors, recovery, and cross-tenant memberships.
  
  The package-boundary proposal calls out a cleaner target model: a global
  account plus tenant memberships.
  
  ## Consequences
  
  `principals` owns `UserPrincipal` / account semantics and
  `TenantMembership`.
  
  `policy` owns tenant-scoped authority evaluation.
  
  `admin` owns lifecycle operations for memberships, invitations, tenant admins,
  owners, developers, and members.
  
  `credentials` binds authentication material to the global user/account
  principal rather than duplicating credentials per tenant unless policy
  requires tenant-specific credentials.
  
  Migration must preserve compatibility with existing tenant-bound user rows.
