body: |-
  ## Decision
  
  `tigrbl-identity-resource-server` and `tigrbl-identity-rp` are governed
  consumer packages, but they are second-wave packages unless `spc:1099` is
  updated to include them in the first-wave package set.
  
  The base first wave remains provider-side:
  
  - core
  - contracts
  - principals
  - credentials
  - jose
  - policy
  - oauth
  - oidc
  - admin
  - storage-sqlalchemy
  - server
  - runtime
  - operator
  - testkit
  - facade
  
  ## Context
  
  The package-boundary proposal includes resource-server and RP packages, but
  also notes they are important consumer roles that require more work.
  
  The first ADR/SPEC wave has already frozen the provider-side package suite.
  Adding consumer packages to first wave changes the dependency DAG, test scope,
  and migration plan.
  
  ## Consequences
  
  Consumer packages can be designed and tracked now without forcing the initial
  split to implement every downstream SDK/toolkit.
  
  Promoting either package into first wave requires updating the package suite
  boundary SPEC and package DAG verification.
