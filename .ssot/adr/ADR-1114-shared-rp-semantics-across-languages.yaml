body: |-
  Decision: Python and TypeScript RP packages must implement the same governed semantics for discovery, PKCE, state, nonce, callback validation, token validation, userinfo, and logout.
  
  Rationale: relying-party behavior must be predictable across application stacks. Cross-language parity prevents drift between browser and server integrations.
  
  Consequences: shared vectors are required for overlapping behavior, and package-specific tests must point back to the same RP contract specs.
