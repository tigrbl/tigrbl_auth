body: |-
  Decision: tigrbl_auth treats authorization safety, liveness, isolation, closure, monotonicity, attenuation, minimality, referential integrity, determinism, and control-plane correctness as first-class certifiable properties. These properties are governed separately from OAuth/OIDC protocol conformance and must be targetable through SPEC, feature, test, claim, and evidence rows before they can be represented as implementation or certification claims.
