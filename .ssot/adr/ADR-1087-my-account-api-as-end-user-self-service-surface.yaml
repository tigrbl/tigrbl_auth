summary: "Decision: add tigrbl-auth-api-my-account as the first-class end-user account self-service frontdoor. The surface is current-subject scoped and does not expose admin, tenant-wide user management, RPC, or table CRUD routes. Backend ownership remains in existing identity packages: principals, credentials, policy, oidc, and storage. Public API remains the OAuth/OIDC issuer and hosted-login surface; My Account owns authenticated profile, session, consent, authorized-app, and credential self-service."
