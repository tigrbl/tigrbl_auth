body: |-
  ## Decision
  
  Create `tigrbl-identity-policy` as the explicit owner of authorization
  decision objects and policy evaluation contracts.
  
  The package owns:
  
  - `Policy`
  - `PolicyRequest`
  - `PolicyContext`
  - `PolicyDecision`
  - `RbacPolicy`
  - `AbacPolicy`
  - `ScopePolicy`
  - `TenantIsolationPolicy`
  - `DelegatedAdminPolicy`
  - `ClientExposurePolicy`
  - `CredentialUsePolicy`
  - `AuthorizationTrace`
  - `PolicyVersion`
  - `PolicyRegistry`
  - `AuditPolicy`
  
  ## Context
  
  The current system includes RBAC, ABAC, delegated administration, tenant
  isolation, client exposure control, scope checks, service identity
  authorization, audit, and provenance behavior.
  
  If policy is not its own boundary, authorization decisions will leak into
  OAuth, OIDC, admin, server, and principals code.
  
  ## Constraints
  
  Policy consumes principal refs, credential facts, scopes, context, and claims.
  Policy MUST NOT verify passwords, parse OAuth grants, sign tokens, mount
  routes, or open DB sessions.
  
  ## Consequences
  
  Authorization remains reusable across admin APIs, OAuth token issuance,
  resource verification, runtime surfaces, and operator checks.
