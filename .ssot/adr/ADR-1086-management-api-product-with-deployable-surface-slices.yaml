body: |-
  Decision: Frame platform-admin, tenant-admin, developer, and service-admin as scoped deployable slices of a broader Management API product unless a future accepted ADR promotes one slice into an independently marketed product. Context: adr:1120 governs surface-separated API front doors for deployment and product filtering, but competitor research shows management capabilities are typically grouped under one management/admin API with resource groups. Consequences: packages may remain separate deployable front doors, while docs, specs, and matrices should identify the shared Management API product and then name platform, tenant, developer, and service/workload resource groups.
