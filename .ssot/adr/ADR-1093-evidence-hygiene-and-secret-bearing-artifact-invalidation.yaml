body: |-
  ## Context
  
  Preserved evidence is part of the release and certification boundary.
  Evidence that preserves bootstrap credentials, bearer tokens, private keys,
  or similar sensitive runtime material cannot remain trustworthy certification
  input.
  
  ## Decision
  
  Preserved evidence must fail closed on secret-bearing material.
  
  The repository shall govern:
  
  - secret scanning expectations for preserved evidence;
  - redaction-safe projection rules;
  - compromised-artifact invalidation rules; and
  - release-gate behavior when evidence hygiene fails.
  
  Evidence that preserves sensitive bootstrap or runtime material is invalid
  for certification, promotion, publication, or peer-hand-off use until
  rebuilt from clean execution.
  
  ## Operational Consequences
  
  Redaction is not optional presentation polish; it is a release-boundary
  requirement.
  
  Compromised evidence may remain archived for incident or historical analysis
  only when clearly marked non-authoritative and excluded from certification
  proof chains.
