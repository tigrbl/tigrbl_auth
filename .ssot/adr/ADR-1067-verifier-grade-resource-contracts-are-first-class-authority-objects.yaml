body: |-
  ## Decision
  
  `tigrbl_auth` MUST treat verifier-grade resource contracts as first-class
  authority objects rather than as metadata side effects of endpoint code.
  
  Resource contracts MUST own, at minimum:
  
  - accepted issuers;
  - accepted audience and resource bindings;
  - accepted token classes;
  - sender-constraint requirements;
  - replay and freshness expectations;
  - JWKS cache freshness expectations;
  - revocation visibility expectations;
  - replay-registry visibility expectations;
  - introspection freshness expectations;
  - required claims or proof material; and
  - introspection-caller policy when introspection is part of the verifier
    surface.

  Resource contracts MUST also define fail-closed behavior for stale verifier
  state, delayed upstream convergence, and partitioned verification paths.
  
  RFC 9728 publication is a projection of this authority object, not the source
  of truth.
  
  ## Rationale
  
  The repository already publishes protected-resource metadata, but verifier
  behavior is still too distributed to certify as one coherent contract.
  
  ## Consequences
  
  Runtime verifiers, metadata publication, introspection caller
  authentication, sender-constrained token presentation, verifier-state
  freshness policy, and interoperability evidence should all derive from the
  same governed resource-contract source.
