summary: "Decision: the public UIX OIDC context panel is a presentation projection over verified provider outputs, not an authentication source of truth. The provider backend owns token minting, UserInfo responses, issuer binding, nonce/session/auth-time claims, and session cookies. Public UIX owns clear display provenance, source labels for ID token, access token, and UserInfo fields, safe redaction, and deterministic routing after callback. Downstream BMVP demos consume this provider-side contract rather than implementing a parallel auth protocol."
