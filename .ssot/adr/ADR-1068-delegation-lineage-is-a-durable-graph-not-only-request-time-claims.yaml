body: |-
  ## Decision
  
  Delegation and token exchange lineage MUST be represented as durable
  server-side provenance, not only as request-time claims or audit log strings.
  
  The governed model MUST be capable of expressing:
  
  - parent and child delegation edges;
  - actor and subject relationships;
  - attenuation and narrowing semantics;
  - proof-binding continuity;
  - trust-domain context; and
  - issued-token lineage.
  
  ## Rationale
  
  `act` claims and immediate exchange logs capture only a fragment of delegated
  authority movement. Verifier-grade interoperability and auditability require
  a durable graph or equivalent governed event chain.
  
  ## Consequences
  
  Token exchange becomes a provenance-bearing authorization surface rather than
  a one-shot request transformation.
