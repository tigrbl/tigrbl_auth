decision_date: null
tags: []
summary: "Decision: Residency and sovereignty are authorization-policy concerns attached to tenant and realm data boundaries, not OAuth/OIDC protocol semantics. Target: RFC 6973 Privacy Considerations for Internet Protocols at https://www.rfc-editor.org/rfc/rfc6973.html. Consequences: runtime policy records declare tenant residency zones, allowed processing regions, restricted transfer regions, and sovereign controls; evaluation must return structured decisions and fail closed when the processing region, tenant, or realm violates the declared boundary."
