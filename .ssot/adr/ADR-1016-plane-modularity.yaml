body: |-
  ## Decision
  
  Runtime planes remain first-class repository boundaries, but the repository
  MUST distinguish:
  
  - logical plane separation inside one runtime image; and
  - hard runtime-plane isolation across deployable trust boundaries.
  
  A single ASGI application that exposes multiple planes behind flags, paths, or
  authorization gates satisfies logical modularity only. It MUST NOT be
  described as hard plane isolation.
  
  Mixed-mode deployments that co-host privileged and public planes MUST be
  classified explicitly as downgraded posture until a hard-isolation tier exists.
  
  Each plane owns one authoritative concern. Authorization surfaces own
  permission evaluation and enforcement. Administration surfaces own privileged
  operational workflows and safe mutations. Governance surfaces own durable
  policy truth, version lifecycle, approval rules, audit requirements, and
  published effective-policy projections. Runtime protocol surfaces may consume
  published effective policy, but they MUST NOT mutate governance policy.
  
  Administrative APIs or UIX components MAY present, request, approve, or execute
  policy-backed operations, but they MUST NOT become the source of truth for
  governance policy records. Authorization components MAY decide whether an actor
  can perform a policy or administration action, but they MUST NOT define the
  policy being governed.
  
  ## Context
  
  The repository already separates concerns across `api/`, `security/`,
  `services/`, `standards/`, and related modules. That is necessary, but it does
  not by itself prove that the public plane, admin plane, RPC plane, and
  diagnostics plane have separate runtime trust envelopes.
  
  Key rotation illustrates the cross-plane boundary. A key rotation operation is
  an administrative or operator workflow, while the durable rule that defines
  cadence, approval, emergency triggers, overlap windows, retirement windows,
  publication requirements, and evidence obligations is governance policy.
  
  ## Consequences
  
  Plane-oriented architecture remains mandatory, but release and certification
  language MUST reflect the stronger distinction between:
  
  - one-process logical composition;
  - multi-plane runtime composition with downgraded posture; and
  - hard-isolated plane deployment.
  
  Cross-plane overlap is nonconformant when one plane persists another plane's
  authoritative state. Tests and release gates SHOULD fail if authorization code
  mutates governance policy, if administration stores policy truth outside the
  governance model, or if runtime protocol code bypasses published effective
  policy.
