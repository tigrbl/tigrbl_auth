body: |-
  ## Decision
  
  Runtime planes remain first-class repository boundaries, but the repository
  MUST distinguish:
  
  - logical plane separation inside one runtime image; and
  - hard runtime-plane isolation across deployable trust boundaries.
  
  A single ASGI application that exposes multiple planes behind flags, paths, or
  authorization gates satisfies logical modularity only. It MUST NOT be
  described as hard plane isolation.
  
  Mixed-mode deployments that co-host privileged and public planes MUST be
  classified explicitly as downgraded posture until a hard-isolation tier exists.
  
  ## Context
  
  The repository already separates concerns across `api/`, `security/`,
  `services/`, `standards/`, and related modules. That is necessary, but it does
  not by itself prove that the public plane, admin plane, RPC plane, and
  diagnostics plane have separate runtime trust envelopes.
  
  ## Consequences
  
  Plane-oriented architecture remains mandatory, but release and certification
  language MUST reflect the stronger distinction between:
  
  - one-process logical composition;
  - multi-plane runtime composition with downgraded posture; and
  - hard-isolated plane deployment.
