body: |-
  Decision: strategic certification concern order is realm isolation, tenant isolation, issuer determinism, runtime capability truth, authorization mutation and freshness, JOSE and cryptographic boundary governance, resource-server verifier certification, machine identity governance, delegation provenance, authorization observability, runtime qualification, constraint-native authorization, authorization budgets, cross-issuer trust, and credential privacy. Realm isolation is distinct from tenant isolation. VC/OIDC4VC, OIDC4VCI, OID4VP, SIOPv2, HAIP, Authz API 1.0, OIDC 1.1, RISC/CAEP/SET/SSE are valid later standards but are non-blocking for current maturity.
