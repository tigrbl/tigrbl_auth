summary: "Product UIX apps are separately deployable edge clients. Each product UIX must declare one paired API surface and must not call another product API, admin surface, RPC endpoint, diagnostics endpoint, system endpoint, or tenant lifecycle path outside its authority. The legacy admin-uix remains only as an extraction source until parity is proven."
