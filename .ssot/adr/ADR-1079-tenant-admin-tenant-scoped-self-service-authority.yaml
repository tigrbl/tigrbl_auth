body: |-
  ## Decision
  
  Tenant-admin API is the delegated tenant-scoped control plane for tenant self-service administration. It owns tenant-scoped identities, tenant administrators, tenant keys and JWKS, tenant-local clients, tenant-local policy and configuration, sessions, consent, and tenant audit visibility.
  
  ## Consequences
  
  Tenant-admin API MUST NOT create, delete, suspend, or restore tenants and MUST NOT grant cross-tenant or platform-wide authority. Those workflows remain platform-admin responsibilities. Tenant-admin API deployments MUST enforce tenant isolation and fail closed for cross-tenant or platform lifecycle operations.
