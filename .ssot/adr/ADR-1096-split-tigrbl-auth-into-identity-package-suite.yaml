body: |-
  ## Decision
  
  Split the implementation into a governed package suite:
  
  - `tigrbl-identity-core`
  - `tigrbl-identity-contracts`
  - `tigrbl-identity-principals`
  - `tigrbl-identity-credentials`
  - `tigrbl-identity-jose`
  - `tigrbl-identity-policy`
  - `tigrbl-identity-oauth`
  - `tigrbl-identity-oidc`
  - `tigrbl-identity-admin`
  - `tigrbl-identity-storage`
  - `tigrbl-identity-server`
  - `tigrbl-identity-runtime`
  - `tigrbl-identity-operator`
  - `tigrbl-identity-testkit`
  - `tigrbl-auth`
  
  Distribution names use hyphens. Import names use independent top-level
  packages with underscores, such as `tigrbl_identity_oauth`.
  `tigrbl-auth` remains the facade and compatibility package.
  
  ## Context
  
  The current repository combines protocol standards, SQLAlchemy/Tigrbl tables,
  REST/RPC surfaces, admin operations, runtime profile configuration,
  CLI/operator workflows, contracts, and conformance evidence in one package.
  
  This makes boundaries hard to enforce and makes it difficult to claim exactly
  which package owns which standards, runtime behavior, storage behavior, or
  identity surface.
  
  ## Consequences
  
  Each package has a claimable ownership boundary. Protocol packages can remain
  pure. Storage, runtime, operator, and testkit dependencies no longer leak into
  the protocol layer.
  
  The split requires a compatibility and migration plan for existing
  `tigrbl_auth.*` imports.
