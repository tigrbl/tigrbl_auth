summary: "Decision: Treat machine-to-machine access and workload identity as a first-class product lane rather than a subsection of service administration. Context: the repo already contains client credentials token behavior, service and workload identity planning, API-key and service-key administration, and resource-server validation contracts. Consequences: product docs, specs, tests, and API matrices must name M2M, client credentials, service principals, machine principals, workload principals, credential lifecycle, token issuance, and protected-resource validation handoff explicitly. This ADR clarifies adr:1109 and the service-admin surface without replacing them."
