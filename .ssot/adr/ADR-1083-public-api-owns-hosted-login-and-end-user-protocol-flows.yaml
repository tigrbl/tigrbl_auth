body: |-
  The public API front door owns browser-facing OAuth/OIDC and white-label hosted-login support for end users. It exposes login, authorization, token, logout, registration, consent, recovery, discovery, JWKS, and public helper routes needed by public UIX and tenant-branded clients. It must not expose admin resources, tenant lifecycle administration, diagnostics, or RPC/control-plane methods.
