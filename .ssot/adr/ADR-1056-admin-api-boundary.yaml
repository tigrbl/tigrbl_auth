body: |-
  ## Decision
  
  Status: proposed
  Date: 2026-05-04
  
  `tigrbl_auth` MUST define the admin API as a separate governed boundary. The admin API boundary includes authenticated and authorized control-plane operations, administrative resource management, administrative policy operations, and implementation-backed admin contract publication. The admin API boundary MUST remain separate from the public API boundary and from public UIX concerns.
  
  ## Rationale
  
  The repository already exposes admin contracts and control-plane behavior, but the boundary itself should be explicit. A boundary ADR prevents accidental public exposure, clarifies contract ownership, and provides a stable basis for admin API specs and tests.
  
  ## Scope
  
  In scope: OpenRPC-backed admin/control-plane behavior, authenticated admin operations, administrative resource and policy actions. Out of scope: public OAuth/OIDC routes, public browser UX, and CLI-only behaviors that are not part of the admin API itself.
