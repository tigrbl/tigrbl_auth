body: |-
  Decision: ship both tigrbl-identity-rp for server/confidential RP use and @tigrbl/identity-rp for browser/public-client RP use.
  
  Rationale: browser/public clients and backend/confidential clients have different security, storage, and client-authentication constraints. One implementation surface would either weaken browser safety or under-serve confidential web apps.
  
  Consequences: shared RP semantics are governed in SSOT, while language/runtime-specific packages implement those semantics through appropriate adapters.
