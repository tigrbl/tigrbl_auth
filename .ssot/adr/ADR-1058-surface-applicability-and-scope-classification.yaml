body: |-
  ## Decision
  
  Status: proposed
  Date: 2026-05-04
  
  `tigrbl_auth` MUST use a normative applicability and scope classification model for governed surfaces and targets. The authoritative model MUST distinguish implemented, planned, not-applicable, out-of-scope, and adjacent-but-non-authoritative states. Informative reports MAY summarize those states, but they MUST NOT invent ambiguous empty-state semantics.
  
  ## Rationale
  
  Informative matrices and reports can otherwise collapse true missing governance and intentional non-applicability into the same symptom. That produces false gaps and encourages the wrong remediation work.
  
  ## Scope
  
  This ADR governs authoritative scope classification in SSOT and the projection rules used by informative reports. It does not make informative reports normative.
