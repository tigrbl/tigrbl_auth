body: |-
  ## Decision
  
  Tier 3 bundles, Tier 4 peer manifests, and related release-facing evidence
  remain machine-generated from governed inputs. However, the repository MUST
  distinguish:
  
  - repo-generated or repo-staged peer bundles; and
  - independently qualifying verifier evidence.
  
  Repo-staged peer fixtures are useful, but they do not by themselves satisfy
  the stronger certification wording associated with independent verifier-grade
  interoperability.
  
  ## Consequences
  
  Evidence readiness remains observable and reproducible, but promotion language
  MUST stay fail-closed when:
  
  - independent peer execution has not been established;
  - a resource-server profile has only self-generated peer artifacts; or
  - retained fixtures are being mistaken for independent proof.
