body: |-
  Decision: RP packages own consumer-side PKCE verifier generation, S256 code_challenge derivation, state/nonce association, and authorization URL construction. Target: RFC 7636 Proof Key for Code Exchange at https://www.rfc-editor.org/rfc/rfc7636.html plus OAuth security guidance that requires PKCE for authorization-code clients. Consequences: concrete RP PKCE verifier and login URL features require executable T0/T1/T2 proof before implemented status; provider token exchange remains OAuth/server ownership.
