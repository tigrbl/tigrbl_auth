body: |-
  ## Decision
  
  Create `tigrbl-identity-storage` as the persistence adapter package.
  SQLAlchemy/Tigrbl tables are the default implementation substrate, but the
  tracked package boundary is storage.
  
  It owns:
  
  - table mappings
  - ORM integration
  - migrations
  - repository implementations
  - unit-of-work implementations
  - database bootstrap
  - SQLite/Postgres portability
  - migration evidence hooks
  
  ## Context
  
  The current package includes table resources, ORM models, persistence
  lifecycle, engine configuration, SQLite support, and Postgres extras. Runtime
  and surface code currently reach into table resources and engine details.
  
  Protocol packages should not know whether state is stored in SQLite,
  Postgres, Redis, memory, or a test fake.
  
  ## Constraints
  
  Storage may import semantic/protocol packages to map their objects, but
  protocol packages MUST NOT import storage.
  
  Server may depend on storage as the default adapter. Runtime and operator may
  use storage through server or explicit adapter boundaries.
  
  ## Consequences
  
  OAuth, OIDC, JOSE, principals, credentials, and policy stay pure. Alternate
  storage adapters remain possible later.
