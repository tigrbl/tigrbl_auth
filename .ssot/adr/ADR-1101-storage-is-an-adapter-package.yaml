body: |-
  ## Decision
  
  Create `tigrbl-identity-storage` as the persistence adapter package and canonical storage operation owner. SQLAlchemy/Tigrbl tables are the default implementation substrate, but the tracked package boundary is storage.
  
  It owns:
  
  - table mappings
  - table-owned domain operations for durable storage-table behavior
  - ORM integration where retained
  - migrations
  - repository implementations
  - unit-of-work implementations
  - database bootstrap
  - SQLite/Postgres portability
  - migration evidence hooks
  
  ## Context
  
  The current package includes table resources, table-bound operations, persistence lifecycle, engine configuration, SQLite support, and Postgres extras. Runtime and surface code currently reach into table resources and engine details.
  
  Protocol packages should not know whether state is stored in SQLite, Postgres, Redis, memory, or a test fake. Protocol and server packages may validate protocol inputs or adapt HTTP requests, but persisted behavior for a storage table belongs to that storage table's module.
  
  ## Constraints
  
  Storage may import semantic/protocol packages only where needed to map storage-owned behavior, but protocol packages MUST NOT canonically own storage-table mutations or table lifecycle behavior.
  
  Server may depend on storage as the default adapter. Runtime and operator may use storage through server or explicit adapter boundaries.
  
  ## Consequences
  
  OAuth, OIDC, JOSE, principals, credentials, and policy stay pure with respect to durable storage ownership. Alternate storage adapters remain possible later because table-owned operations define the canonical persistence contract.
