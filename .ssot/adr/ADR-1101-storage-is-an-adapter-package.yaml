body: |-
  ## Decision
  
  Create `tigrbl-identity-storage` as the canonical table, migration, repository helper, and table-owned operation package. SQLAlchemy/Tigrbl tables are the default implementation substrate, but the tracked package boundary is storage-owned persistence behavior.
  
  It owns:
  
  - table mappings
  - table-owned domain operations for durable storage-table behavior
  - ORM integration where retained
  - migrations
  - repository helper implementations
  - unit-of-work implementations
  - database bootstrap
  - SQLite/Postgres portability
  - migration evidence hooks
  - compatibility helpers that support repository tooling without defining a separate public storage model
  
  ## Context
  
  The current package includes table resources, table-bound operations, persistence lifecycle, engine configuration, SQLite support, and Postgres extras. Runtime and surface code currently reach into table resources and engine details.
  
  Protocol packages should not know whether durable table state is stored in SQLite, Postgres, Redis, memory, or a test fake. Protocol and server packages may validate protocol inputs or adapt HTTP requests, but persisted behavior for a storage table belongs to that storage table's module.
  
  ## Constraints
  
  Storage may import lower-layer primitives and contracts needed to map storage-owned behavior. Cross-layer imports from storage into capability or protocol packages are compatibility exceptions that must not define canonical storage-table mutation semantics.
  
  Server, runtime, CLI, release, and API packages may use storage through explicit table, repository helper, or adapter boundaries.
  
  ## Consequences
  
  OAuth, OIDC, JOSE, principals, credentials, and policy stay pure with respect to durable storage ownership. Alternate storage adapters remain possible later because table-owned operations define the canonical persistence contract.
