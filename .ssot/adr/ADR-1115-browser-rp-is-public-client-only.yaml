body: |-
  Decision: the browser RP package must be public-client only. It must not support client secrets, private-key client authentication, server token stores, or unsafe persistent token defaults.
  
  Rationale: browser code cannot protect confidential credentials. The safe browser baseline is Authorization Code with PKCE, state, nonce, constrained storage, and explicit callback replay protection.
  
  Consequences: confidential-client behavior moves to the Python server RP package or another server-side adapter.
