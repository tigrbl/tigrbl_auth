body: |-
  ## Decision
  
  Service-admin API is the delegated control plane for service, machine, workload, API-key, service-key, token inspection, and validation-metadata administration.
  
  ## Consequences
  
  Service-admin API MUST NOT expose platform tenant lifecycle, cross-tenant authority assignment, tenant-admin human identity administration, developer app catalog management, or public human login and consent flows. Service-admin API deployments MUST enforce tenant and resource ownership before service identity, credential, token inspection, or validation metadata operations and fail closed for cross-surface operations.
