body: |-
  Decision: white-label hosted login belongs to provider OIDC/server/public UI surfaces, not RP packages.
  
  Rationale: the RP initiates and consumes login; the identity provider hosts authentication UX, tenant branding, and login page rendering.
  
  Consequences: provider-side login branding is governed separately from RP SDK work, even though RP flows redirect users to that hosted login.
