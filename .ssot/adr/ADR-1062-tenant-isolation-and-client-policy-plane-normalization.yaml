body: |-
  ## Decision
  
  Status: proposed
  Date: 2026-05-04
  
  `tigrbl_auth` MUST normalize tenant isolation and client policy semantics
  across admin API, public API, admin UIX, and any in-scope public UIX surfaces.
  The repository MUST distinguish administrative visibility, public-facing
  exposure, mutation authority, and tenant/client scoping rules per surface.
  
  These semantics MUST resolve from a first-class trust-domain authority source
  rather than from incidental route or service behavior alone.
  
  ## Rationale
  
  Tenant and client concerns already exist across multiple surfaces, but they
  are not yet normalized around one governing trust-domain identity source.
  
  ## Scope
  
  This ADR applies to tenant scoping, issuer identity, signing scope, client
  policy visibility, and client-management exposure rules across governed
  surfaces.
