body: |-
  ## Decision
  
  `tigrbl-identity-server` builds the ASGI/Tigrbl application.
  
  It owns:
  
  - app factory
  - gateway factory
  - plugin install
  - Tigrbl route/surface composition
  - public/admin/diagnostic surface mounting
  - OpenAPI/OpenRPC projection
  - protocol publisher binding
  - server settings
  
  `tigrbl-identity-runtime` runs the composed application.
  
  It owns:
  
  - runner profiles
  - Uvicorn/Hypercorn/Tigrcorn adapters
  - lifecycle hooks
  - runtime manifests
  - health and diagnostics wiring
  - serve command plans
  - runtime state
  
  ## Context
  
  The system needs both application composition and process execution. These are
  not the same concern.
  
  Application composition decides which Tigrbl routers, REST/RPC surfaces,
  discovery publishers, protocol endpoints, admin surfaces, and contracts are
  mounted. Runtime execution decides how the composed ASGI/Tigrbl app is
  served, profiled, monitored, and diagnosed.
  
  ## Consequences
  
  Server builds the app. Runtime runs the app. Operator controls and verifies
  the runtime.
  
  This avoids mixing protocol route composition with process runner behavior.
