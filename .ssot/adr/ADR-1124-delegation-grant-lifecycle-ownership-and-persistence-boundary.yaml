body: |-
  Decision: DelegationGrant truth lives in tigrbl-identity-policy semantics and tigrbl-identity-storage persistence. OAuth/OIDC token exchange consumes active grants, validates protocol inputs, and emits token, introspection, and provenance artifacts, but it does not own canonical delegation-grant truth. Consequences: persisted grants, grant scopes, grant proofs, graph edges, token links, and lifecycle audit events are the durable authority inputs; request-time act claims and token-exchange traces are derived artifacts.
