body: |-
  ## Decision
  
  The platform-admin API is the production control-plane front door for cross-tenant platform authority. It owns tenant lifecycle, tenant ownership issuance, platform administrator authority, platform operator boundaries, and audited break-glass operations.
  
  ## Rationale
  
  Surface-separated deployments must not expose broad admin capabilities to every principal. Platform owners and platform administrators require cross-tenant authority that tenant administrators, developers, service administrators, and public users must not receive.
  
  ## Consequences
  
  Platform tenant lifecycle and authority assignment must be specified separately from tenant self-service, developer app registration, service identity administration, and public authentication. Platform-admin APIs and UIX must fail closed for public login, tenant-local self-service-only workflows, developer-only app management, and service-only machine identity workflows unless explicitly delegated by a platform authority contract.
