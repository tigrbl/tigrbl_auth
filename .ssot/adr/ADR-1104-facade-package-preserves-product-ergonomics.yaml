body: |-
  ## Decision
  
  Keep `tigrbl-auth` as the product and compatibility facade.
  
  It may expose:
  
  - `create_app`
  - `create_gateway`
  - `install_plugin`
  - `IdentityServer`
  - default runtime entrypoints
  - selected public contracts
  - install extras for common profiles
  - compatibility imports during migration
  
  ## Context
  
  Existing users know the package as `tigrbl-auth` and `tigrbl_auth`. A split
  package suite improves boundaries, but external consumers still need stable
  ergonomic entrypoints.
  
  A facade also lets the project publish common install profiles without
  exposing internal package layout as the primary user experience.
  
  ## Constraints
  
  The facade MUST NOT become an internal module graveyard.
  
  Compatibility re-exports MUST be explicit, tested, and staged for deprecation
  where appropriate.
  
  New implementation ownership belongs in the `tigrbl-identity-*` packages.
  
  ## Consequences
  
  The project can improve internal architecture without forcing immediate
  consumer churn. The facade remains the public ergonomic layer, not the
  implementation home.
