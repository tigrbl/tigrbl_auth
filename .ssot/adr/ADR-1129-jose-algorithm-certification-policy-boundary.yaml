body: |-
  Decision: Certification policy owns strict JOSE algorithm readiness decisions separately from legacy discovery compatibility. Target: RFC 7518 JSON Web Algorithms at https://www.rfc-editor.org/rfc/rfc7518.html and RFC 8725 JWT Best Current Practices at https://www.rfc-editor.org/rfc/rfc8725.html. Consequences: strict certification policy reports PQC readiness, warns on classical ECDSA algorithms, and refuses RSA-family signing algorithms without removing legacy baseline support from general JWA discovery tests.
