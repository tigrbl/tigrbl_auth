body: |-
  Decision: the Python server RP package owns callback routes, authenticated code exchange, refresh-token handling, secure cookies, and server-side token/session storage.
  
  Rationale: confidential clients need server-only responsibilities that should not be exposed to browser packages.
  
  Consequences: server RP helpers may depend on backend storage and HTTP server integration while the browser package remains secret-free.
