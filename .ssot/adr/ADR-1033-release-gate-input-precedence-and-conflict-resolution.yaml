body: |-
  - Status: accepted
  - Date: 2026-04-20
  - Decision: release gates SHALL consume authoritative generated inputs by report family, and conflicting downstream summaries SHALL fail closed instead of silently choosing whichever value was computed last.

  The precedence model is:
  - document authority and current-truth classification derive from the SSOT authority spec and `truth_chain`;
  - validated runtime, test-lane, and migration-portability posture derives from `validated_execution_report`;
  - certification readiness derives from `certification_state_report`, but only insofar as its component inputs agree with the authoritative underlying reports;
  - release-gate summaries may aggregate those inputs, but they SHALL NOT recompute incompatible pass/fail values for the same fact domain.

  `validated_execution_report` is the authoritative generated source for validated runtime-matrix, supported test-lane, and validated migration-portability status used by downstream release-gate and certification summaries.

  Conflict resolution is fail-closed:
  - if two generated reports disagree for the same authoritative fact, the inconsistency SHALL be reported as a governance failure;
  - downstream summaries MUST either inherit the authoritative upstream value or surface an explicit contradiction error;
  - no final certified release may proceed while gate-authoritative reports disagree.
