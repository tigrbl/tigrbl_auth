body: |-
  ## Decision
  
  `tigrbl_auth` MUST separate pre-token authorization determinism from final
  JWT byte determinism.
  
  Issued tokens MAY remain nondeterministic because of `iat`, `exp`, `jti`,
  signing randomness, or key material changes. However, the pre-token
  authorization decision MUST be representable as a reproducible governed
  artifact derived from normalized inputs and policy state.
  
  ## Rationale
  
  Requiring raw JWT determinism would collapse legitimate issuance semantics.
  The higher-value invariant is that the server can later show what normalized
  request, policy, derivation steps, authorization details, and proof bindings
  led to the issuance decision.
  
  ## Consequences
  
  The repository should add authorization-decision traces and stable decision
  hashes rather than mislabel nondeterministic token minting as deterministic.
