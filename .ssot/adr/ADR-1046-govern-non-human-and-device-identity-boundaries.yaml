title: "Govern non-human and device identity boundaries"
status: "accepted"
origin: "repo-local"
decision_date: null
tags: []
summary: "Non-human, device, and workload identity capabilities must remain below implemented until durable lifecycle, enforcement, operator, and proof surfaces exist."
supersedes: []
