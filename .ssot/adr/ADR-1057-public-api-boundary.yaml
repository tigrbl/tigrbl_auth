body: |-
  ## Decision
  
  Status: proposed
  Date: 2026-05-04
  
  `tigrbl_auth` MUST define the public API as a separate governed boundary. The
  public API boundary includes public OAuth, OIDC, and discovery routes, public
  registration and logout surfaces where in scope, and public contract
  publication derived from the effective deployment boundary.
  
  The public API boundary MUST explicitly exclude admin/control-plane
  operations, privileged diagnostics, and any metadata that would disclose
  privileged plane topology or authority.
  
  ## Rationale
  
  Public contract artifacts already exist, but public publication must be
  governed as a plane with explicit leakage rules and runtime-truth obligations.
  
  ## Scope
  
  In scope: public OAuth/OIDC/discovery behavior, public metadata surfaces, and
  public runtime-truth publication.
  
  Out of scope: admin operations, admin contract methods, operator-only flows,
  and public UI presentation concerns.
