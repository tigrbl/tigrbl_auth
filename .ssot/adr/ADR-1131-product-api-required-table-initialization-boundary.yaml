body: |-
  Decision: Product API packages initialize only the table resources required by their product-surface contract. There is no OAuth-specific RFC for ORM table initialization; adjacent HTTP API behavior remains under RFC 9110 HTTP Semantics at https://www.rfc-editor.org/rfc/rfc9110.html. Consequences: deployment resolution exposes required_table_resources, surface construction asserts selected resources against that manifest, and app startup initializes the product-specific surface router instead of a module-level full-suite compatibility router.
