body: |-
  ## Decision
  
  `tigrbl-identity-principals` owns actor taxonomy and lifecycle:
  
  - `UserPrincipal`
  - `ClientPrincipal`
  - `AppPrincipal`
  - `ServicePrincipal`
  - `DevicePrincipal`
  - `MachinePrincipal`
  - `WorkloadPrincipal`
  - `FederatedSubjectPrincipal`
  - `Group`
  - `Role`
  - `Membership`
  - `PrincipalAlias`
  - `Ownership`
  - `Delegation`
  
  `tigrbl-identity-credentials` owns proof material and credential lifecycle:
  
  - `PasswordCredential`
  - `ApiKeyCredential`
  - `ServiceKeyCredential`
  - `ClientSecretCredential`
  - `JwtAssertionCredential`
  - `MtlsCertificateCredential`
  - `DpopKeyCredential`
  - `WebAuthnCredential`
  - `PasskeyCredential`
  - `RecoveryCodeCredential`
  - `SessionCookieCredential`
  - `RefreshTokenCredential`
  - `DeviceCodeCredential`
  
  Admin, owner, and superuser are modeled as authorities, roles,
  entitlements, or relationships attached to a principal unless a later ADR
  creates separate lifecycle requirements for them.
  
  ## Context
  
  The system contains actors and proof material. Users, clients, apps,
  services, devices, machines, workloads, and federated subjects are actors.
  Passwords, API keys, service keys, client secrets, certificates, JWT
  assertions, passkeys, cookies, and device codes are proof material or flow
  artifacts.
  
  Collapsing these into one model causes service keys, API keys, sessions,
  clients, and users to be incorrectly treated as the same kind of thing.
  
  ## Consequences
  
  Protocol packages can authenticate credentials without owning principal
  taxonomy. Policy can authorize principals using credential facts without
  performing credential verification itself.
