body: |-
  Decision: effective authority must be explainable through a durable derivation graph that records source authority, implied authority, constraints, delegations, trust edges, policy versions, attenuation proofs, and audit/provenance artifacts. The graph is the common substrate for authority closure, reachability, monotonicity, least-authority diffing, and forensic auditability.
