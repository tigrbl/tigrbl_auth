body: |-
  ## Decision
  
  `tigrbl-identity-storage` is the canonical owner for identity persistence symbols: table classes, ORM imports, migrations, engine/session helpers, and persistence lifecycle helpers.
  
  `tigrbl_auth.tables`, `tigrbl_auth.orm`, `tigrbl_auth.db`, and `tigrbl_auth.services.persistence` remain permanent compatibility facades. They re-export canonical storage symbols and MUST preserve object identity for existing importers.
  
  Frontdoor API packages compose product routes and product filters only. They MUST NOT define, fork, or shadow identity table classes.
  
  ## Context
  
  The identity package split introduced a dedicated storage package while legacy callers still import table and persistence symbols through `tigrbl_auth`. The compatibility surface is product ergonomics, not canonical ownership.
  
  ## Consequences
  
  Storage owns migrations and runtime table resources. Compatibility facades remain supported indefinitely. Product frontdoors consume canonical storage resources and continue to fail closed by product-surface configuration.
