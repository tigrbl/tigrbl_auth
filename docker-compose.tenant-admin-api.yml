name: tigrbl_auth_tenant_admin_api_dev

services:
  tenant-admin-api:
    build:
      context: .
      dockerfile: Dockerfile.dev-tenant-admin-api
    image: tigrbl-auth-tenant-admin-api-dev:latest
    container_name: tigrbl-auth-tenant-admin-api-dev
    ports:
      - "8016:8000"
    environment:
      TIGRBL_AUTH_PROFILE: ${TIGRBL_AUTH_PROFILE:-production}
      AUTHN_ISSUER: ${AUTHN_ISSUER:-http://localhost:8016}
      TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER: ${TIGRBL_AUTH_PROTECTED_RESOURCE_IDENTIFIER:-http://localhost:8016/resource}
      TIGRBL_AUTH_REQUIRE_TLS: "false"
      TIGRBL_AUTH_ADMIN_API_KEY: ${TIGRBL_AUTH_ADMIN_API_KEY:-dev-tenant-admin-key}
      TIGRBL_AUTH_ADMIN_API_KEY_DIR: /tmp/tigrbl-auth-tenant-admin
      PG_HOST: ""
      PG_PORT: "5432"
      PG_DB: ""
      PG_USER: ""
      PG_PASS: ""
      REDIS_HOST: ""
      REDIS_PASSWORD: ""
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openrpc.json', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
