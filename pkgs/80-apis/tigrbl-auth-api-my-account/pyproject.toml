[project]
name = "tigrbl-auth-api-my-account"
version = "0.4.0.dev2"
description = "End-user account self-service API assembly for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "pydantic==2.12.5",
    "tigrbl-auth==0.4.0.dev2",
    "tigrbl==0.4.4.dev1",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-identity-storage-runtime==0.4.0.dev2",
    "tigrbl-secret-hashing-bcrypt-provider==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/80-apis/tigrbl-auth-api-my-account"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_api_my_account", from = "src" }]
