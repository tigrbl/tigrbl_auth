[project]
name = "tigrbl-auth-api-admin-gate"
version = "0.4.0.dev2"
description = "ASGI administration gate for Tigrbl Auth APIs."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl==0.4.4.dev1",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_api_admin_gate", from = "src" }]
