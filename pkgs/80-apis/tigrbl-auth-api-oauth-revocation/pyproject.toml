[project]
name = "tigrbl-auth-api-oauth-revocation"
version = "0.4.0.dev2"
description = "RFC 7009 HTTP carrier binding for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl==0.4.4.dev1",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_api_oauth_revocation", from = "src" }]
