[project]
name = "tigrbl-identity-runtime"
version = "0.4.0.dev2"
description = "Runtime assembly, profile loading, feature flags, deployment resolution, runner adapters, and diagnostics for Tigrbl identity apps."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "identity",
    "runtime",
    "asgi",
    "uvicorn",
    "hypercorn",
    "tigrcorn",
    "feature-flags",
    "deployment-profile",
    "iam",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-auth-protocol-webauthn==0.4.0.dev2",
    "tigrbl-auth-api-webauthn==0.4.0.dev2",
    "tigrbl-public-key-registration-capability==0.4.0.dev2",
    "tigrbl-public-key-authentication-capability==0.4.0.dev2",
    "tigrbl-public-key-credential-management-capability==0.4.0.dev2",
]

[project.optional-dependencies]
uvicorn = [
    "uvicorn[standard]==0.41.0",
]
hypercorn = [
    "hypercorn==0.18.0",
]
tigrcorn = [
    "tigrcorn==0.3.8; python_version >= '3.11'",
]
servers = [
    "uvicorn[standard]==0.41.0",
    "hypercorn==0.18.0",
    "tigrcorn==0.3.8; python_version >= '3.11'",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/60-runtime/tigrbl-identity-runtime"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-runtime/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_runtime", from = "src" }]
include = ["src/tigrbl_identity_runtime/profiles/*.yaml"]
