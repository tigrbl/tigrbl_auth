[project]
name = "tigrbl-identity-server"
version = "0.4.0.dev2"
description = "Tigrbl ASGI identity server composition, app factories, gateway factories, routers, and REST surfaces."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "identity",
    "server",
    "asgi",
    "gateway",
    "plugin",
    "rest",
    "oauth",
    "oidc",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-auth-api-session-login==0.4.0.dev2",
    "tigrbl-auth-api-oauth-authorization==0.4.0.dev2",
    "tigrbl-auth-api-oauth-device-authorization==0.4.0.dev2",
    "tigrbl-auth-api-oauth-token-exchange==0.4.0.dev2",
    "tigrbl-auth-api-oidc-userinfo==0.4.0.dev2",
    "tigrbl-auth-api-oidc-logout==0.4.0.dev2",
    "tigrbl-auth-api-oauth-introspection==0.4.0.dev2",
    "tigrbl-auth-api-oauth-revocation==0.4.0.dev2",
    "tigrbl-auth-api-oauth-par==0.4.0.dev2",
    "tigrbl-auth-api-oauth-registration==0.4.0.dev2",
    "tigrbl-auth-api-oauth-token==0.4.0.dev2",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-auth-protocol-gnap==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "email-validator>=2.0",
    "tigrbl==0.4.4.dev1",
    "tigrbl-authz-policy-admin-gate==0.4.0.dev2",
    "tigrbl-core==0.4.4.dev1",
    "tigrbl-identity-storage-runtime==0.4.0.dev2",
    "tigrbl-principal-authentication==0.4.0.dev2",
    "tigrbl-token-introspection-capability==0.4.0.dev2",
    "tigrbl-token-issuance-capability==0.4.0.dev2",
    "tigrbl-token-exchange-capability==0.4.0.dev2",
    "tigrbl-token-revocation-capability==0.4.0.dev2",
    "tigrbl-pushed-authorization-capability==0.4.0.dev2",
    "tigrbl-client-registration-capability==0.4.0.dev2",
    "tigrbl-replay-memory-provider==0.4.0.dev2",
    "tigrbl-secret-hashing-bcrypt-provider==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/60-runtime/tigrbl-identity-server"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-server/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_server", from = "src" }]
