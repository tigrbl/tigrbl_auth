[project]
name = "tigrbl-auth"
version = "0.4.0.dev2"
description = "Compatibility facade for the split Tigrbl identity package suite, preserving legacy app, gateway, plugin, CLI, and RFC imports."
readme = "README.md"
requires-python = ">=3.10,<3.13"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "tigrbl-auth",
    "identity",
    "iam",
    "compatibility",
    "facade",
    "oauth",
    "oidc",
    "asgi",
    "authentication",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-authz-policy-rules-concrete==0.4.0.dev2",
    "tigrbl-authz-policy-combiner-default==0.4.0.dev2",
    "tigrbl-authz-policy-evaluators-default==0.4.0.dev2",
    "tigrbl-authz-policy-attributes-mapping==0.4.0.dev2",
    "tigrbl-authz-policy-obligations-concrete==0.4.0.dev2",
    "tigrbl-security-authorization-provenance-builder==0.1.0",
    "swarmauri_standard==0.10.0",
    "swarmauri_crypto_paramiko==0.4.0.dev5",
    "tigrbl-identity-admin==0.4.0.dev2",
    "tigrbl-identity-author==0.4.0.dev2",
    "tigrbl-identity-cli==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-authn-credentials==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-auth-protocol-oidc==0.4.0.dev2",
    "tigrbl-auth-protocol-webauthn==0.4.0.dev2",
    "tigrbl-identity-principals==0.4.0.dev2",
    "tigrbl-identity-operator==0.4.0.dev2",
    "tigrbl-authority-graph-concrete==0.4.0.dev2",
    "tigrbl-authz-policy-invariant-registry==0.4.0.dev2",
    "tigrbl-authz-policy==0.4.0.dev2",
    "tigrbl-authz-resource-server==0.4.0.dev2",
    "tigrbl-auth-release-certification==0.4.0.dev2",
    "tigrbl-auth-protocol-rp==0.4.0.dev2",
    "tigrbl-auth-plugin==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-identity-server==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-identity-storage-runtime==0.4.0.dev2",
    "tigrbl-security-signing-pqc==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/70-facade/tigrbl-auth"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-auth/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth", from = "src" }]
include = ["src/tigrbl_auth/profiles/*.yaml"]
