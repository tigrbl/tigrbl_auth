[project]
name = "tigrbl-identity-jose"
version = "0.4.0.dev2"
description = "JOSE, JWT, JWS, JWE, JWK, JWKS, key rotation, release signing, and standards helpers for Tigrbl identity tokens."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "identity",
    "jose",
    "jwt",
    "jwk",
    "jwks",
    "jws",
    "jwe",
    "key-rotation",
    "oauth",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "bcrypt==5.0.0",
    "pqcrypto==0.4.0",
    "swarmauri_core==0.10.0",
    "swarmauri_crypto_jwe==0.3.0.dev5",
    "swarmauri_keyprovider_file==0.2.0",
    "swarmauri_keyprovider_local==0.2.0",
    "swarmauri_signing_ed25519==0.2.0.dev32",
    "swarmauri_signing_jws==0.3.0.dev31",
    "swarmauri_tokens_jwt==0.3.0.dev31",
    "tigrbl-identity-operator==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/tigrbl-identity-jose"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-jose/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_jose", from = "src" }]
