[project]
name = "tigrbl-authz-policy"
version = "0.4.0.dev2"
description = "Authorization policy, authority, grants, permissions, decisions, and governance implementation package for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "authz",
    "authorization",
    "policy",
    "rbac",
    "abac",
    "delegated-admin",
    "permissions",
    "decisions",
    "iam",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-identities-concrete==0.4.0.dev2",
    "tigrbl-identity-credentials-concrete==0.4.0.dev2",
    "tigrbl-authz-policy-rules-concrete==0.4.0.dev2",
    "tigrbl-security-authorization-provenance-builder==0.1.0",
    "tigrbl==0.4.4.dev1",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-authz-policy-authority-derivation-graph==0.4.0.dev2",
    "tigrbl-authz-policy-decision-engine==0.4.0.dev2",
    "tigrbl-release-contracts==0.1.0",
]
[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/40-capabilities/tigrbl-authz-policy"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-authz-policy/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authz_policy", from = "src" }]
