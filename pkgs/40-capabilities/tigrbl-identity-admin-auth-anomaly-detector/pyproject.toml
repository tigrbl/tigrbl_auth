[project]
name = "tigrbl-identity-admin-auth-anomaly-detector"
version = "0.4.0.dev2"
description = "Identity administration authentication anomaly detection capability."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_admin_auth_anomaly_detector", from = "src" }]
