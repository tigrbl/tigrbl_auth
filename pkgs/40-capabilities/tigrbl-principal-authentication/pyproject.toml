[project]
name = "tigrbl-principal-authentication"
version = "0.4.0.dev2"
description = "Composable password, client-secret, API-key, and service-key authentication capabilities for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-capability==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-authenticator-password-local==0.1.0",
    "tigrbl-authenticator-client-secret-local==0.1.0",
    "tigrbl-authenticator-api-key-local==0.1.0",
    "tigrbl-authenticator-service-key-local==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_principal_authentication", from = "src" }]
