[project]
name = "tigrbl-policy-evaluation-capability"
version = "0.4.0.dev2"
description = "Composable protocol-neutral policy evaluation and entity-search capability."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-capability==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_policy_evaluation_capability", from = "src" }]
