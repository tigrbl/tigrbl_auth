[project]
name = "tigrbl-operator-administration-capability"
version = "0.4.0.dev2"
description = "Policy-gated operator administration capability."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-capability==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_operator_administration_capability", from = "src" }]
