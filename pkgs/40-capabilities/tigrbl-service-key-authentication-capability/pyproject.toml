[project]
name = "tigrbl-service-key-authentication-capability"
version = "0.4.0.dev2"
description = "Service-key authentication capability."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-api-key-authentication-capability==0.4.0.dev2", "tigrbl-capability==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-authenticator-service-key-local==0.1.0"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_service_key_authentication_capability", from = "src" }]
