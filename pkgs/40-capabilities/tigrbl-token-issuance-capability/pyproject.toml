[project]
name = "tigrbl-token-issuance-capability"
version = "0.4.0.dev2"
description = "Composable protocol-neutral token-pair issuance and refresh rotation capability."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-capability==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_token_issuance_capability", from = "src" }]
