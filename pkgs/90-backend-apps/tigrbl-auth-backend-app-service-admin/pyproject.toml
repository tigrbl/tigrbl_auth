[project]
name = "tigrbl-auth-backend-app-service-admin"
version = "0.4.0.dev2"
description = "Service, API-key, and workload identity administration backend application for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-auth==0.4.0.dev2",
    "tigrbl-auth-router-admin-gate==0.4.0.dev2",
    "tigrbl-auth-router-oauth-introspection==0.4.0.dev2",
    "tigrbl-auth-router-oauth-protected-resource-metadata==0.4.0.dev2",
    "tigrbl-auth-router-oidc-discovery==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/90-backend-apps/tigrbl-auth-backend-app-service-admin"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_backend_app_service_admin", from = "src" }]
