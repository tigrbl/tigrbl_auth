[project]
name = "tigrbl-auth-backend-app-platform-admin"
version = "0.4.0.dev2"
description = "Platform owner and operator control-plane backend application for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "pydantic==2.12.5",
    "tigrbl==0.4.4.dev1",
    "tigrbl-auth==0.4.0.dev2",
    "tigrbl-auth-backend-app-core==0.4.0.dev2",
    "tigrbl-auth-router-admin-gate==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-server==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/90-backend-apps/tigrbl-auth-backend-app-platform-admin"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_backend_app_platform_admin", from = "src" }]
