[project]
name = "tigrbl-auth-backend-app-core"
version = "0.4.0.dev2"
description = "Shared layer-90 ASGI and router composition for Tigrbl Auth backend applications."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl==0.4.4.dev1",
    "tigrbl-auth-protocol-gnap==0.4.0.dev2",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-auth-plugin==0.4.0.dev2",
    "tigrbl-auth-router-admin-gate==0.4.0.dev2",
    "tigrbl-auth-router-oauth-authorization==0.4.0.dev2",
    "tigrbl-auth-router-oauth-authorization-server-metadata==0.4.0.dev2",
    "tigrbl-auth-router-oauth-device-authorization==0.4.0.dev2",
    "tigrbl-auth-router-oauth-introspection==0.4.0.dev2",
    "tigrbl-auth-router-oauth-par==0.4.0.dev2",
    "tigrbl-auth-router-oauth-protected-resource-metadata==0.4.0.dev2",
    "tigrbl-auth-router-oauth-registration==0.4.0.dev2",
    "tigrbl-auth-router-oauth-revocation==0.4.0.dev2",
    "tigrbl-auth-router-oauth-token==0.4.0.dev2",
    "tigrbl-auth-router-oauth-token-exchange==0.4.0.dev2",
    "tigrbl-auth-router-oidc-discovery==0.4.0.dev2",
    "tigrbl-auth-router-oidc-logout==0.4.0.dev2",
    "tigrbl-auth-router-oidc-userinfo==0.4.0.dev2",
    "tigrbl-auth-router-resource-validation-metadata==0.4.0.dev2",
    "tigrbl-auth-router-session-login==0.4.0.dev2",
    "tigrbl-client-secret-authentication-capability==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-operator==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-identity-server==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-identity-storage-runtime==0.4.0.dev2",
    "tigrbl-secret-hashing-bcrypt-provider==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/90-backend-apps/tigrbl-auth-backend-app-core"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_backend_app_core", from = "src" }]