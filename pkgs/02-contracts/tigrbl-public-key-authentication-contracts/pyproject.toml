[project]
name = "tigrbl-public-key-authentication-contracts"
version = "0.4.0.dev2"
description = "Protocol-neutral public-key authentication contracts."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = []

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_public_key_authentication_contracts", from = "src" }]
