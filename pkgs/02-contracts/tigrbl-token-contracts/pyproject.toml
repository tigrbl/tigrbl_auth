[project]
name = "tigrbl-token-contracts"
version = "0.4.0.dev2"
description = "Protocol-neutral token contracts for the Tigrbl identity stack."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-core==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_token_contracts", from = "src" }]
