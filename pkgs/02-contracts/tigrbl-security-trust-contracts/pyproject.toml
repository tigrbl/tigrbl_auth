[project]
name = "tigrbl-security-trust-contracts"
version = "0.1.0"
description = "Draft horizontal contracts and DTOs for security, trust, key, crypto, and cipher-suite components."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "security", "trust", "contracts", "crypto", "signing", "tokens", "certificates", "cipher-suites"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
    "Topic :: Security",
]
dependencies = []

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_trust_contracts", from = "src" }]
