[project]
name = "tigrbl-jose-bases"
version = "0.4.0.dev2"
description = "Base classes for Tigrbl JOSE providers."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-protected-envelope-bases==0.4.0.dev2",
    "tigrbl-token-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_jose_bases", from = "src" }]
