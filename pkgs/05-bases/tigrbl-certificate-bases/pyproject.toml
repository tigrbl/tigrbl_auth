[project]
name = "tigrbl-certificate-bases"
version = "0.4.0.dev2"
description = "Reusable certificate service and path-validation bases."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-protected-artifact-bases==0.4.0.dev2",
    "tigrbl-security-trust-contracts==0.1.0",
]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_certificate_bases", from = "src" }]
