[project]
name = "tigrbl-identity-model-bases"
version = "0.4.0.dev2"
description = "Base classes for concrete Tigrbl identity and credential models."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_model_bases", from = "src" }]
