[project]
name = "tigrbl-security-provenance-bases"
version = "0.1.0"
description = "Base classes for authorization provenance providers."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-security-trust-contracts==0.1.0",
    "tigrbl-security-trust-domain-bases==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_provenance_bases", from = "src" }]
