[project]
name = "tigrbl-attestation-bases"
version = "0.4.0.dev2"
description = "Protocol-neutral remote attestation bases."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-attestation-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_attestation_bases", from = "src" }]
