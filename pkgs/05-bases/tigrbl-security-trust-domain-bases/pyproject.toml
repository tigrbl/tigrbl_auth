[project]
name = "tigrbl-security-trust-domain-bases"
version = "0.1.0"
description = "Draft domain base classes composed from tigrbl security/trust contracts."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "security", "trust", "domain-bases", "crypto", "signing", "tokens", "certificates", "cipher-suites"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
    "Topic :: Security",
]
dependencies = [
    "tigrbl-identity-claims-bases==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-model-bases==0.4.0.dev2",
    "tigrbl-authentication-context-bases==0.4.0.dev2",
    "tigrbl-security-artifact-bases==0.4.0.dev2",
    "tigrbl-security-trust-contracts==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_trust_domain_bases", from = "src" }]
