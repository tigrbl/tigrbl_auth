[project]
name = "tigrbl-did-bases"
version = "0.4.0.dev2"
description = "Reusable DID resolution and dereferencing bases."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-did-contracts==0.4.0.dev2"]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_did_bases", from = "src" }]
