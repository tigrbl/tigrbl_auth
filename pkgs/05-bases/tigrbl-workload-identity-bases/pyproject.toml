[project]
name = "tigrbl-workload-identity-bases"
version = "0.4.0.dev2"
description = "Protocol-neutral workload reference, credential, verification, delegation, and trust-material bases."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-workload-identity-contracts==0.4.0.dev2"]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_workload_identity_bases", from = "src" }]