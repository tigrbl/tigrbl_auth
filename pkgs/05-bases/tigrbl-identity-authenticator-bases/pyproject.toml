[project]
name = "tigrbl-identity-authenticator-bases"
version = "0.1.0"
description = "Compatibility facade for authenticator bases."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-authenticator-bases==0.1.0"]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_identity_authenticator_bases", from = "src" }]
