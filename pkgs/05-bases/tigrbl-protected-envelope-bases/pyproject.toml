[project]
name = "tigrbl-protected-envelope-bases"
version = "0.4.0.dev2"
description = "Protocol-neutral protected-envelope issuance and verification bases."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-protected-envelope-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_protected_envelope_bases", from = "src" }]