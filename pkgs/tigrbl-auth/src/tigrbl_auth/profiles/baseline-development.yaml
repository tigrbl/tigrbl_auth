schema_version: "0.1.0"
id: "baseline-development"
title: "baseline-development"
ssot_profile_id: "prf:baseline-development"
feature_id: "feat:profile-baseline-development"
extends:
  - "baseline"
description: "Development deployment profile extending baseline with docs, OpenAPI and diagnostic inspection surfaces for local development."
surface_plugin_mode: "mixed"
surfaces:
  public: true
  admin: true
  diagnostics: true
  operator: true
surface_sets:
  - "public-rest"
  - "admin-rest"
  - "diagnostics"
flags:
  groups:
    - "baseline"
  enabled:
    - "enable_rfc6749"
    - "enable_rfc6750"
    - "enable_rfc7636"
    - "enable_rfc8414"
    - "enable_rfc8615"
    - "enable_rfc7515"
    - "enable_rfc7516"
    - "enable_rfc7517"
    - "enable_rfc7518"
    - "enable_rfc7519"
    - "enable_oidc_core"
    - "enable_oidc_discovery"
    - "enable_oidc_session_management"
protocol_slices: []
extensions: []
security:
  require_tls: true
  strict_boundary_enforcement: true
  admin_gate_required_when_control_plane_enabled: true
  development_contract_surfaces_enabled: true
  allow_bearer_query: false
  allow_bearer_form: false
contracts:
  openapi:
    profile: "baseline-development"
    public_surface: true
    admin_surface: true
