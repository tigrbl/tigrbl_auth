schema_version: "0.1.0"
id: "baseline"
title: "baseline"
ssot_profile_id: "prf:baseline"
feature_id: "feat:profile-baseline"
description: "Minimum public OAuth/OIDC/JOSE deployment profile with secure public-only default surfaces."
surface_plugin_mode: "public-only"
surfaces:
  public: true
  admin: false
  rpc: false
  diagnostics: false
  operator: true
surface_sets:
  - "public-rest"
flags:
  groups:
    - "baseline"
  enabled:
    - "enable_rfc6749"
    - "enable_rfc6750"
    - "enable_rfc7636"
    - "enable_rfc8414"
    - "enable_rfc8615"
    - "enable_rfc7515"
    - "enable_rfc7516"
    - "enable_rfc7517"
    - "enable_rfc7518"
    - "enable_rfc7519"
    - "enable_oidc_core"
    - "enable_oidc_discovery"
    - "enable_oidc_session_management"
protocol_slices: []
extensions: []
security:
  require_tls: true
  strict_boundary_enforcement: true
  admin_gate_required_when_control_plane_enabled: true
  allow_bearer_query: false
  allow_bearer_form: false
contracts:
  openapi:
    profile: "baseline"
    public_surface: true
    admin_surface: false
  openrpc:
    profile: "baseline"
    admin_surface: false
