schema_version: "0.1.0"
id: "fapi2-security"
title: "fapi2-security"
ssot_profile_id: "prf:fapi2-security"
feature_id: "feat:profile-fapi2-security"
extends:
  - "hardening"
description: "FAPI 2.0 security deployment profile extending hardening with FAPI-specific issuer, sender-constrained token, PAR/JAR/RAR, TLS, and encrypted ID token requirements."
surface_plugin_mode: "public-only"
surfaces:
  public: true
  admin: false
  diagnostics: false
  operator: true
surface_sets:
  - "public-rest"
flags:
  groups:
    - "baseline"
    - "production"
    - "hardening"
  enabled:
    - "enable_rfc6749"
    - "enable_rfc6750"
    - "enable_rfc7636"
    - "enable_rfc8414"
    - "enable_rfc8615"
    - "enable_rfc7515"
    - "enable_rfc7516"
    - "enable_rfc7517"
    - "enable_rfc7518"
    - "enable_rfc7519"
    - "enable_oidc_core"
    - "enable_oidc_discovery"
    - "enable_oidc_session_management"
    - "enable_rfc7009"
    - "enable_rfc7521"
    - "enable_rfc7523"
    - "enable_rfc7662"
    - "enable_rfc7591"
    - "enable_rfc7592"
    - "enable_rfc8252"
    - "enable_rfc9068"
    - "enable_rfc9207"
    - "enable_rfc9728"
    - "enable_oidc_userinfo"
    - "enable_oidc_rp_initiated_logout"
    - "enable_rfc8628"
    - "enable_rfc8693"
    - "enable_rfc8705"
    - "enable_rfc8707"
    - "enable_rfc9101"
    - "enable_rfc9126"
    - "enable_rfc9396"
    - "enable_rfc9449"
    - "enable_rfc9700"
    - "enable_oidc_frontchannel_logout"
    - "enable_oidc_backchannel_logout"
  overrides:
    enable_rfc8705: true
    enable_id_token_encryption: true
    require_tls: true
    strict_boundary_enforcement: true
protocol_slices:
  - "device"
  - "token-exchange"
  - "par"
  - "jar"
  - "rar"
  - "dpop"
  - "mtls"
extensions: []
security:
  require_tls: true
  strict_boundary_enforcement: true
  admin_gate_required_when_control_plane_enabled: true
  pkce_required: true
  par_required: true
  jar_required: true
  rar_supported: true
  sender_constraint_required: true
  mtls_enabled: true
  id_token_encryption_enabled: true
  allow_bearer_query: false
  allow_bearer_form: false
contracts:
  openapi:
    profile: "fapi2-security"
    public_surface: true
    admin_surface: false
