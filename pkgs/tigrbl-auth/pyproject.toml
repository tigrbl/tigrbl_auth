[project]
name = "tigrbl-auth"
version = "0.4.0.dev2"
description = "Compatibility facade for the split Tigrbl identity package suite, preserving legacy app, gateway, plugin, CLI, and RFC imports."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "tigrbl-auth",
    "identity",
    "iam",
    "compatibility",
    "facade",
    "oauth",
    "oidc",
    "asgi",
    "authentication",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-cli==0.4.0.dev2",
    "tigrbl-identity-credentials==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-oauth==0.4.0.dev2",
    "tigrbl-identity-operator==0.4.0.dev2",
    "tigrbl-identity-policy==0.4.0.dev2",
    "tigrbl-identity-server==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/tigrbl-auth"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-auth/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth", from = "src" }]
