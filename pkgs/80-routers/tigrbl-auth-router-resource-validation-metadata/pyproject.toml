[project]
name = "tigrbl-auth-router-resource-validation-metadata"
version = "0.4.0.dev2"
description = "HTTP carrier for resource-validation capability and verifier metadata."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl==0.4.4.dev1",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_router_resource_validation_metadata", from = "src" }]
