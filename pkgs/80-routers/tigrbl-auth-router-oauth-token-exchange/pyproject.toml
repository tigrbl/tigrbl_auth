[project]
name = "tigrbl-auth-router-oauth-token-exchange"
version = "0.4.0.dev2"
description = "HTTP carrier binding for RFC 8693 token exchange."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl==0.4.4.dev1"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_router_oauth_token_exchange", from = "src" }]
