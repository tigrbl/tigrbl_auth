[project]
name = "tigrbl-authz-policy-decision-engine"
version = "0.4.0.dev2"
description = "Concrete authorization policy decision engine provider."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-policy-decision-engine-default==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authz_policy_decision_engine", from = "src" }]
