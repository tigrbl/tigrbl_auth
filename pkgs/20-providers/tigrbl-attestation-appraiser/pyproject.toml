[project]
name = "tigrbl-attestation-appraiser"
version = "0.4.0.dev2"
description = "Reference-backed attestation appraisal provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-attestation-bases==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_attestation_appraiser", from = "src" }]
