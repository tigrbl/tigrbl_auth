[project]
name = "tigrbl-corim-reference-memory-provider"
version = "0.4.0.dev2"
description = "Non-durable in-memory CoRIM reference-material provider."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-corim-concrete==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_corim_reference_memory_provider", from = "src" }]
