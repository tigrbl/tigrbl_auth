[project]
name = "tigrbl-security-cose"
version = "0.4.0.dev2"
description = "Compatibility facade for the split COSE concrete and cryptography packages."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-cose-concrete==0.4.0.dev2",
    "tigrbl-cose-cryptography-provider==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_cose", from = "src" }]
