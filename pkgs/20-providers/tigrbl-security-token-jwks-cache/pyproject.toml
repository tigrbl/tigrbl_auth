[project]
name = "tigrbl-security-token-jwks-cache"
version = "0.1.0"
description = "JWKS-backed verification key cache provider for Tigrbl security token validation."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-security-trust-contracts==0.1.0",
    "tigrbl-token-introspection-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_token_jwks_cache", from = "src" }]
