[project]
name = "tigrbl-security-auth-context-amr-basic"
version = "0.1.0"
description = "Basic AMR evaluator provider for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-amr-evaluator-basic-concrete==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_auth_context_amr_basic", from = "src" }]
