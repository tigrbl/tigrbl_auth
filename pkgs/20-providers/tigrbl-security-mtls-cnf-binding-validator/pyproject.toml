[project]
name = "tigrbl-security-mtls-cnf-binding-validator"
version = "0.1.0"
description = "mTLS cnf confirmation binding validator provider."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-security-certificate-mtls==0.1.0",
    "tigrbl-security-trust-contracts==0.1.0",
    "tigrbl-security-trust-domain-bases==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_mtls_cnf_binding_validator", from = "src" }]
