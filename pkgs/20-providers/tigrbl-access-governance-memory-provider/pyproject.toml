[project]
name = "tigrbl-access-governance-memory-provider"
version = "0.4.0.dev2"
description = "In-memory access governance, provisioning, review, and service-identity providers."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-identity-core==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_access_governance_memory_provider", from = "src" }]
