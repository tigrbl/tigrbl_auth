[project]
name = "tigrbl-security-event-replay-store"
version = "0.4.0.dev2"
description = "Atomic Security Event Token replay store."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-security-event-bases==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_event_replay_store", from = "src" }]
