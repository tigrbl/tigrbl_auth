[project]
name = "tigrbl-secret-hashing-bcrypt-provider"
version = "0.1.0"
description = "Bcrypt shared-secret hashing and verification provider for Tigrbl Auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "bcrypt==5.0.0",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_secret_hashing_bcrypt_provider", from = "src" }]
