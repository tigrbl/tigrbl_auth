[project]
name = "tigrbl-security-sender-constraint-validator"
version = "0.1.0"
description = "Sender-constraint validator provider that composes DPoP and mTLS confirmation validators."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-protected-resource-authorization-capability==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_sender_constraint_validator", from = "src" }]
