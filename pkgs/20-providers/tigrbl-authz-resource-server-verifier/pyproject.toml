[project]
name = "tigrbl-authz-resource-server-verifier"
version = "0.4.0.dev2"
description = "Protected-resource verifier provider for Tigrbl authorization resource servers."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-security-dpop-cnf-binding-validator==0.1.0",
    "tigrbl-security-mtls-cnf-binding-validator==0.1.0",
    "tigrbl-security-token-introspection-client==0.1.0",
    "tigrbl-security-token-jwks-cache==0.1.0",
    "tigrbl-security-trust-contracts==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authz_resource_server_verifier", from = "src" }]
