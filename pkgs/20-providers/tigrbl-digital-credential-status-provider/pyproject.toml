[project]
name = "tigrbl-digital-credential-status-provider"
version = "0.4.0.dev2"
description = "Digital credential status resolution provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-digital-credential-bases==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_digital_credential_status_provider", from = "src" }]
