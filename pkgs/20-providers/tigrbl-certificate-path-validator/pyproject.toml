[project]
name = "tigrbl-certificate-path-validator"
version = "0.4.0.dev2"
description = "Explicitly profiled certificate path validation provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-security-trust-contracts==0.1.0", "tigrbl-security-trust-domain-bases==0.1.0"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_certificate_path_validator", from = "src" }]
