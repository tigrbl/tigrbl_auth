[project]
name = "tigrbl-authenticator-client-secret-local"
version = "0.1.0"
description = "Local client shared-secret authenticator provider for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-authenticator-bases==0.1.0",
    "tigrbl-secret-hashing-bcrypt-provider==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authenticator_client_secret_local", from = "src" }]
