[project]
name = "tigrbl-spiffe-bundle-provider"
version = "0.4.0.dev2"
description = "Versioned SPIFFE trust-bundle provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-security-trust-domain-bases==0.1.0"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_spiffe_bundle_provider", from = "src" }]
