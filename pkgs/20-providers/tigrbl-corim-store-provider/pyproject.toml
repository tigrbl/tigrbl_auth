[project]
name = "tigrbl-corim-store-provider"
version = "0.4.0.dev2"
description = "Validated immutable CoRIM reference material store."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-corim-concrete==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_corim_store_provider", from = "src" }]
