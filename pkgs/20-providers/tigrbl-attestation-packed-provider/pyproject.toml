[project]
name = "tigrbl-attestation-packed-provider"
version = "0.4.0.dev2"
description = "WebAuthn packed attestation verifier."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["cbor2==6.1.3", "cryptography>=45", "tigrbl-cose-concrete==0.4.0.dev2", "tigrbl-cose-cryptography-provider==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-public-key-authentication-bases==0.4.0.dev2"]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_attestation_packed_provider", from = "src" }]
