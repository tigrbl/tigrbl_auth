[project]
name = "tigrbl-key-attestation-verifier"
version = "0.4.0.dev2"
description = "Key-attestation verification and binding provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_key_attestation_verifier", from = "src" }]
