[project]
name = "tigrbl-cose-cryptography-provider"
version = "0.4.0.dev2"
description = "Cryptography-backed COSE key and signature provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "cryptography>=45.0.0",
    "tigrbl-cose-bases==0.4.0.dev2",
    "tigrbl-cose-concrete==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_cose_cryptography_provider", from = "src" }]
