[project]
name = "tigrbl-eat-verifier-provider"
version = "0.4.0.dev2"
description = "Profile-aware EAT evidence verifier provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-attestation-bases==0.4.0.dev2",
    "tigrbl-eat-concrete==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_eat_verifier_provider", from = "src" }]
