[project]
name = "tigrbl-spiffe-workload-api-provider"
version = "0.4.0.dev2"
description = "SPIFFE Workload API provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-security-trust-domain-bases==0.1.0", "tigrbl-svid-concrete==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_spiffe_workload_api_provider", from = "src" }]
