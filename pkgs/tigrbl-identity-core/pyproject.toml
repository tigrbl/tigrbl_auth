[project]
name = "tigrbl-identity-core"
version = "0.4.0.dev2"
description = "Core identity primitives for the Tigrbl identity package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_core", from = "src" }]
