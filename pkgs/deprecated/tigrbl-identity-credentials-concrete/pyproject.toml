[project]
name = "tigrbl-identity-credentials-concrete"
version = "0.4.0.dev2"
description = "Concrete credential dataclass variants."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = ["tigrbl", "identity", "auth", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-authentication-credential-bases==0.4.0.dev2",
    "tigrbl-password-credential-concrete==0.4.0.dev2",
    "tigrbl-password-reset-credential-concrete==0.4.0.dev2",
    "tigrbl-api-key-credential-concrete==0.4.0.dev2",
    "tigrbl-service-key-credential-concrete==0.4.0.dev2",
    "tigrbl-client-secret-credential-concrete==0.4.0.dev2",
    "tigrbl-mfa-credential-concrete==0.4.0.dev2",
    "tigrbl-passkey-credential-concrete==0.4.0.dev2",
    "tigrbl-service-credential-concrete==0.4.0.dev2",
    "tigrbl-webauthn-credential-concrete==0.4.0.dev2",
    "tigrbl-passwordless-credential-concrete==0.4.0.dev2",
    "tigrbl-mfa-factor-concrete==0.4.0.dev2",
    "tigrbl-mtls-certificate-credential-concrete==0.4.0.dev2",
    "tigrbl-dpop-key-credential-concrete==0.4.0.dev2",
    "tigrbl-sd-jwt-vc-credential-concrete==0.4.0.dev2",
    "tigrbl-mdoc-credential-concrete==0.4.0.dev2",
    "tigrbl-credential-profile-sd-jwt-vc==0.4.0.dev2",
    "tigrbl-credential-protocol-iso-mdoc==0.4.0.dev2",
    "tigrbl-credential-protocol-w3c-vcdm==0.4.0.dev2",
    "tigrbl-eat-concrete==0.4.0.dev2",
    "tigrbl-corim-concrete==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/deprecated/tigrbl-identity-credentials-concrete"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-credentials-concrete/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_credentials_concrete", from = "src" }]
