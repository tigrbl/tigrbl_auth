[project]
name = "tigrbl-oauth-scope-matcher"
version = "0.4.0.dev2"
description = "Deprecated facade for the neutral scope-set matcher."
requires-python = ">=3.10,<3.15"
dependencies = ["tigrbl-authorization-scope-set-matcher-concrete==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oauth_scope_matcher", from = "src" }]
