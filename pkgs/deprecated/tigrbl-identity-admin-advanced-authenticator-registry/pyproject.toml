[project]
name = "tigrbl-identity-admin-advanced-authenticator-registry"
version = "0.4.0.dev2"
description = "Deprecated compatibility package for the advanced authenticator registry."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-admin==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_admin_advanced_authenticator_registry", from = "src" }]
