[project]
name = "tigrbl-digital-credential-issuer-local"
version = "0.4.0.dev2"
description = "Local digital credential issuance orchestration provider."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-digital-credential-issuance-capability==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_digital_credential_issuer_local", from = "src" }]
