[project]
name = "tigrbl-identity-admin-control-plane"
version = "0.4.0.dev2"
description = "Identity administration control-plane capability."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-administrative-resource-capability==0.4.0.dev2",
    "tigrbl-identity-administration-capability==0.4.0.dev2",
    "tigrbl-operator-administration-capability==0.4.0.dev2",
    "tigrbl-realm-administration-capability==0.4.0.dev2",
    "tigrbl-tenant-administration-capability==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_admin_control_plane", from = "src" }]
