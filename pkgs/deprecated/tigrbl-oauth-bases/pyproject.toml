[project]
name = "tigrbl-oauth-bases"
version = "0.4.0.dev2"
description = "Deprecated facade for protocol-neutral token and authorization bases."
requires-python = ">=3.10,<3.15"
dependencies = [
    "tigrbl-authz-policy-bases==0.4.0.dev2",
    "tigrbl-token-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oauth_bases", from = "src" }]
