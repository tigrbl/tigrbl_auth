[project]
name = "tigrbl-oidc-bases"
version = "0.4.0.dev2"
description = "Deprecated facade for neutral identity and assurance bases."
requires-python = ">=3.10,<3.15"
dependencies = [
    "tigrbl-authentication-assurance-bases==0.4.0.dev2",
    "tigrbl-identity-claims-bases==0.4.0.dev2",
    "tigrbl-identity-model-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oidc_bases", from = "src" }]
