[project]
name = "tigrbl-auth-protocol-oidc-backchannel-replay-store"
version = "0.4.0.dev2"
description = "Concrete OIDC back-channel logout replay store."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oidc_backchannel_replay_store", from = "src" }]
