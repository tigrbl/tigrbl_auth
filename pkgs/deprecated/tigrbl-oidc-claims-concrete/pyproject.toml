[project]
name = "tigrbl-oidc-claims-concrete"
version = "0.4.0.dev2"
description = "Deprecated facade for neutral assurance behavior and OIDC EAP values."
requires-python = ">=3.10,<3.15"
dependencies = [
    "tigrbl-auth-protocol-oidc==0.4.0.dev2",
    "tigrbl-identity-assurance-concrete==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oidc_claims_concrete", from = "src" }]
