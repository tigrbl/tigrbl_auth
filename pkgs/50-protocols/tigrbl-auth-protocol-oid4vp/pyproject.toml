[project]
name = "tigrbl-auth-protocol-oid4vp"
version = "0.4.0.dev2"
description = "OpenID for Verifiable Presentations protocol package."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-claim-client-id-concrete==0.4.0.dev2",
    "tigrbl-claim-nonce-concrete==0.4.0.dev2",
    "tigrbl-claim-transaction-id-concrete==0.4.0.dev2",
    "tigrbl-digital-credential-presentation==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oid4vp", from = "src" }]
