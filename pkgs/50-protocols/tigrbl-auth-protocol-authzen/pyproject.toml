[project]
name = "tigrbl-auth-protocol-authzen"
version = "0.4.0.dev2"
description = "OpenID AuthZEN Authorization API protocol package."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-policy-evaluation-capability==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_authzen", from = "src" }]
