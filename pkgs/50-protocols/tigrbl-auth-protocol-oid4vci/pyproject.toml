[project]
name = "tigrbl-auth-protocol-oid4vci"
version = "0.4.0.dev2"
description = "OpenID for Verifiable Credential Issuance protocol package."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-claim-audience-concrete==0.4.0.dev2",
    "tigrbl-claim-issued-at-concrete==0.4.0.dev2",
    "tigrbl-claim-nonce-concrete==0.4.0.dev2",
    "tigrbl-digital-credential-issuance-capability==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oid4vci", from = "src" }]
