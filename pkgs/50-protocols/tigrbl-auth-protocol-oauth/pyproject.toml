[project]
name = "tigrbl-auth-protocol-oauth"
version = "0.4.0.dev2"
description = "OAuth 2.x and OAuth 2.1 profile protocol implementation package for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "auth",
    "protocol",
    "oauth",
    "oauth2",
    "oauth2.1",
    "par",
    "rar",
    "token-exchange",
    "dynamic-client-registration",
    "iam",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic[email]==2.12.5",
    "tigrbl-auth-protocol-gnap==0.4.0.dev2",
    "swarmauri_signing_dpop==0.1.1",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-token-introspection-capability==0.4.0.dev2",
    "tigrbl-token-issuance-capability==0.4.0.dev2",
    "tigrbl-token-revocation-capability==0.4.0.dev2",
    "tigrbl-pushed-authorization-capability==0.4.0.dev2",
    "tigrbl-client-registration-capability==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-security-trust-contracts==0.1.0",
    "tigrbl-security-proof-pkce==0.1.0",
    "tigrbl-authorization-scope-set-matcher-concrete==0.4.0.dev2",
    "tigrbl-claim-client-id-concrete==0.4.0.dev2",
    "tigrbl-claim-confirmation-concrete==0.4.0.dev2",
    "tigrbl-claim-scope-concrete==0.4.0.dev2",
    "tigrbl-claim-http-method-concrete==0.4.0.dev2",
    "tigrbl-claim-http-uri-concrete==0.4.0.dev2",
    "tigrbl-claim-access-token-digest-concrete==0.4.0.dev2",
    "tigrbl-claim-actor-concrete==0.4.0.dev2",
    "tigrbl-claim-may-act-concrete==0.4.0.dev2",
    "tigrbl-claim-jwt-id-concrete==0.4.0.dev2",
    "tigrbl-claim-issued-at-concrete==0.4.0.dev2",
    "tigrbl-claim-nonce-concrete==0.4.0.dev2",
]
[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/50-protocols/tigrbl-auth-protocol-oauth"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-auth-protocol-oauth/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oauth", from = "src" }]
