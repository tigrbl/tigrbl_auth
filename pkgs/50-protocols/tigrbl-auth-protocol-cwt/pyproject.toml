[project]
name="tigrbl-auth-protocol-cwt"
version="0.4.0.dev2"
description="Versioned RFC 8392 CWT claim-set composition."
readme="README.md"
requires-python=">=3.10,<3.15"
dependencies=[
  "tigrbl-identity-contracts==0.4.0.dev2",
  "tigrbl-claim-cwt-issuer-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-subject-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-audience-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-expiration-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-not-before-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-issued-at-concrete==0.4.0.dev2",
  "tigrbl-claim-cwt-id-concrete==0.4.0.dev2",
]
[build-system]
requires=["poetry-core>=1.0.0"]
build-backend="poetry.core.masonry.api"
[tool.poetry]
packages=[{include="tigrbl_auth_protocol_cwt",from="src"}]
