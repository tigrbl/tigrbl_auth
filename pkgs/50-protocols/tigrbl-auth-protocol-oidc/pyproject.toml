[project]
name = "tigrbl-auth-protocol-oidc"
version = "0.4.0.dev2"
description = "OpenID Connect provider protocol implementation package for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "auth",
    "protocol",
    "oidc",
    "openid-connect",
    "id-token",
    "userinfo",
    "discovery",
    "logout",
    "iam",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic==2.12.5",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-authn-credentials==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-assurance-concrete==0.4.0.dev2",
    "tigrbl-security-claims-provider-local==0.1.0",
    "tigrbl-public-subject-identifier-concrete==0.4.0.dev2",
    "tigrbl-pairwise-subject-identifier-concrete==0.4.0.dev2",
    "tigrbl-claim-authentication-time-concrete==0.4.0.dev2",
    "tigrbl-claim-nonce-concrete==0.4.0.dev2",
    "tigrbl-claim-authentication-context-concrete==0.4.0.dev2",
    "tigrbl-claim-authentication-methods-concrete==0.4.0.dev2",
    "tigrbl-claim-authorized-party-concrete==0.4.0.dev2",
    "tigrbl-claim-verified-claims-concrete==0.4.0.dev2",
    "tigrbl-claim-place-of-birth-concrete==0.4.0.dev2",
    "tigrbl-claim-nationalities-concrete==0.4.0.dev2",
    "tigrbl-claim-birth-family-name-concrete==0.4.0.dev2",
    "tigrbl-claim-birth-given-name-concrete==0.4.0.dev2",
    "tigrbl-claim-birth-middle-name-concrete==0.4.0.dev2",
    "tigrbl-claim-salutation-concrete==0.4.0.dev2",
    "tigrbl-claim-title-concrete==0.4.0.dev2",
    "tigrbl-claim-msisdn-concrete==0.4.0.dev2",
    "tigrbl-claim-also-known-as-concrete==0.4.0.dev2",
    "tigrbl-claim-address-country-code-concrete==0.4.0.dev2",
    "tigrbl-claim-transaction-id-concrete==0.4.0.dev2",
    "tigrbl-claim-name-concrete==0.4.0.dev2",
    "tigrbl-claim-given-name-concrete==0.4.0.dev2",
    "tigrbl-claim-family-name-concrete==0.4.0.dev2",
    "tigrbl-claim-middle-name-concrete==0.4.0.dev2",
    "tigrbl-claim-nickname-concrete==0.4.0.dev2",
    "tigrbl-claim-preferred-username-concrete==0.4.0.dev2",
    "tigrbl-claim-profile-uri-concrete==0.4.0.dev2",
    "tigrbl-claim-picture-uri-concrete==0.4.0.dev2",
    "tigrbl-claim-website-uri-concrete==0.4.0.dev2",
    "tigrbl-claim-email-concrete==0.4.0.dev2",
    "tigrbl-claim-email-verified-concrete==0.4.0.dev2",
    "tigrbl-claim-gender-concrete==0.4.0.dev2",
    "tigrbl-claim-birthdate-concrete==0.4.0.dev2",
    "tigrbl-claim-zoneinfo-concrete==0.4.0.dev2",
    "tigrbl-claim-locale-concrete==0.4.0.dev2",
    "tigrbl-claim-phone-number-concrete==0.4.0.dev2",
    "tigrbl-claim-phone-number-verified-concrete==0.4.0.dev2",
    "tigrbl-claim-address-concrete==0.4.0.dev2",
    "tigrbl-claim-updated-at-concrete==0.4.0.dev2",
    "tigrbl-claim-access-token-hash-concrete==0.4.0.dev2",
    "tigrbl-claim-authorization-code-hash-concrete==0.4.0.dev2",
    "tigrbl-claim-state-hash-concrete==0.4.0.dev2",
    "tigrbl-claim-session-id-concrete==0.4.0.dev2",
]
[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/50-protocols/tigrbl-auth-protocol-oidc"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-auth-protocol-oidc/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oidc", from = "src" }]
