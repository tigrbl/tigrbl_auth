[project]
name = "tigrbl-auth-protocol-oidc"
version = "0.4.0.dev2"
description = "OpenID Connect provider protocol implementation package for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "auth",
    "protocol",
    "oidc",
    "openid-connect",
    "id-token",
    "userinfo",
    "discovery",
    "logout",
    "iam",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-authn-credentials==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-eap-acr-concrete==0.4.0.dev2",
    "tigrbl-identity-assurance-concrete==0.4.0.dev2",
    "tigrbl-local-claims-provider-concrete==0.4.0.dev2",
    "tigrbl-public-subject-identifier-concrete==0.4.0.dev2",
    "tigrbl-pairwise-subject-identifier-concrete==0.4.0.dev2",
    "tigrbl-authentication-time-claim-concrete==0.4.0.dev2",
    "tigrbl-nonce-claim-concrete==0.4.0.dev2",
    "tigrbl-authentication-context-claim-concrete==0.4.0.dev2",
    "tigrbl-authentication-methods-claim-concrete==0.4.0.dev2",
    "tigrbl-authorized-party-claim-concrete==0.4.0.dev2",
    "tigrbl-verified-claims-claim-concrete==0.4.0.dev2",
    "tigrbl-place-of-birth-claim-concrete==0.4.0.dev2",
    "tigrbl-nationalities-claim-concrete==0.4.0.dev2",
    "tigrbl-birth-family-name-claim-concrete==0.4.0.dev2",
    "tigrbl-birth-given-name-claim-concrete==0.4.0.dev2",
    "tigrbl-birth-middle-name-claim-concrete==0.4.0.dev2",
    "tigrbl-salutation-claim-concrete==0.4.0.dev2",
    "tigrbl-title-claim-concrete==0.4.0.dev2",
    "tigrbl-msisdn-claim-concrete==0.4.0.dev2",
    "tigrbl-also-known-as-claim-concrete==0.4.0.dev2",
    "tigrbl-address-country-code-claim-concrete==0.4.0.dev2",
    "tigrbl-transaction-id-claim-concrete==0.4.0.dev2",
]
[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/50-protocols/tigrbl-auth-protocol-oidc"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-auth-protocol-oidc/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_oidc", from = "src" }]
