[project]
name = "tigrbl-auth-protocol-webauthn"
version = "0.4.0.dev2"
description = "Versioned W3C Web Authentication relying-party protocol implementation."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "cbor2==6.1.3",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-security-cose==0.4.0.dev2",
    "tigrbl-public-key-registration-capability==0.4.0.dev2",
    "tigrbl-public-key-authentication-capability==0.4.0.dev2",
]
[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
packages = [{ include = "tigrbl_auth_protocol_webauthn", from = "src" }]
