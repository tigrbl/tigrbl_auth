[project]
name = "tigrbl-auth-profile-fido2-server"
version = "0.4.0.dev2"
description = "Versioned FIDO2 server requirement and capability profile."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-auth-protocol-webauthn==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_auth_profile_fido2_server", from = "src" }]
