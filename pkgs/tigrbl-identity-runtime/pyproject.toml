[project]
name = "tigrbl-identity-runtime"
version = "0.4.0.dev1"
description = "Runtime assembly and runner profiles for the Tigrbl identity package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_runtime", from = "src" }]
