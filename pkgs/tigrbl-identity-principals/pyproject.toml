[project]
name = "tigrbl-identity-principals"
version = "0.3.5"
description = "Principal and tenant identity models for the Tigrbl identity package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_principals", from = "src" }]
