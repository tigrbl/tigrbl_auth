[project]
name = "acme-notes-cli"
version = "0.1.0"
description = "Example consumer package showing CLI login against tigrbl_auth device authorization."
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.28,<0.29",
]

[project.scripts]
acme-notes = "acme_notes_cli.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
