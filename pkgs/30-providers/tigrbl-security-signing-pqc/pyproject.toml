[project]
name = "tigrbl-security-signing-pqc"
version = "0.1.0"
description = "Concrete PQC signing provider for Tigrbl security trust domains."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "security", "pqc", "signing", "provider", "trust-domain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
    "Topic :: Security",
]
dependencies = [
    "pqcrypto==0.4.0",
    "tigrbl-security-trust-domain-bases==0.1.0",
    "tigrbl-user-plane-contracts==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_signing_pqc", from = "src" }]
