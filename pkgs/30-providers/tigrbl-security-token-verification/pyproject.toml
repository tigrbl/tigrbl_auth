[project]
name = "tigrbl-security-token-verification"
version = "0.4.0.dev2"
description = "Provider implementations for token verification, JWKS caches, introspection, and sender constraints."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "security",
    "token",
    "jwks",
    "introspection",
    "dpop",
    "mtls",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-security-certificate-mtls==0.1.0",
    "tigrbl-security-proof-dpop==0.1.0",
    "tigrbl-security-trust-contracts==0.1.0",
    "tigrbl-security-trust-domain-bases==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/30-providers/tigrbl-security-token-verification"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-security-token-verification/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_security_token_verification", from = "src" }]
