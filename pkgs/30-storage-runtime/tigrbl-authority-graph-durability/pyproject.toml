[project]
name = "tigrbl-authority-graph-durability"
version = "0.4.0.dev2"
description = "Durable authority-graph table operations and specifications."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-table-durability==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authority_graph_durability", from = "src" }]
