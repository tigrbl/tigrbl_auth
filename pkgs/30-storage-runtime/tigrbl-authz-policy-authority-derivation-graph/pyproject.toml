[project]
name = "tigrbl-authz-policy-authority-derivation-graph"
version = "0.4.0.dev2"
description = "Durable authority graph table operations and runtime specifications."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-authority-graph-concrete==0.4.0.dev2",
    "tigrbl-authority-graph-durability==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_authz_policy_authority_derivation_graph", from = "src" }]
