[project]
name = "tigrbl-identity-storage-runtime"
version = "0.4.0.dev2"
description = "Runtime execution helpers for Tigrbl identity storage migrations and provider-bound storage lifecycle wiring."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "identity",
    "storage-runtime",
    "migrations",
    "database",
    "runtime",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-security-authorization-provenance-builder==0.1.0",
    "tigrbl==0.4.4.dev1",
    "tigrbl-auth-protocol-oauth==0.4.0.dev2",
    "tigrbl-auth-protocol-oidc==0.4.0.dev2",
    "tigrbl-authz-resource-server==0.4.0.dev2",
    "tigrbl-identity-jose==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-runtime==0.4.0.dev2",
    "tigrbl-identity-storage==0.4.0.dev2",
    "tigrbl-security-trust-contracts==0.1.0",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/30-storage-runtime/tigrbl-identity-storage-runtime"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-storage-runtime/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_storage_runtime", from = "src" }]
