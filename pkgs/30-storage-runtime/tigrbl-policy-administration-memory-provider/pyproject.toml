[project]
name = "tigrbl-policy-administration-memory-provider"
version = "0.4.0.dev2"
description = "In-memory RBAC, ABAC, delegated-administration, and policy engine providers."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-access-governance-memory-provider==0.4.0.dev2", "tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-identity-core==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_policy_administration_memory_provider", from = "src" }]
