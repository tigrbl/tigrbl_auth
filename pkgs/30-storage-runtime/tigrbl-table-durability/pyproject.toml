[project]
name = "tigrbl-table-durability"
version = "0.4.0.dev2"
description = "Protocol-neutral Tigrbl layer-30 durable table operation authoring."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl==0.4.4.dev1"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_table_durability", from = "src" }]
