[project]
name = "tigrbl-identity-identities-concrete"
version = "0.4.0.dev2"
description = "Concrete identity dataclass variants."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = ["tigrbl", "identity", "auth", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-authentication-credential-bases==0.4.0.dev2",
    "tigrbl-user-identity-concrete==0.4.0.dev2",
    "tigrbl-admin-identity-concrete==0.4.0.dev2",
    "tigrbl-service-identity-concrete==0.4.0.dev2",
    "tigrbl-client-identity-concrete==0.4.0.dev2",
    "tigrbl-machine-identity-concrete==0.4.0.dev2",
    "tigrbl-workload-identity-concrete==0.4.0.dev2",
    "tigrbl-device-identity-concrete==0.4.0.dev2",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/10-concrete/tigrbl-identity-identities-concrete"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-identities-concrete/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_identities_concrete", from = "src" }]
