[project]
name = "tigrbl-wit-svid-credential-concrete"
version = "0.4.0.dev2"
description = "Standalone SPIFFE WIT-SVID credential object."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-digital-credential-bases==0.4.0.dev2",
    "tigrbl-wit-concrete==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_wit_svid_credential_concrete", from = "src" }]
