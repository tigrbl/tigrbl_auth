[project]
name = "tigrbl-oidc-id-token-concrete"
version = "0.4.0.dev2"
description = "Standalone OIDC ID Token structural object."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-jwt-concrete==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oidc_id_token_concrete", from = "src" }]
