[project]
name = "tigrbl-policy-decision-engine-default"
version = "0.4.0.dev2"
description = "Deterministic default authorization policy decision engine."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-authz-policy-rules-concrete==0.4.0.dev2",
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_policy_decision_engine_default", from = "src" }]
