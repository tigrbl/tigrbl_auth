[project]
name = "tigrbl-jose-concrete"
version = "0.4.0.dev2"
description = "Deterministic provider-free JOSE behavior."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-jose-bases==0.4.0.dev2",
    "tigrbl-security-key-rotation-policy-contracts==0.1.0",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_jose_concrete", from = "src" }]
