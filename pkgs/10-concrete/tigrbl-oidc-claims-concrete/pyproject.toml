[project]
name = "tigrbl-oidc-claims-concrete"
version = "0.4.0.dev2"
description = "Concrete local OIDC claims provider for the Tigrbl auth package suite."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-oidc-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_oidc_claims_concrete", from = "src" }]
