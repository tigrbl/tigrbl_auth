[project]
name = "tigrbl-svid-concrete"
version = "0.4.0.dev2"
description = "Deterministic SPIFFE ID and SVID structures."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-contracts==0.4.0.dev2", "tigrbl-jose-concrete==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_svid_concrete", from = "src" }]
