[project]
name = "tigrbl-cwt-concrete"
version = "0.4.0.dev2"
description = "Deterministic provider-free CWT claims-set objects."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "cbor2==6.1.3",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_cwt_concrete", from = "src" }]
