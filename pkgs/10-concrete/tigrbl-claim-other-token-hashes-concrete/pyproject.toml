[project]
name = "tigrbl-claim-other-token-hashes-concrete"
version = "0.4.0.dev2"
description = "Standalone WIMSE oth claim implementation."
requires-python = ">=3.10,<3.15"
dependencies = [
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-claim-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_claim_other_token_hashes_concrete", from = "src" }]
