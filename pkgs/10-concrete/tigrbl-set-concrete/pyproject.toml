[project]
name = "tigrbl-set-concrete"
version = "0.4.0.dev2"
description = "RFC 8417 Security Event Token claims and validation for Tigrbl auth."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-identity-core==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_set_concrete", from = "src" }]
