[project]
name = "tigrbl-claim-access-token-digest-concrete"
version = "0.4.0.dev2"
description = "Standalone RFC 9449 ath claim implementation."
requires-python = ">=3.10,<3.15"
dependencies = [
    "tigrbl-identity-core==0.4.0.dev2",
    "tigrbl-identity-claims-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_claim_access_token_digest_concrete", from = "src" }]
