[project]
name = "tigrbl-amr-evaluator-basic-concrete"
version = "0.4.0.dev2"
description = "Deterministic basic AMR evaluator."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = ["tigrbl-security-trust-contracts==0.1.0", "tigrbl-authentication-context-bases==0.4.0.dev2"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_amr_evaluator_basic_concrete", from = "src" }]
