[project]
name = "tigrbl-local-claims-provider-concrete"
version = "0.4.0.dev2"
description = "Standalone local OIDC claims provider concrete."
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
dependencies = [
    "tigrbl-identity-contracts==0.4.0.dev2",
    "tigrbl-identity-claims-bases==0.4.0.dev2",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_local_claims_provider_concrete", from = "src" }]
