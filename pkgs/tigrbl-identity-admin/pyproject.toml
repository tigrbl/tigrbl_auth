[project]
name = "tigrbl-identity-admin"
version = "0.4.0.dev2"
description = "Administrative identity control plane for tenants, users, clients, keys, sessions, tokens, audit, consent, profiles, and governance."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "identity",
    "admin",
    "control-plane",
    "iam",
    "tenant-management",
    "client-management",
    "audit",
    "governance",
    "json-rpc",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/tigrbl/tigrbl_auth"
Repository = "https://github.com/tigrbl/tigrbl_auth"
Source = "https://github.com/tigrbl/tigrbl_auth/tree/master/pkgs/tigrbl-identity-admin"
SSOT = "https://github.com/tigrbl/tigrbl_auth/blob/master/.ssot/registry.json"
PyPI = "https://pypi.org/project/tigrbl-identity-admin/"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "tigrbl_identity_admin", from = "src" }]
